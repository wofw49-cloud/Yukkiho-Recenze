<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUKKI • Gaming Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .title-font { font-family: 'Orbitron', sans-serif; }
        .neon { text-shadow: 0 0 20px #c026d3, 0 0 40px #a855f7; }
        .tab-active { border-bottom: 4px solid #c026d3; color: white; }
        .card-hover:hover { transform: translateY(-8px); }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <nav class="bg-black border-b border-purple-600 fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-br from-purple-600 to-pink-600 rounded-2xl flex items-center justify-center text-3xl">🌀</div>
                <span class="text-4xl font-bold tracking-widest neon title-font">YUKKI</span>
            </div>

            <div class="flex gap-8 text-lg font-medium">
                <button onclick="switchTab(0)" class="tab-active pb-1 px-4" id="tab-0">DOMŮ</button>
                <button onclick="switchTab(1)" class="pb-1 px-4 hover:text-purple-400" id="tab-1">NOVINKY</button>
                <button onclick="switchTab(2)" class="pb-1 px-4 hover:text-purple-400" id="tab-2">RECENZE</button>
                <button onclick="switchTab(3)" class="pb-1 px-4 hover:text-purple-400" id="tab-3">ŽEBŘÍČKY</button>
                <button onclick="switchTab(4)" class="pb-1 px-4 hover:text-purple-400" id="tab-4">KOMUNITA</button>
            </div>

            <button onclick="toggleLogin()" class="px-6 py-3 bg-gradient-to-r from-purple-600 to-pink-600 rounded-2xl font-bold flex items-center gap-2">
                <i class="fas fa-user"></i>
                <span id="loginText">PŘIHLÁSIT SE</span>
            </button>
        </div>
    </nav>

    <main class="pt-24 max-w-7xl mx-auto px-6 pb-20">

        <!-- DOMŮ -->
        <div id="page-0">
            <h1 class="text-6xl font-bold text-center mt-10 mb-2 neon title-font">Vítej zpátky, Yukki</h1>
            <div id="hero-news" onclick="openDetail('news', 0)" class="cursor-pointer relative h-[65vh] rounded-3xl overflow-hidden mb-12 border border-purple-500/30"></div>
            
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                <div class="lg:col-span-7">
                    <h2 class="text-3xl font-bold mb-6 title-font">Další novinky</h2>
                    <div id="home-older-news" class="space-y-6"></div>
                </div>
                <div class="lg:col-span-5">
                    <h2 class="text-3xl font-bold mb-6 title-font">Poslední recenze</h2>
                    <div id="home-reviews" class="space-y-6"></div>
                </div>
            </div>
        </div>

        <!-- NOVINKY -->
        <div id="page-1" class="hidden">
            <h2 class="text-4xl font-bold title-font mb-8">NOVINKY</h2>
            <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </div>

        <!-- RECENZE -->
        <div id="page-2" class="hidden">
            <h2 class="text-4xl font-bold title-font mb-8">RECENZE</h2>
            <div id="reviews-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>

        <div id="page-3" class="hidden"><h2 class="text-4xl font-bold title-font">ŽEBŘÍČKY</h2></div>
        <div id="page-4" class="hidden"><h2 class="text-4xl font-bold title-font">KOMUNITA</h2></div>
    </main>

    <script>
        let news = [
            {
                id: 2,
                title: "Assassin's Creed Black Flag Resynced – datum vydání je venku!",
                image: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/3751950/header.jpg?t=1777900688",
                date: "2026-05-06",
                content: `Po letech spekulací a leaků je to konečně oficiální. Ubisoft oznámil remake milovaného pirátského dílu na 9. července 2026.

Hra se staví od základu na novém enginu, dostane kompletně předělanou grafiku, lepší animace, vylepšené námořní bitvy a odstranění některých frustrujících mechanik z originálu.

Fanoušci jsou z toho v extázi. Black Flag je pro spoustu lidí dodnes nejlepší díl série a teď to vypadá, že dostane zaslouženou moderní podobu.`
            }
        ];

        function renderNews() {
            document.getElementById('news-container').innerHTML = news.map((n, i) => `
                <div onclick="openDetail(${i})" class="bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer">
                    <img src="${n.image}" class="w-full h-56 object-cover">
                    <div class="p-6">
                        <h3 class="text-2xl font-bold">${n.title}</h3>
                        <p class="text-purple-400 text-sm mt-2">${n.date}</p>
                        <p class="mt-4">${n.content}</p>
                    </div>
                </div>
            `).join('');
        }

        function renderHome() {
            const newest = news[0];
            document.getElementById('hero-news').innerHTML = `
                <img src="${newest.image}" class="absolute inset-0 w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black via-black/70"></div>
                <div class="absolute bottom-12 left-12 right-12">
                    <span class="bg-red-600 px-4 py-1 text-sm">NOVINKA</span>
                    <h2 class="text-5xl font-bold mt-6">${newest.title}</h2>
                    <p class="text-xl text-gray-300 mt-4 line-clamp-3">${newest.content}</p>
                </div>
            `;
        }

        function openDetail(i) {
            const n = news[i];
            alert(n.title + "\n\n" + n.content);
        }

        function switchTab(n) {
            document.querySelectorAll('[id^="page-"]').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${n}`).classList.remove('hidden');
        }

        window.onload = () => {
            renderNews();
            renderHome();
            switchTab(0);
        };
    </script>
</body>
</html>
