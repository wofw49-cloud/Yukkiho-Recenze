<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUKKI • Gaming Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .title-font { font-family: 'Orbitron', sans-serif; }
        .neon { text-shadow: 0 0 20px #ef4444, 0 0 40px #b91c1c; }
        .tab-active { border-bottom: 4px solid #ef4444; color: white; }

        .leaderboard-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .leaderboard-card:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 30px 60px -15px rgb(185 28 28 / 0.5);
        }

        #detailModal .modal-content-wrapper {
            max-height: calc(94vh - 300px);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #ef4444 #27272a;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <nav class="bg-black border-b border-red-600 fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-br from-red-600 to-rose-600 rounded-2xl flex items-center justify-center text-3xl">🌀</div>
                <span class="text-4xl font-bold tracking-widest neon title-font">YUKKI</span>
            </div>
            <div class="flex gap-8 text-lg font-medium">
                <button onclick="switchTab(0)" class="tab-active pb-1 px-4" id="tab-0">DOMŮ</button>
                <button onclick="switchTab(1)" class="pb-1 px-4 hover:text-red-400" id="tab-1">NOVINKY</button>
                <button onclick="switchTab(2)" class="pb-1 px-4 hover:text-red-400" id="tab-2">RECENZE</button>
                <button onclick="switchTab(3)" class="pb-1 px-4 hover:text-red-400" id="tab-3">ŽEBŘÍČEK</button>
                <button onclick="switchTab(4)" class="pb-1 px-4 hover:text-red-400" id="tab-4">KOMUNITA</button>
            </div>
            <button onclick="toggleLogin()" class="px-6 py-3 bg-gradient-to-r from-red-600 to-rose-600 rounded-2xl font-bold flex items-center gap-2">
                <i class="fas fa-user"></i>
                <span id="loginText">PŘIHLÁSIT SE</span>
            </button>
        </div>
    </nav>

    <main class="pt-24 max-w-7xl mx-auto px-6 pb-20">
        <!-- DOMŮ -->
        <div id="page-0">
            <h1 class="text-6xl font-bold text-center mt-10 mb-2 neon title-font">Vítej zpátky, Yukki</h1>
            <div id="hero-news" onclick="openDetail('news', 0)" class="cursor-pointer relative h-[65vh] rounded-3xl overflow-hidden mb-12 border border-red-500/30"></div>
            <h2 class="text-3xl font-bold mb-6 title-font">Poslední recenze</h2>
            <div id="home-reviews" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </div>

        <!-- NOVINKY -->
        <div id="page-1" class="hidden">
            <h2 class="text-4xl font-bold title-font mb-8">NOVINKY</h2>
            <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </div>

        <!-- RECENZE -->
        <div id="page-2" class="hidden">
            <h2 class="text-4xl font-bold title-font mb-8">RECENZE</h2>
            <div id="reviews-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>

        <!-- ŽEBŘÍČEK -->
        <div id="page-3" class="hidden">
            <h2 class="text-4xl font-bold title-font mb-8">ŽEBŘÍČEK</h2>
            <div id="leaderboard" class="space-y-6"></div>
        </div>

        <!-- KOMUNITA -->
        <div id="page-4" class="hidden">
            <h2 class="text-4xl font-bold title-font mb-8">KOMUNITA</h2>
            <div id="community-container" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </div>
    </main>

    <!-- ADMIN BAR -->
    <div id="adminBar" class="hidden fixed bottom-6 right-6 bg-zinc-900 border border-red-500 rounded-2xl p-4 flex gap-3 z-50">
        <button onclick="showCreateModal('news')" class="px-6 py-3 bg-red-600 rounded-xl font-bold">+ Novinka</button>
        <button onclick="showCreateModal('review')" class="px-6 py-3 bg-red-600 rounded-xl font-bold">+ Recenze</button>
        <button onclick="showCreateLinkModal()" class="px-6 py-3 bg-red-600 rounded-xl font-bold">+ Odkaz</button>
        <button onclick="exportData()" class="px-6 py-3 bg-emerald-600 rounded-xl font-bold">📤 Export</button>
    </div>

    <!-- LOGIN MODAL -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center">
        <div class="bg-zinc-900 p-10 rounded-3xl w-full max-w-md border border-red-500">
            <h2 class="text-3xl font-bold mb-6 text-center title-font">YUKKI ADMIN</h2>
            <input id="loginUser" value="yukki" class="w-full mb-4 bg-zinc-800 border border-red-500 rounded-2xl px-6 py-4">
            <input id="loginPass" type="password" value="yukki123" class="w-full mb-6 bg-zinc-800 border border-red-500 rounded-2xl px-6 py-4">
            <button onclick="adminLogin()" class="w-full py-4 bg-gradient-to-r from-red-600 to-rose-600 rounded-2xl font-bold">Přihlásit se</button>
        </div>
    </div>

    <!-- CREATE/EDIT MODAL -->
    <div id="createModal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center">
        <div class="bg-zinc-900 p-10 rounded-3xl w-full max-w-2xl border border-red-500">
            <h2 class="text-3xl font-bold mb-6" id="modalTitle">Nová novinka</h2>
            <input id="postTitle" placeholder="Název" class="w-full mb-4 bg-zinc-800 border border-red-500 rounded-2xl px-6 py-4">
            <input id="postImages" placeholder="URL fotek (oddělené čárkou)" class="w-full mb-4 bg-zinc-800 border border-red-500 rounded-2xl px-6 py-4">
            <input id="postVideo" placeholder="YouTube URL nebo mp4 link" class="w-full mb-4 bg-zinc-800 border border-red-500 rounded-2xl px-6 py-4">
            <input id="postScore" type="number" placeholder="Hodnocení % (jen recenze)" class="w-full mb-4 bg-zinc-800 border border-red-500 rounded-2xl px-6 py-4">
            <input id="postDate" type="date" class="w-full mb-6 bg-zinc-800 border border-red-500 rounded-2xl px-6 py-4">
            <textarea id="postContent" rows="10" placeholder="Obsah..." class="w-full bg-zinc-800 border border-red-500 rounded-2xl px-6 py-4"></textarea>
            <div class="flex gap-4 mt-6">
                <button onclick="savePost()" class="flex-1 py-4 bg-red-600 rounded-2xl font-bold">Uložit</button>
                <button onclick="hideCreateModal()" class="flex-1 py-4 bg-zinc-800 rounded-2xl font-bold">Zrušit</button>
            </div>
        </div>
    </div>

    <!-- DETAIL MODAL -->
    <div id="detailModal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-start justify-center pt-8 pb-8 overflow-hidden">
        <div class="bg-zinc-900 rounded-3xl w-full max-w-6xl border border-red-500 overflow-hidden relative max-h-[94vh] flex flex-col">
            <button onclick="closeModal()" class="absolute top-6 right-6 z-20 w-14 h-14 bg-black/80 hover:bg-red-600 text-white rounded-full flex items-center justify-center text-4xl font-light">✕</button>
            <div id="modal-media" class="w-full bg-black"></div>
            <div class="modal-content-wrapper flex-1 p-8 md:p-16 max-w-4xl mx-auto overflow-y-auto">
                <h2 id="modal-title" class="text-4xl md:text-5xl font-bold title-font"></h2>
                <div id="modal-score" class="text-6xl font-bold text-red-400 mt-6"></div>
                <div id="modal-content" class="mt-12 text-gray-200 leading-relaxed text-[17.5px] whitespace-pre-wrap"></div>
            </div>
        </div>
    </div>

    <!-- KOMUNITNÍ ODKAZ MODAL -->
    <div id="linkModal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center">
        <div class="bg-zinc-900 p-10 rounded-3xl w-full max-w-lg border border-red-500">
            <h2 class="text-3xl font-bold mb-6" id="linkModalTitle">Nový odkaz</h2>
            <input id="linkTitle" placeholder="Název odkazu" class="w-full mb-4 bg-zinc-800 border border-red-500 rounded-2xl px-6 py-4">
            <input id="linkUrl" placeholder="https://" class="w-full mb-4 bg-zinc-800 border border-red-500 rounded-2xl px-6 py-4">
            <input id="linkIcon" placeholder="fa-youtube" value="fa-youtube" class="w-full mb-6 bg-zinc-800 border border-red-500 rounded-2xl px-6 py-4">
            <div class="flex gap-4">
                <button onclick="saveLink()" class="flex-1 py-4 bg-red-600 rounded-2xl font-bold">Uložit</button>
                <button onclick="hideLinkModal()" class="flex-1 py-4 bg-zinc-800 rounded-2xl font-bold">Zrušit</button>
            </div>
        </div>
    </div>

    <script>
        let isAdmin = false;
        let news = [];
        let reviews = [];
        let communityLinks = [];
        let editingType = null;
        let editingIndex = null;
        let editingLinkIndex = null;

        function loadData() {
            news = [
                {
                    "id": 1778037001738,
                    "title": "Proč si PC hráči musejí počkat na Grand Theft Auto VI?",
                    "image": "https://indian-tv.cz/uploads/ls/3b893ce7590d4371b06532dcac210d72/1777975974.jpg?",
                    "images": ["https://indian-tv.cz/uploads/ls/3b893ce7590d4371b06532dcac210d72/1777975974.jpg?"],
                    "video": "",
                    "date": "2026-05-06",
                    "content": "Hry od Rockstar Games vycházejí nejprve na konzole a až později na počítače. Stejné to bude i u GTA 6. Proč tomu tak je? Palčivé otázce se věnoval generální ředitel Take-Two Interactive..."
                }
            ];

            reviews = [
                {
                    "id": 1778037961299,
                    "title": "The Elder Scrolls IV: Oblivion Remastered",
                    "image": "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2623190/a7cee9165bb1bfc092c390c5cff215ce0e381dfc/header.jpg?t=1761681073",
                    "images": ["https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2623190/a7cee9165bb1bfc092c390c5cff215ce0e381dfc/header.jpg?t=1761681073"],
                    "video": "",
                    "date": "2026-04-15",
                    "content": "The Elder Scrolls IV: Oblivion Remastered je hra, která na první pohled zaujme především tím, jak krásně ožila jedna z největších fantasy klasik...",
                    "score": 90
                },
                {
                    "id": 1778037465077,
                    "title": "Mafia: The Old Country",
                    "image": "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1941540/d06980bb8f41737ca68da8eed40079347db09c84/header.jpg?t=1764177372",
                    "images": ["https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1941540/d06980bb8f41737ca68da8eed40079347db09c84/header.jpg?t=1764177372"],
                    "video": "",
                    "date": "2025-09-29",
                    "content": "Mafia: The Old Country je přesně ten typ hry, který připomene, proč si série Mafia vybudovala tak silné jméno...",
                    "score": 80
                },
                {
                    "id": 1778037293234,
                    "title": "Plants vs. Zombies: Replanted",
                    "image": "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/3654560/2a3015b525e5d4da6d2c1a517d0a8c1504b1eee8/header.jpg?t=1763401327",
                    "images": ["https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/3654560/2a3015b525e5d4da6d2c1a517d0a8c1504b1eee8/header.jpg?t=1763401327"],
                    "video": "",
                    "date": "2026-02-24",
                    "content": "Po letech jsem se z nostalgie vrátil k obraně trávníku...",
                    "score": 82
                },
                {
                    "id": 1778037209163,
                    "title": "Quarantine Zone: The Last Check",
                    "image": "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/3419520/c8562f1c2f8f054e5f8efeb536a0ba2490905033/header.jpg?t=1776795498",
                    "images": ["https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/3419520/c8562f1c2f8f054e5f8efeb536a0ba2490905033/header.jpg?t=1776795498"],
                    "video": "",
                    "date": "2026-02-25",
                    "content": "Quarantine Zone mě mile překvapila hlavně svým nápadem...",
                    "score": 78
                },
                {
                    "id": 1778037659901,
                    "title": "Crimson Desert",
                    "image": "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/3321460/abd7dbdeaede8b6c9a6d40bf116ff2b883f2dd45/header.jpg?t=1777016399",
                    "images": ["https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/3321460/abd7dbdeaede8b6c9a6d40bf116ff2b883f2dd45/header.jpg?t=1777016399"],
                    "video": "",
                    "date": "2026-03-22",
                    "content": "Crimson Desert je přesně ten typ hry, který se snaží spojit velký otevřený svět...",
                    "score": 86
                },
                {
                    "id": 1778037610764,
                    "title": "MOUSE: P.I. For Hire",
                    "image": "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2416450/298ff2fc3f6a700d022b8d3ec58047f2b426be03/header.jpg?t=1777393988",
                    "images": ["https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2416450/298ff2fc3f6a700d022b8d3ec58047f2b426be03/header.jpg?t=1777393988"],
                    "video": "",
                    "date": "2026-04-18",
                    "content": "MOUSE: P.I. For Hire je hra, která na první pohled zaujme hlavně svým unikátním stylem...",
                    "score": 85
                }
            ];

            communityLinks = [
                { title: "YouTube", url: "https://www.youtube.com/@YukkiCZE", icon: "fa-youtube" },
                { title: "Instagram", url: "https://www.instagram.com/_yukki77_/", icon: "fa-instagram" }
            ];
        }

        function sortByDate(arr) {
            return [...arr].sort((a, b) => new Date(b.date) - new Date(a.date));
        }

        function renderNews() {
            const sorted = sortByDate(news);
            document.getElementById('news-container').innerHTML = sorted.map((n) => {
                const idx = news.findIndex(item => item.id === n.id);
                return `
                    <div class="bg-zinc-900 rounded-3xl overflow-hidden">
                        <img src="${n.image}" class="w-full h-56 object-cover cursor-pointer" onclick="openDetail('news', ${idx})">
                        <div class="p-6">
                            <h3 class="text-2xl font-bold">${n.title}</h3>
                            <p class="mt-4 line-clamp-4">${n.content}</p>
                            ${isAdmin ? `<div class="flex gap-3 mt-6">
                                <button onclick="event.stopImmediatePropagation(); editItem('news', ${idx});" class="flex-1 py-3 bg-blue-600 rounded-xl font-bold">UPRAVIT</button>
                                <button onclick="event.stopImmediatePropagation(); deleteItem('news', ${idx});" class="flex-1 py-3 bg-red-600 rounded-xl font-bold">SMAZAT</button>
                            </div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderReviews() {
            const sorted = sortByDate(reviews);
            document.getElementById('reviews-container').innerHTML = sorted.map((r) => {
                const idx = reviews.findIndex(item => item.id === r.id);
                return `
                    <div class="bg-zinc-900 rounded-3xl overflow-hidden">
                        <img src="${r.image}" class="w-full h-56 object-cover cursor-pointer" onclick="openDetail('review', ${idx})">
                        <div class="p-6">
                            <div class="flex justify-between">
                                <h3 class="text-2xl font-bold">${r.title}</h3>
                                <div class="text-5xl font-bold text-red-400">${r.score}</div>
                            </div>
                            <p class="mt-4 line-clamp-4">${r.content}</p>
                            ${isAdmin ? `<div class="flex gap-3 mt-6">
                                <button onclick="event.stopImmediatePropagation(); editItem('review', ${idx});" class="flex-1 py-3 bg-blue-600 rounded-xl font-bold">UPRAVIT</button>
                                <button onclick="event.stopImmediatePropagation(); deleteItem('review', ${idx});" class="flex-1 py-3 bg-red-600 rounded-xl font-bold">SMAZAT</button>
                            </div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderLeaderboard() {
            const sorted = [...reviews].sort((a, b) => b.score - a.score);
            document.getElementById('leaderboard').innerHTML = sorted.map((r, index) => {
                const rankClass = index === 0 ? 'from-yellow-400 to-amber-500' : index === 1 ? 'from-gray-300 to-gray-400' : index === 2 ? 'from-orange-600 to-amber-700' : 'from-red-600 to-rose-600';
                const idx = reviews.findIndex(review => review.id === r.id);
                return `
                    <div onclick="openDetail('review', ${idx})" class="leaderboard-card bg-gradient-to-r from-zinc-900 to-zinc-950 border border-red-500/30 hover:border-red-500 rounded-3xl p-8 flex items-center gap-8 cursor-pointer">
                        <div class="text-7xl font-black text-transparent bg-clip-text bg-gradient-to-br ${rankClass} w-20">${index + 1}</div>
                        <img src="${r.image}" class="w-28 h-28 object-cover rounded-2xl border border-red-500/50">
                        <div class="flex-1">
                            <h3 class="text-3xl font-bold">${r.title}</h3>
                        </div>
                        <div class="text-right">
                            <div class="text-7xl font-bold text-red-400">${r.score}<span class="text-2xl">%</span></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderCommunity() {
            document.getElementById('community-container').innerHTML = communityLinks.map((link, i) => `
                <a href="${link.url}" target="_blank" class="block bg-zinc-900 hover:bg-zinc-800 border border-red-500/30 hover:border-red-500 rounded-3xl p-8 transition-all group">
                    <i class="fas ${link.icon} text-5xl text-red-500 mb-6"></i>
                    <h3 class="text-2xl font-bold group-hover:text-red-400">${link.title}</h3>
                    ${isAdmin ? `
                    <div class="flex gap-3 mt-8">
                        <button onclick="event.preventDefault(); editLink(${i});" class="flex-1 py-3 bg-blue-600 rounded-xl font-bold">UPRAVIT</button>
                        <button onclick="event.preventDefault(); deleteLink(${i});" class="flex-1 py-3 bg-red-600 rounded-xl font-bold">SMAZAT</button>
                    </div>` : ''}
                </a>
            `).join('');
        }

        function renderHome() {
            if (news.length > 0) {
                const latest = sortByDate(news)[0];
                document.getElementById('hero-news').innerHTML = `
                    <img src="${latest.image}" class="absolute inset-0 w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-black/70"></div>
                    <div class="absolute bottom-12 left-12 right-12">
                        <h2 class="text-5xl font-bold title-font">${latest.title}</h2>
                    </div>
                `;
            }
            const latestReviews = sortByDate(reviews).slice(0, 3);
            document.getElementById('home-reviews').innerHTML = latestReviews.map(r => {
                const idx = reviews.findIndex(review => review.id === r.id);
                return `
                    <div onclick="openDetail('review', ${idx})" class="bg-zinc-900 rounded-3xl p-6 cursor-pointer">
                        <img src="${r.image}" class="w-full h-40 object-cover rounded-2xl mb-4">
                        <h4 class="font-bold">${r.title}</h4>
                        <div class="text-4xl font-bold text-red-400">${r.score}</div>
                    </div>
                `;
            }).join('');
        }

        function openDetail(type, i) {
            const item = type === 'news' ? news[i] : reviews[i];
            let mediaHTML = '';

            if (item.images && item.images.length > 0) {
                mediaHTML += `<div class="grid grid-cols-1 md:grid-cols-2 gap-2 p-4">`;
                item.images.forEach(src => mediaHTML += `<img src="${src}" class="rounded-2xl w-full">`);
                mediaHTML += `</div>`;
            }
            if (item.video) {
                if (item.video.includes('youtube.com') || item.video.includes('youtu.be')) {
                    const vid = item.video.split('v=')[1] || item.video.split('/').pop().split('?')[0];
                    mediaHTML += `<iframe width="100%" height="520" src="https://www.youtube.com/embed/${vid}" frameborder="0" allowfullscreen class="rounded-3xl"></iframe>`;
                } else {
                    mediaHTML += `<video controls class="w-full rounded-3xl"><source src="${item.video}" type="video/mp4"></video>`;
                }
            }
            if (!mediaHTML) mediaHTML = `<img src="${item.image}" class="w-full">`;

            document.getElementById('modal-media').innerHTML = mediaHTML;
            document.getElementById('modal-title').textContent = item.title;

            const scoreEl = document.getElementById('modal-score');
            if (type === 'review' && item.score) {
                scoreEl.innerHTML = `${item.score}<span class="text-3xl">%</span>`;
                scoreEl.style.display = 'block';
            } else {
                scoreEl.style.display = 'none';
            }

            document.getElementById('modal-content').innerHTML = item.content.replace(/\n/g, '<br><br>');
            document.getElementById('detailModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.add('hidden');
        }

        function switchTab(n) {
            document.querySelectorAll('[id^="page-"]').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${n}`).classList.remove('hidden');
            if (n === 1) renderNews();
            if (n === 2) renderReviews();
            if (n === 3) renderLeaderboard();
            if (n === 4) renderCommunity();
        }

        function toggleLogin() { document.getElementById('loginModal').classList.toggle('hidden'); }

        function adminLogin() {
            if (document.getElementById('loginUser').value === "yukki" && document.getElementById('loginPass').value === "yukki123") {
                isAdmin = true;
                document.getElementById('loginText').innerHTML = '👑 ADMIN';
                document.getElementById('adminBar').classList.remove('hidden');
                toggleLogin();
                renderNews(); renderReviews(); renderCommunity();
            } else alert("Špatné heslo! (yukki123)");
        }

        function showCreateModal(type) {
            if (!isAdmin) return alert("Nejsi přihlášen jako admin!");
            editingIndex = null;
            editingType = type;
            document.getElementById('modalTitle').textContent = type === 'news' ? "Nová novinka" : "Nová recenze";
            document.getElementById('postTitle').value = '';
            document.getElementById('postImages').value = '';
            document.getElementById('postVideo').value = '';
            document.getElementById('postScore').value = type === 'review' ? '80' : '';
            document.getElementById('postDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('postContent').value = '';
            document.getElementById('createModal').classList.remove('hidden');
        }

        function hideCreateModal() { document.getElementById('createModal').classList.add('hidden'); }

        function savePost() {
            const title = document.getElementById('postTitle').value.trim();
            const imagesStr = document.getElementById('postImages').value.trim();
            const video = document.getElementById('postVideo').value.trim();
            const score = parseInt(document.getElementById('postScore').value) || 0;
            const date = document.getElementById('postDate').value;
            const content = document.getElementById('postContent').value.trim();

            const images = imagesStr ? imagesStr.split(',').map(u => u.trim()).filter(Boolean) : [];

            if (!title || !content) return alert("Název a obsah jsou povinné!");

            const newItem = { 
                id: Date.now(), 
                title, 
                image: images[0] || "https://picsum.photos/id/237/1200/700", 
                images, 
                video, 
                date, 
                content 
            };
            if (editingType === 'review') newItem.score = score;

            if (editingIndex !== null) {
                if (editingType === 'news') news[editingIndex] = newItem;
                else reviews[editingIndex] = newItem;
            } else {
                if (editingType === 'news') news.unshift(newItem);
                else reviews.unshift(newItem);
            }

            hideCreateModal();
            renderNews();
            renderReviews();
            renderLeaderboard();
            renderHome();
            alert("Uloženo!");
        }

        function editItem(type, i) {
            editingType = type;
            editingIndex = i;
            const item = type === 'news' ? news[i] : reviews[i];
            document.getElementById('modalTitle').textContent = type === 'news' ? "Upravit novinku" : "Upravit recenzi";
            document.getElementById('postTitle').value = item.title;
            document.getElementById('postImages').value = item.images ? item.images.join(', ') : '';
            document.getElementById('postVideo').value = item.video || '';
            document.getElementById('postScore').value = item.score || '';
            document.getElementById('postDate').value = item.date;
            document.getElementById('postContent').value = item.content;
            document.getElementById('createModal').classList.remove('hidden');
        }

        function deleteItem(type, i) {
            if (confirm("Opravdu smazat?")) {
                if (type === 'news') news.splice(i, 1);
                else reviews.splice(i, 1);
                renderNews();
                renderReviews();
                renderLeaderboard();
                renderHome();
            }
        }

        function showCreateLinkModal() {
            if (!isAdmin) return alert("Nejsi přihlášen jako admin!");
            editingLinkIndex = null;
            document.getElementById('linkModalTitle').textContent = "Nový odkaz";
            document.getElementById('linkTitle').value = '';
            document.getElementById('linkUrl').value = '';
            document.getElementById('linkIcon').value = 'fa-youtube';
            document.getElementById('linkModal').classList.remove('hidden');
        }

        function hideLinkModal() { document.getElementById('linkModal').classList.add('hidden'); }

        function saveLink() {
            const title = document.getElementById('linkTitle').value.trim();
            const url = document.getElementById('linkUrl').value.trim();
            const icon = document.getElementById('linkIcon').value || 'fa-link';
            if (!title || !url) return alert("Název a URL jsou povinné!");

            if (editingLinkIndex !== null) communityLinks[editingLinkIndex] = {title, url, icon};
            else communityLinks.unshift({title, url, icon});

            hideLinkModal();
            renderCommunity();
            alert("Odkaz uložen!");
        }

        function editLink(i) {
            editingLinkIndex = i;
            const link = communityLinks[i];
            document.getElementById('linkModalTitle').textContent = "Upravit odkaz";
            document.getElementById('linkTitle').value = link.title;
            document.getElementById('linkUrl').value = link.url;
            document.getElementById('linkIcon').value = link.icon;
            document.getElementById('linkModal').classList.remove('hidden');
        }

        function deleteLink(i) {
            if (confirm("Smazat odkaz?")) {
                communityLinks.splice(i, 1);
                renderCommunity();
            }
        }

        function exportData() {
            const data = {news, reviews, communityLinks};
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "yukki_data.json";
            a.click();
        }

        window.onload = () => {
            loadData();
            renderHome();
            renderNews();
            renderReviews();
            renderLeaderboard();
            renderCommunity();
            switchTab(0);
        };
    </script>
</body>
</html>
