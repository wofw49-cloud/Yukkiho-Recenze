    function getYouTubeEmbedUrl(input) {
        if (!input) return null;
        let url = input.trim();
        if (url.includes('/embed/')) return url.includes('?') ? url : url + '?autoplay=1&rel=0';
        let match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/);
        if (match && match[1]) {
            const videoId = match[1].split('&')[0];
            return `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
        }
        const cleanId = url.split('&')[0];
        if (/^[a-zA-Z0-9_-]{11}$/.test(cleanId)) return `https://www.youtube.com/embed/${cleanId}?autoplay=1&rel=0`;
        return null;
    }

    }

        if (item.isDLC) html += `<span class="px-4 py-1 text-[10px] font-black bg-blue-600 text-white rounded-3xl uppercase tracking-wider">DLC / EXPANSION</span>`;

    function animateRing(selector, score) {
        const ring = document.querySelector(selector);
        if (ring) {
            const radius = 62;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (score / 100) * circumference;
            ring.style.strokeDasharray = circumference;
            ring.style.strokeDashoffset = offset;
        }
    }

                    <circle class="ring-bg" cx="70" cy="70" r="62"></circle>
                    <circle class="ring-progress ${ringId}" cx="70" cy="70" r="62" style="stroke-dasharray: 390; stroke-dashoffset: 390;"></circle>

    function renderPaginationUI(totalItems, currentPage, containerId, stateKey, renderFn) {

        if (!container) return;
        if (totalPages <= 1) { container.innerHTML = ''; return; }
        container.innerHTML = `

            <div class="flex items-center px-4 font-black italic condensed text-zinc-500">${currentPage} / ${totalPages}</div>
            <button class="page-btn condensed" ${currentPage >= totalPages ? 'disabled' : ''} onclick="state.${stateKey}++; ${renderFn}()">Další</button>
        `;
    }

    function initHeroSlider() {
        const combined = [...state.news, ...state.reviews].sort((a,b) => new Date(b.rDate) - new Date(a.rDate)).slice(0, 3);

            state.heroIndex = index;
            renderHero(combined);
            resetHeroTimer();
        };
        function renderHero(items) {
            const item = items[state.heroIndex];
            if (!item) return;
            const type = item.score !== undefined ? 'RECENZE' : 'NOVINKA';
            document.getElementById('hero-content').innerHTML = `
                <div class="relative h-[420px] sm:h-[480px] md:h-[550px] lg:h-[620px] rounded-[40px] overflow-hidden cursor-pointer fade-in" onclick="openModal(${item.id})">
                    <img src="${item.img}" class="w-full h-full object-cover opacity-40">

                        <div class="flex gap-2 mt-6">${getBadgesHTML(item)}</div>
                    </div>
                </div>`;
            document.getElementById('hero-dots').innerHTML = items.map((_, idx) => `<div class="hero-dot ${idx === state.heroIndex ? 'active' : ''}" onclick="event.stopPropagation(); changeHeroSlide(${idx})"></div>`).join('');
        }
        function resetHeroTimer() {
            clearInterval(state.heroInterval);
            state.heroInterval = setInterval(() => { state.heroIndex = (state.heroIndex + 1) % combined.length; renderHero(combined); }, 4500);
        }
        renderHero(combined);
        resetHeroTimer();
    }

    function renderReviewsPage() {
        let filtered = state.reviews.filter(r => r.game.toLowerCase().includes(state.searchQuery));
        if (state.reviewFilter === '90plus') filtered = filtered.filter(r => r.score >= 90);
        if (state.reviewFilter === 'czech') filtered = filtered.filter(r => r.cz || r.czech);
        if (state.reviewFilter === 'mustbuy') filtered = filtered.filter(r => r.verdict === 'MUST BUY');

        const start = (state.reviewsPage - 1) * state.itemsPerPage;
        const currentItems = filtered.slice(start, start + state.itemsPerPage);
        
        document.getElementById('reviews-full-list').innerHTML = currentItems.map(r => `
            <div onclick="openModal(${r.id})" class="feed-card flex flex-col md:flex-row gap-8 p-8 cursor-pointer items-center">

        renderCalendar();
    }

    function openStore(e, url) {
        e.stopPropagation();
        if (url && url !== "#") window.open(url, '_blank');
    }

    function renderCalendar() {
        const filtered = state.calendar.filter(c => {
            const d = new Date(c.rDate);
            const mMatch = d.getFullYear() === state.selectedYear && d.getMonth() === state.selectedMonth;
            const pMatch = state.selectedPlatform === "ALL" || c.platforms.includes(state.selectedPlatform);
            const sMatch = state.searchQuery.length > 0 ? c.game.toLowerCase().includes(state.searchQuery) : true;
            return mMatch && pMatch && sMatch;
        });
        
        document.getElementById('month-nav').innerHTML = monthsShort.map((m, idx) => `<button onclick="state.selectedMonth=${idx}; renderCalendar()" class="filter-btn ${state.selectedMonth === idx ? 'active' : ''}">${m}</button>`).join('');
        document.getElementById('year-nav').innerHTML = `<div class="flex items-center gap-6"><button onclick="state.selectedYear--; renderCalendar()" class="text-2xl text-zinc-600 hover:text-white"><i class="fas fa-chevron-left"></i></button><span class="text-4xl font-black italic condensed">${state.selectedYear}</span><button onclick="state.selectedYear++; renderCalendar()" class="text-2xl text-zinc-600 hover:text-white"><i class="fas fa-chevron-right"></i></button></div>`;

        const groupedByDate = {};
        filtered.forEach(c => {
            if (!groupedByDate[c.rDate]) groupedByDate[c.rDate] = [];
            groupedByDate[c.rDate].push(c);
        });

        const renderGameCard = (c) => {
            let icons = '';
            if (c.platforms.includes("PC")) icons += `<i onclick="openStore(event, '${c.storeLinks?.steam || '#'}')" class="fab fa-steam icon-pc cursor-pointer hover:scale-125 transition-transform"></i>`;
            if (c.platforms.includes("PS5")) icons += `<i onclick="openStore(event, '${c.storeLinks?.playstation || '#'}')" class="fab fa-playstation icon-ps5 cursor-pointer hover:scale-125 transition-transform"></i>`;
            if (c.platforms.includes("XBOX")) icons += `<i onclick="openStore(event, '${c.storeLinks?.xbox || '#'}')" class="fab fa-xbox icon-xbox cursor-pointer hover:scale-125 transition-transform"></i>`;
            if (c.platforms.includes("SWITCH")) icons += `<i onclick="openStore(event, '${c.storeLinks?.switch || '#'}')" class="fas fa-gamepad icon-switch cursor-pointer hover:scale-125 transition-transform"></i>`;

            return `
            <div class="bg-[#080808] border border-zinc-900 rounded-3xl overflow-hidden p-4 h-full feed-card">
                <div class="relative">
                    <img src="${c.img}" class="w-full aspect-video object-cover rounded-xl mb-4">
                    <div class="absolute bottom-2 left-2 flex gap-1 flex-wrap">${getBadgesHTML(c)}</div>
                </div>
                <h4 class="condensed text-xl font-black uppercase truncate">${c.game}</h4>
                <div class="text-red-500 font-bold text-sm mt-1">${new Date(c.rDate).getDate()}. ${monthsShort[new Date(c.rDate).getMonth()]}</div>
                <div class="flex gap-4 mt-3 text-xl">${icons}</div>
            </div>`;
        };

        const calendarHtml = Object.values(groupedByDate).map((games, index) => {
            const dayId = 'day-' + index;
            if (games.length > 1) {
                let slides = games.map((game, i) => `<div id="slide-${dayId}-${i}" class="${i === 0 ? '' : 'hidden'} w-full h-full transition-opacity duration-300">${renderGameCard(game)}</div>`).join('');
                return `
                    <div id="carousel-${dayId}" data-current="0" class="relative w-full group overflow-hidden rounded-3xl h-full">
                        ${slides}
                        <button onclick="prevSlide('${dayId}', ${games.length}, event)" class="absolute left-0 top-1/2 -translate-y-1/2 bg-black/80 hover:bg-[#ff0000] text-white px-3 py-4 opacity-0 group-hover:opacity-100 transition-all z-10 rounded-r-xl cursor-pointer shadow-[0_0_10px_rgba(0,0,0,0.8)]"><i class="fa-solid fa-chevron-left text-sm"></i></button>
                        <button onclick="nextSlide('${dayId}', ${games.length}, event)" class="absolute right-0 top-1/2 -translate-y-1/2 bg-black/80 hover:bg-[#ff0000] text-white px-3 py-4 opacity-0 group-hover:opacity-100 transition-all z-10 rounded-l-xl cursor-pointer shadow-[0_0_10px_rgba(0,0,0,0.8)]"><i class="fa-solid fa-chevron-right text-sm"></i></button>
                        <div class="absolute top-2 right-2 bg-red-600 text-white text-[10px] font-black px-2 py-1 rounded-md z-10 shadow-lg">${games.length} HRY</div>
                    </div>`;
            } else {
                return renderGameCard(games[0]);
            }
        }).join('');

        document.getElementById('calendar-grid').innerHTML = calendarHtml || `<div class="col-span-full text-center py-10 text-zinc-700 italic">Nic nenalezeno</div>`;
        applyFade('calendar-grid');
    }

    function renderSideCalendar() {
        const now = new Date();
        now.setHours(0,0,0,0);
        const future = state.calendar.filter(c => new Date(c.rDate) > now).sort((a,b) => new Date(a.rDate) - new Date(b.rDate)).slice(0, 5);
        const sideEl = document.getElementById('side-calendar');
        if (!sideEl) return;
        sideEl.innerHTML = future.map(c => `
            <div class="bg-white/5 p-4 rounded-2xl feed-card">
                <div class="flex items-center gap-4">
                    <div class="bg-red-600 text-white p-2 rounded-lg text-center min-w-[50px]">
                        <div class="text-xs font-bold">${monthsShort[new Date(c.rDate).getMonth()]}</div>
                        <div class="text-xl font-black">${new Date(c.rDate).getDate()}</div>
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <div class="condensed font-black text-sm uppercase truncate">${c.game}</div>
                        <div id="countdown-${c.id}" class="flex items-center text-[10px] font-bold text-red-500 mt-1 font-mono uppercase"></div>
                    </div>
                </div>
            </div>`).join('');
        state.sideCountdownIntervals.forEach(clearInterval);
        state.sideCountdownIntervals = [];
        future.forEach(c => state.sideCountdownIntervals.push(initSideCountdown(c.id, c.rDate)));
    }

    function initSideCountdown(id, targetDate) {
        const target = new Date(targetDate).getTime();
        const tick = () => {
            const timerEl = document.getElementById(`countdown-${id}`);
            if (!timerEl) return;
            const diff = target - new Date().getTime();
            if (diff <= 0) { timerEl.innerText = "PRÁVĚ VYŠLO!"; return; }
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            timerEl.innerHTML = `<span class="cd-segment text-white">${d}D</span><span class="cd-sep">:</span><span class="cd-segment text-white">${h}H</span><span class="cd-sep">:</span><span class="cd-segment text-white">${m}M</span><span class="cd-sep">:</span><span class="cd-segment text-white">${s}S</span>`;
        };
        tick(); return setInterval(tick, 1000);
    }

    function openTopModal() {
        const top = state.featuredTop;
        let html = `
            <div class="max-w-4xl mx-auto">
                <div class="text-center mb-8">
                    <span class="px-6 py-2 bg-red-600 text-white text-sm font-black tracking-widest rounded-full">TOP 5</span>
                    <h2 class="condensed text-6xl font-black italic mt-4">${top.title}</h2>
                    <p class="text-zinc-400 text-xl mt-2">${top.subtitle}</p>
                </div>
                <div class="space-y-6">
                    ${top.items.map(item => `
                        <div onclick="closeModal(); setTimeout(() => openModal(${item.rank === 1 ? 2001 : item.rank === 2 ? 2002 : item.rank === 3 ? 2005 : item.rank === 4 ? 2018 : 3001}), 300)" class="flex items-center bg-zinc-900 hover:bg-zinc-800 rounded-3xl p-6 cursor-pointer transition-all">
                            <div class="w-16 text-5xl font-black text-red-500 text-center">${item.rank}</div>
                            <img src="${item.img}" class="w-24 h-24 object-cover rounded-2xl mx-6">
                            <div class="flex-1">
                                <div class="text-3xl font-bold">${item.game}</div>
                            </div>
                            <div class="text-5xl font-black text-red-500">${item.score}%</div>
                        </div>
                    `).join('')}
                </div>
            </div>`;
        document.getElementById('modal-content').innerHTML = html;
        document.getElementById('modal-overlay').style.display = 'block';
    }

    window.openModal = (id) => {
        if (id === 9999) {
            openTopModal();
            return;
        }
        const item = [...state.news, ...state.reviews].find(x => x.id === id);
        if (!item) return;
        const isReview = item.score !== undefined;
        const suggested = [...state.news, ...state.reviews].filter(x => x.id !== id).sort(() => 0.5 - Math.random()).slice(0, 3);
        let suggestedHTML = suggested.map(s => `<div onclick="closeModal(); setTimeout(() => openModal(${s.id}), 300)" class="feed-card cursor-pointer"><img src="${s.img}" class="w-full h-32 object-cover"><div class="p-4"><h4 class="condensed text-lg font-black italic line-clamp-2 uppercase">${s.title || s.game}</h4>${s.score ? `<div class="text-red-600 font-black mt-2 italic">${s.score}%</div>` : ''}</div></div>`).join('');
        let aiSummaryHTML = isReview ? `<div class="ai-summary-box"><div class="flex flex-col md:flex-row justify-between items-center gap-6"><div class="text-center md:text-left"><div class="text-[10px] font-black text-zinc-500 uppercase tracking-[0.2em] mb-1">Verdikt</div><div class="condensed text-3xl font-black italic ${item.verdict==='MUST BUY'?'text-green-500':'text-orange-500'}">${item.verdict}</div></div><div class="flex gap-8"><div class="text-center"><div class="text-[10px] font-black text-zinc-500 uppercase tracking-[0.2em] mb-1">Příběh</div><div class="text-xl font-bold italic"><i class="far fa-clock text-red-600 mr-2"></i>${item.playtimeStory}h</div></div><div class="text-center"><div class="text-[10px] font-black text-zinc-500 uppercase tracking-[0.2em] mb-1">100%</div><div class="text-xl font-bold italic"><i class="fas fa-trophy text-yellow-500 mr-2"></i>${item.playtimeCompletion}h</div></div></div></div></div>` : '';

        let hwHTML = item.hw ? `
            <div class="my-12">
                <h3 class="condensed text-3xl font-black italic mb-8 uppercase text-zinc-500">HARDWAROVÉ NÁROKY</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    <div>
                        <h4 class="text-sm font-black text-zinc-600 uppercase mb-4 tracking-widest">MINIMÁLNÍ</h4>
                        <table class="hw-table">
                            <tr><td>OS</td><td>${item.hw.min.os}</td></tr>
                            <tr><td>CPU</td><td>${item.hw.min.cpu}</td></tr>
                            <tr><td>RAM</td><td>${item.hw.min.ram}</td></tr>
                            <tr><td>GPU</td><td>${item.hw.min.gpu}</td></tr>
                            <tr><td>DISK</td><td>${item.hw.min.storage}</td></tr>
                        </table>
                    </div>
                    <div>
                        <h4 class="text-sm font-black text-red-600 uppercase mb-4 tracking-widest">DOPORUČENÉ</h4>
                        <table class="hw-table">
                            <tr><td>OS</td><td>${item.hw.rec.os}</td></tr>
                            <tr><td>CPU</td><td>${item.hw.rec.cpu}</td></tr>
                            <tr><td>RAM</td><td>${item.hw.rec.ram}</td></tr>
                            <tr><td>GPU</td><td>${item.hw.rec.gpu}</td></tr>
                            <tr><td>DISK</td><td>${item.hw.rec.storage}</td></tr>
                        </table>
                    </div>
                </div>
            </div>` : '';

        let galleryHTML = (item.gallery && item.gallery.length) ? `
            <div class="my-12">
                <h3 class="condensed text-3xl font-black italic mb-8 uppercase text-zinc-500">FOTOGRAFIE</h3>
                <div class="gallery-grid">
                    ${item.gallery.map((img, i) => `<div onclick="openImageModal('${img}')" class="gallery-item"><img src="${img}" class="w-full h-48 object-cover"></div>`).join('')}
                </div>
            </div>` : '';

        let trailerHTML = '';
        if (item.trailer) {
            const embedUrl = getYouTubeEmbedUrl(item.trailer);
            if (embedUrl) {
                trailerHTML = `
                    <div class="my-12">
                        <h3 class="condensed text-3xl font-black italic mb-6 uppercase text-zinc-500">TRAILER</h3>
                        <div class="aspect-video rounded-3xl overflow-hidden">
                            <iframe width="100%" height="100%" src="${embedUrl}" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                        </div>
                    </div>`;
            }
        }

        let videoHTML = '';
        if (item.videos && item.videos.length > 0) {
            const embeds = item.videos.map((url, i) => {
                const embed = getYouTubeEmbedUrl(url);
                return `<div class="video-tab-content ${i===0?'':'hidden'}" data-tab="${i}">
                    <div class="video-container">
                        <iframe id="video-iframe-${i}" width="100%" height="100%" src="${embed}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                        <div onclick="switchVideoTabPrev(${i})" class="video-nav video-nav-left"><i class="fas fa-chevron-left"></i></div>
                        <div onclick="switchVideoTabNext(${i})" class="video-nav video-nav-right"><i class="fas fa-chevron-right"></i></div>
                    </div>
                </div>`;
            }).join('');
            videoHTML = `
                <div class="my-12">
                    <h3 class="condensed text-3xl font-black italic mb-6 uppercase text-zinc-500">VIDEA</h3>
                    <div class="video-tabs-container">${embeds}</div>
                </div>`;
        }

        let storeHTML = '';
        if (item.storeLinks) {
            storeHTML = `<div class="mb-12"><h4 class="condensed text-xl font-black italic mb-4 uppercase text-zinc-500">Koupit hru</h4><div class="flex flex-wrap gap-4">`;
            if (item.storeLinks.steam) storeHTML += `<a href="${item.storeLinks.steam}" target="_blank" class="store-btn btn-steam"><i class="fab fa-steam text-xl"></i> Steam</a>`;
            if (item.storeLinks.playstation) storeHTML += `<a href="${item.storeLinks.playstation}" target="_blank" class="store-btn btn-playstation"><i class="fab fa-playstation text-xl"></i> PS Store</a>`;
            if (item.storeLinks.xbox) storeHTML += `<a href="${item.storeLinks.xbox}" target="_blank" class="store-btn btn-xbox"><i class="fab fa-xbox text-xl"></i> Xbox Store</a>`;
            if (item.storeLinks.switch) storeHTML += `<a href="${item.storeLinks.switch}" target="_blank" class="store-btn btn-switch"><i class="fas fa-gamepad text-xl"></i> Nintendo eShop</a>`;
            storeHTML += `</div></div>`;
        }

        let datePlatformHTML = '';
        if (isReview) {
            const date = new Date(item.rDate);
            let icons = '';
            if (item.storeLinks && item.storeLinks.steam) icons += `<i class="fab fa-steam text-xl text-zinc-400"></i>`;
            if (item.storeLinks && item.storeLinks.playstation) icons += `<i class="fab fa-playstation text-xl text-blue-500"></i>`;
            if (item.storeLinks && item.storeLinks.xbox) icons += `<i class="fab fa-xbox text-xl text-green-600"></i>`;
            if (item.storeLinks && item.storeLinks.switch) icons += `<i class="fas fa-gamepad text-xl text-red-600"></i>`;
            datePlatformHTML = `
                <div class="flex justify-between items-center mb-6 px-4">
                    <div class="flex items-center gap-3 text-zinc-400">
                        <i class="fas fa-calendar"></i>
                        <span class="font-medium">${date.getDate()}. ${monthsShort[date.getMonth()]} ${date.getFullYear()}</span>
                    </div>
                    <div class="flex gap-4 text-2xl">${icons}</div>
                </div>`;
        }

        document.getElementById('modal-content').innerHTML = `
            <div class="fade-in">
                <img src="${item.img}" class="w-full rounded-3xl mb-8">
                ${datePlatformHTML}
                <div class="flex justify-center gap-4 mb-8 items-center">
                    ${isReview ? getScoreRingHTML(item.score, 160, "text-6xl", "modal-ring") : ''}
                </div>
                <div class="flex justify-center gap-3 mb-8">${getBadgesHTML(item)}</div>
                ${aiSummaryHTML}
                <h2 class="condensed text-6xl font-black italic uppercase text-center mb-8">${item.title || item.game}</h2>
                <div class="text-zinc-300 text-lg leading-relaxed mb-12">${item.content}</div>
                
                ${isReview ? getProsConsHTML(item.pros, item.cons) : ''}
                ${trailerHTML}
                ${videoHTML}
                ${galleryHTML}
                ${isReview ? getProTipsHTML(item.proTips) : ''}
                ${hwHTML}
                ${storeHTML}
                <div class="border-t border-zinc-800 pt-12">
                    <h3 class="condensed text-3xl font-black italic mb-8 uppercase">Mohlo by tě zajímat</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">${suggestedHTML}</div>
                </div>
            </div>`;
        document.getElementById('modal-overlay').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
        if (isReview) setTimeout(() => animateRing('.modal-ring', item.score), 200);
    };

    window.switchVideoTab = (el, index) => {
        document.querySelectorAll('.video-tab-content').forEach(c => c.classList.add('hidden'));
        const target = document.querySelector(`.video-tab-content[data-tab="${index}"]`);
        if (target) target.classList.remove('hidden');
    };

    window.switchVideoTabPrev = (currentIndex) => {
        const tabsCount = document.querySelectorAll('.video-tab-content').length;
        const newIndex = currentIndex - 1 < 0 ? tabsCount - 1 : currentIndex - 1;
        switchVideoTab(null, newIndex);
    };

    window.switchVideoTabNext = (currentIndex) => {
        const tabsCount = document.querySelectorAll('.video-tab-content').length;
        const newIndex = (currentIndex + 1) % tabsCount;
        switchVideoTab(null, newIndex);
    };

    window.openImageModal = (src) => {
        document.getElementById('modal-content').innerHTML = `
            <div class="flex justify-center items-center min-h-[80vh] p-4">
                <img src="${src}" class="max-h-[85vh] max-w-full rounded-3xl shadow-2xl cursor-zoom-out" onclick="closeModal()">
            </div>`;
        document.getElementById('modal-overlay').style.display = 'block';
    };

    window.closeModal = () => document.getElementById('modal-overlay').style.display = 'none';

    window.navigateToTab = (tab) => {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.getElementById('tab-' + tab).classList.remove('hidden');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active-nav'));
        document.querySelector(`.nav-link[data-tab="${tab}"]`).classList.add('active-nav');
        document.getElementById('mobileMenu').classList.remove('show');
        applyFade('tab-' + tab); 
        window.scrollTo({ top: 0, behavior: 'smooth' });
        if (tab === 'recenze') renderReviewsPage(); 
        if (tab === 'kalendar') renderCalendar();
    };

    window.nextSlide = (dayId, total, event) => {
        if (event) event.stopPropagation();
        let container = document.getElementById('carousel-' + dayId);
        let current = parseInt(container.dataset.current);
        document.getElementById('slide-' + dayId + '-' + current).classList.add('hidden');
        current = (current + 1) % total;
        container.dataset.current = current;
        document.getElementById('slide-' + dayId + '-' + current).classList.remove('hidden');
    };

    window.prevSlide = (dayId, total, event) => {
        if (event) event.stopPropagation();
        let container = document.getElementById('carousel-' + dayId);
        let current = parseInt(container.dataset.current);
        document.getElementById('slide-' + dayId + '-' + current).classList.add('hidden');
        current = (current - 1 + total) % total;
        container.dataset.current = current;
        document.getElementById('slide-' + dayId + '-' + current).classList.remove('hidden');
    };

    document.addEventListener('mousemove', e => { 
        const s = document.getElementById('spotlight'); 
        if (s) { 
            s.style.setProperty('--x', e.clientX + 'px'); 
            s.style.setProperty('--y', e.clientY + 'px'); 
        } 
    });
    window.onload = renderAll;
    </script>
</body>
</html>
