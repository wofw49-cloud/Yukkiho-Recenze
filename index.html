    title: `Risk s Pragmatou se Capcomu vyplácí, i přes odklady má skvělá čísla`,

    rDate: `2026-05-07T15:33:00`, 
    cz: false, 
    content: `Capcom v poslední době válí a potvrzuje to i jejich nejnovější sci-fi projekt <b>Pragmata</b>. Přestože o hře stále nevíme všechno a prošla si několika bolestivými odklady, finanční výsledky a zájem hráčů naznačují, že sázka na úplně novou značku byla správným krokem.<br><br>

<b>Kvalita nad rychlostí:</b> Vývojáři zdůrazňují, že za odklady stojí snaha o maximální preciznost. Pragmata má využívat plný potenciál aktuální generace konzolí a nabídnout vizuální i herní zážitek, který si lidé zapamatují. Trpělivost se v tomto případě zjevně vyplácí nejen tvůrcům, ale i akcionářům.<br><br>
Vypadá to, že se Capcom definitivně vrací na vrchol a nebojí se riskovat tam, kde ostatní vydavatelé raději sázejí na nekonečné remaky.`

    cz: false,

        // PARTICLES
        function initParticles() {
            const canvas = document.getElementById('particles');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let pts = [];
            for(let i=0; i<50; i++) pts.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2, vx: Math.random()*0.5-0.25, vy: Math.random()*0.5-0.25 });
            function anim() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = '#ff0000';
                pts.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if(p.x<0 || p.x>canvas.width) p.vx *= -1;
                    if(p.y<0 || p.y>canvas.height) p.vy *= -1;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
                });
                requestAnimationFrame(anim);
            }
            anim();
        }

                link.classList.add('active-nav'); 
                document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
                const newTab = document.getElementById('tab-' + link.dataset.tab);
                newTab.classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' }); 
            }); 
        });
        window.onclick = () => { document.getElementById('month-list').classList.remove('show'); };
        window.onload = init;
    </script>
</body>
</html>
