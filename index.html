<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUKKI • Gaming Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .title-font { font-family: 'Orbitron', sans-serif; }
        .neon { text-shadow: 0 0 20px #c026d3, 0 0 40px #a855f7; }
        .tab-active { border-bottom: 4px solid #c026d3; color: white; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <nav class="bg-black border-b border-purple-600 fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-br from-purple-600 to-pink-600 rounded-2xl flex items-center justify-center text-3xl">🌀</div>
                <span class="text-4xl font-bold tracking-widest neon title-font">YUKKI</span>
            </div>

            <div class="flex gap-8 text-lg font-medium">
                <button onclick="switchTab(0)" class="tab-active pb-1 px-4" id="tab-0">DOMŮ</button>
                <button onclick="switchTab(1)" class="pb-1 px-4 hover:text-purple-400" id="tab-1">NOVINKY</button>
                <button onclick="switchTab(2)" class="pb-1 px-4 hover:text-purple-400" id="tab-2">RECENZE</button>
                <button onclick="switchTab(3)" class="pb-1 px-4 hover:text-purple-400" id="tab-3">ŽEBŘÍČKY</button>
            </div>

            <button onclick="toggleLogin()" class="px-6 py-3 bg-gradient-to-r from-purple-600 to-pink-600 rounded-2xl font-bold flex items-center gap-2">
                <i class="fas fa-user"></i>
                <span id="loginText">PŘIHLÁSIT SE</span>
            </button>
        </div>
    </nav>

    <main class="pt-24 max-w-7xl mx-auto px-6 pb-20">

        <!-- DOMŮ -->
        <div id="page-0">
            <h1 class="text-6xl font-bold text-center mt-10 mb-2 neon title-font">Vítej zpátky, Yukki</h1>
            <div id="hero-news" onclick="openDetail('news', 0)" class="cursor-pointer relative h-[65vh] rounded-3xl overflow-hidden mb-12 border border-purple-500/30"></div>

            <h2 class="text-3xl font-bold mb-6 title-font">Poslední recenze</h2>
            <div id="home-reviews" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </div>

        <!-- NOVINKY + RECENZE + ŽEBŘÍČKY (stejné jako dříve) -->
        <div id="page-1" class="hidden">...</div>
        <div id="page-2" class="hidden">...</div>
        <div id="page-3" class="hidden">...</div>
    </main>

    <!-- ADMIN BAR + modals (stejné) -->

    <!-- DETAIL MODAL - NOVÝ ČISTÝ DESIGN -->
    <div id="detailModal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center">
        <div class="bg-zinc-900 rounded-3xl w-full max-w-4xl border border-purple-500 overflow-hidden">
            <!-- Obrázek 16:9 -->
            <div id="modal-image" class="w-full aspect-video bg-black"></div>
            
            <div class="p-8">
                <h2 id="modal-title" class="text-4xl font-bold title-font"></h2>
                
                <!-- Datum a score odděleně -->
                <div class="flex items-center gap-6 mt-3">
                    <p id="modal-date" class="text-purple-400 text-lg"></p>
                    <div id="modal-score" class="text-5xl font-bold text-purple-400"></div>
                </div>

                <div id="modal-content" class="mt-8 text-gray-300 leading-relaxed text-[17px] whitespace-pre-wrap"></div>
                
                <button onclick="closeModal()" class="mt-10 px-10 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl font-medium">
                    Zavřít
                </button>
            </div>
        </div>
    </div>

    <script>
        // ... (celý script z předchozí verze zůstává)

        function openDetail(type, i) {
            const item = type === 'news' ? news[i] : reviews[i];
            
            document.getElementById('modal-image').innerHTML = `<img src="${item.image}" class="w-full h-full object-cover">`;
            document.getElementById('modal-title').textContent = item.title;
            document.getElementById('modal-date').textContent = item.date;
            
            const scoreEl = document.getElementById('modal-score');
            if (type === 'review' && item.score) {
                scoreEl.textContent = item.score + "%";
                scoreEl.classList.remove('hidden');
            } else {
                scoreEl.classList.add('hidden');
            }
            
            document.getElementById('modal-content').innerHTML = item.content.replace(/\n/g, '<br><br>');
            document.getElementById('detailModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.add('hidden');
        }

        // Zbytek funkcí (loadData, render atd.) zůstává stejný jako minule
    </script>
</body>
</html>
