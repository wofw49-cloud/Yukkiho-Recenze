<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUKKI • Gaming Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .title-font { font-family: 'Orbitron', sans-serif; }
        .neon { text-shadow: 0 0 20px #c026d3, 0 0 40px #a855f7; }
        .tab-active { border-bottom: 4px solid #c026d3; color: white; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <nav class="bg-black border-b border-purple-600 fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-br from-purple-600 to-pink-600 rounded-2xl flex items-center justify-center text-3xl">🌀</div>
                <span class="text-4xl font-bold tracking-widest neon title-font">YUKKI</span>
            </div>

            <div class="flex gap-8 text-lg font-medium">
                <button onclick="switchTab(0)" class="tab-active pb-1 px-4" id="tab-0">DOMŮ</button>
                <button onclick="switchTab(1)" class="pb-1 px-4 hover:text-purple-400" id="tab-1">NOVINKY</button>
            </div>

            <button onclick="toggleLogin()" class="px-6 py-3 bg-gradient-to-r from-purple-600 to-pink-600 rounded-2xl font-bold flex items-center gap-2">
                <i class="fas fa-user"></i>
                <span id="loginText">PŘIHLÁSIT SE</span>
            </button>
        </div>
    </nav>

    <main class="pt-24 max-w-7xl mx-auto px-6 pb-20">
        <div id="page-0">
            <h1 class="text-6xl font-bold text-center mt-10 mb-2 neon title-font">Vítej zpátky, Yukki</h1>
            <div id="hero-news" onclick="openDetail(0)" class="cursor-pointer relative h-[65vh] rounded-3xl overflow-hidden mb-12 border border-purple-500/30"></div>
        </div>

        <div id="page-1" class="hidden">
            <h2 class="text-4xl font-bold title-font mb-8">NOVINKY</h2>
            <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </div>
    </main>

    <!-- DETAIL MODAL -->
    <div id="detailModal" class="hidden fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-6">
        <div class="bg-zinc-900 border border-purple-500 rounded-3xl w-full max-w-3xl max-h-[90vh] overflow-auto">
            <div class="p-8">
                <button onclick="closeModal()" class="float-right text-4xl text-gray-400 hover:text-white">✕</button>
                <div id="modal-image" class="rounded-2xl overflow-hidden mb-6 w-full"></div>
                <h2 id="modal-title" class="text-4xl font-bold title-font mb-4"></h2>
                <p id="modal-date" class="text-purple-400 mb-6"></p>
                <div id="modal-content" class="text-lg leading-relaxed whitespace-pre-wrap"></div>
            </div>
        </div>
    </div>

    <!-- LOGIN MODAL -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center">
        <div class="bg-zinc-900 p-10 rounded-3xl w-full max-w-md border border-purple-500">
            <h2 class="text-3xl font-bold mb-6 text-center title-font">YUKKI ADMIN</h2>
            <input id="loginUser" value="yukki" class="w-full mb-4 bg-zinc-800 border border-purple-500 rounded-2xl px-6 py-4">
            <input id="loginPass" type="password" value="yukki123" class="w-full mb-6 bg-zinc-800 border border-purple-500 rounded-2xl px-6 py-4">
            <button onclick="adminLogin()" class="w-full py-4 bg-gradient-to-r from-purple-600 to-pink-600 rounded-2xl font-bold">Přihlásit se</button>
        </div>
    </div>

    <script>
        let isAdmin = false;
        let news = [{
            id: 2,
            title: "Assassin's Creed Black Flag Resynced – datum vydání je venku!",
            image: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/3751950/header.jpg?t=1777900688",
            date: "2026-05-06",
            content: `Po letech spekulací a leaků je to konečně oficiální. Ubisoft oznámil remake milovaného pirátského dílu na 9. července 2026.

Hra se staví od základu na novém enginu, dostane kompletně předělanou grafiku, lepší animace, vylepšené námořní bitvy a odstranění některých frustrujících mechanik z originálu.

Fanoušci jsou z toho v extázi. Black Flag je pro spoustu lidí dodnes nejlepší díl série.`
        }];

        function renderHome() {
            const n = news[0];
            document.getElementById('hero-news').innerHTML = `
                <img src="${n.image}" class="absolute inset-0 w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black via-black/70"></div>
                <div class="absolute bottom-12 left-12 right-12">
                    <h2 class="text-5xl font-bold title-font">${n.title}</h2>
                    <p class="text-xl text-gray-300 mt-4">${n.content.substring(0, 180)}...</p>
                </div>
            `;
        }

        function renderNews() {
            const container = document.getElementById('news-container');
            container.innerHTML = news.map((n, i) => `
                <div class="bg-zinc-900 rounded-3xl overflow-hidden">
                    <img src="${n.image}" class="w-full h-56 object-cover" onclick="openDetail(${i})">
                    <div class="p-6">
                        <h3 onclick="openDetail(${i})" class="text-2xl font-bold cursor-pointer">${n.title}</h3>
                        <p class="text-purple-400 text-sm mt-2">${n.date}</p>
                        <p class="mt-4">${n.content}</p>
                        ${isAdmin ? `
                        <div class="flex gap-3 mt-6">
                            <button onclick="editNews(${i}); event.stopImmediatePropagation();" class="flex-1 py-3 bg-blue-600 rounded-2xl text-sm">UPRAVIT</button>
                            <button onclick="deleteNews(${i}); event.stopImmediatePropagation();" class="flex-1 py-3 bg-red-600 rounded-2xl text-sm">SMAZAT</button>
                        </div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function openDetail(i) {
            const n = news[i];
            document.getElementById('modal-image').innerHTML = `<img src="${n.image}" class="w-full">`;
            document.getElementById('modal-title').textContent = n.title;
            document.getElementById('modal-date').textContent = n.date;
            document.getElementById('modal-content').textContent = n.content;
            document.getElementById('detailModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.add('hidden');
        }

        function switchTab(n) {
            document.querySelectorAll('[id^="page-"]').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${n}`).classList.remove('hidden');
        }

        function toggleLogin() {
            document.getElementById('loginModal').classList.toggle('hidden');
        }

        function adminLogin() {
            if (document.getElementById('loginUser').value === "yukki" && document.getElementById('loginPass').value === "yukki123") {
                isAdmin = true;
                document.getElementById('loginText').innerHTML = '👑 YUKKI';
                toggleLogin();
                renderNews();
                alert("✅ Přihlášen jako admin! Nyní vidíš tlačítka Upravit / Smazat.");
            } else {
                alert("Špatné heslo! (yukki123)");
            }
        }

        function editNews(i) {
            alert("Upravit novinku " + news[i].title + "\n\n(Tato funkce bude doplněna v další verzi)");
        }

        function deleteNews(i) {
            if (confirm("Opravdu smazat tuto novinku?")) {
                news.splice(i, 1);
                renderNews();
                renderHome();
            }
        }

        window.onload = () => {
            renderHome();
            renderNews();
            switchTab(0);
        };
    </script>
</body>
</html>
