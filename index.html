    function getBadgesHTML(item) {
        let html = '';
        if (item.cz || item.czech) html += `<span class="cz-flag"><img src="https://flagcdn.com/w20/cz.png" alt="Česky" class="h-4 w-6 rounded-sm">ČESKY</span>`;
        if (item.earlyAccess) html += `<span class="px-4 py-1 text-xs font-bold bg-orange-500 rounded-3xl">EARLY ACCESS</span>`;
        if (item.isDLC) html += `<span class="px-4 py-1 text-xs font-bold bg-violet-600 rounded-3xl">DLC</span>`;
        return html;
    }

    function getPlatformLinksHTML(item) {
        if (!item.platforms || !item.storeLinks) return '';
        let html = '';
        item.platforms.forEach(p => {
            const lower = p.toLowerCase();
            let key = lower === 'ps5' ? 'playstation' : lower === 'xbox' ? 'xbox' : lower;
            const url = item.storeLinks[key];
            if (url) {
                let colorClass = '';
                if (lower === 'pc' || lower === 'steam') colorClass = 'platform-steam';
                else if (lower.includes('ps')) colorClass = 'platform-ps';
                else if (lower.includes('xbox')) colorClass = 'platform-xbox';
                else if (lower.includes('switch')) colorClass = 'platform-switch';
                const icon = lower === 'pc' || lower === 'steam' ? `<i class="fab fa-steam mr-1"></i>` : 
                             lower.includes('ps') ? `<i class="fab fa-playstation mr-1"></i>` : 
                             lower.includes('xbox') ? `<i class="fab fa-xbox mr-1"></i>` : 
                             `<i class="fas fa-gamepad mr-1"></i>`;
                html += `<a href="${url}" target="_blank" onclick="event.stopImmediatePropagation()" class="inline-flex items-center px-4 py-1 text-xs font-bold bg-zinc-700 hover:bg-zinc-600 ${colorClass} rounded-3xl transition-colors">${icon}${p}</a>`;
            }
        });
        return html;
    }

    function toggleMobileMenu() {
        const menu = document.getElementById('mobileMenu');
        menu.classList.toggle('show');
    }

    window.navigateToTab = function(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.getElementById('tab-' + tab).classList.remove('hidden');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active-nav'));
        const activeLink = document.querySelector(`.nav-link[data-tab="${tab}"]`);
        if (activeLink) activeLink.classList.add('active-nav');
        document.getElementById('mobileMenu').classList.remove('show');
        window.scrollTo({top: 0, behavior: 'smooth'});
    };

    function getShareUrl(id) {
        return window.location.origin + window.location.pathname + '?id=' + id;
    }

    window.shareToFacebook = function(id) {
        const item = [...state.news, ...state.reviews].find(x => x.id === id);
        if (!item) return;
        const title = item.title || item.game;
        const url = getShareUrl(id);
        const quote = encodeURIComponent(title + "\n\nVíce na: " + url);
        const fbUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}&quote=${quote}`;
        window.open(fbUrl, '_blank');
    };

    window.copyLink = function(id) {
        navigator.clipboard.writeText(getShareUrl(id)).then(() => {
            alert('✅ Odkaz zkopírován do schránky!');
        });
    };

    function updateOGTags(item) {
        if (!item) return;
        document.getElementById('og-title').setAttribute('content', item.title || item.game);
        document.getElementById('og-desc').setAttribute('content', (item.content || '').substring(0, 160));
        document.getElementById('og-image').setAttribute('content', item.img);
        document.getElementById('og-url').setAttribute('content', getShareUrl(item.id));
    }

    function handleDeepLink() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if (id) {
            const numId = parseInt(id);
            const item = [...state.news, ...state.reviews, ...state.calendar].find(x => x.id === numId);
            if (item) {
                updateOGTags(item);
                setTimeout(() => openModal(numId), 600);
            }
        }
    }

        const heroLabel = heroItem.score !== undefined ? 'Právě vyšlo' : 'Nejnovější novinka';

        document.getElementById('hero-area').innerHTML = `
            <div class="relative h-[420px] md:h-[500px] rounded-[40px] overflow-hidden cursor-pointer" onclick="openModal(${heroItem.id})">
                <img src="${heroItem.img}" class="w-full h-full object-cover opacity-40">
                <div class="absolute inset-0 bg-gradient-to-t from-black"></div>
                <div class="absolute top-8 left-8">
                    <span class="px-5 py-2 text-xs font-black uppercase bg-red-600 text-white rounded">${heroType}</span>
                </div>
                <div class="absolute bottom-12 left-8 md:left-12">
                    <span class="text-red-400 text-sm font-black uppercase tracking-widest">${heroLabel}</span>
                    <h1 class="condensed text-5xl md:text-7xl font-black italic uppercase">${heroItem.title || heroItem.game}</h1>
                    <div class="flex gap-2 mt-6 flex-wrap">${getBadgesHTML(heroItem)}</div>
                </div>
            </div>`;

        document.getElementById('home-feed').innerHTML = combined.slice(1, 5).map(i => `
            <div class="feed-card flex flex-col md:flex-row items-start gap-6 p-6 cursor-pointer" onclick="openModal(${i.id})">
                <div class="relative">
                    <span class="absolute top-4 left-4 px-4 py-1 text-xs font-black uppercase bg-red-600 text-white rounded">${i.score ? 'RECENZE' : 'NOVINKA'}</span>
                    <img src="${i.img}" class="w-full md:w-48 h-48 md:h-28 object-cover rounded-2xl shrink-0">
                </div>
                <div class="flex-1 pt-2">
                    <h3 class="condensed text-2xl md:text-3xl font-black italic uppercase">${i.title || i.game}</h3>
                    <p class="text-zinc-400 text-sm mt-3 line-clamp-3">${i.content || ''}</p>
                    <div class="flex gap-2 mt-4 flex-wrap">${getBadgesHTML(i)}</div>
                </div>
            </div>`).join('');

        renderNewsPage();
        renderReviewsPage();

        const top5 = [...state.reviews].sort((a,b) => b.score - a.score).slice(0, 5);
        document.getElementById('side-hall').innerHTML = top5.map((r, idx) => `
            <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-zinc-900">
                <span class="condensed text-2xl font-black italic ${idx===0?'gold-text':'text-zinc-800'}">#${idx+1}</span>
                <span class="text-[11px] font-bold uppercase flex-1 px-4 truncate">${r.game}</span>
                <span class="font-black text-red-600">${r.score}%</span>
            </div>`).join('');
        
        document.getElementById('hall-full-list').innerHTML = [...state.reviews].sort((a,b) => b.score - a.score).map((r, idx) => `
            <div class="hall-item mb-4 flex flex-col md:flex-row items-center gap-6 bg-[#080808] p-6 rounded-3xl border border-zinc-900">
                <div class="condensed text-7xl font-black italic w-32 ${idx===0?'gold-text':'text-zinc-900'}">#${idx+1}</div>
                <img src="${r.img}" class="w-full md:w-56 h-32 rounded-3xl object-cover flex-shrink-0">
                <div class="flex-1"><h3 class="condensed text-4xl font-black italic uppercase">${r.game}</h3></div>
                <div class="text-7xl font-black italic text-red-600">${r.score}%</div>
            </div>`).join('');

        renderCalendar();
        renderSideCalendar();
    }

    function renderNewsPage() {
        const start = (state.newsPage - 1) * state.itemsPerPage;
        const pageItems = state.news.slice(start, start + state.itemsPerPage);
        document.getElementById('news-full-list').innerHTML = pageItems.map(n => `
            <div onclick="openModal(${n.id})" class="feed-card flex flex-col md:flex-row gap-8 p-8 cursor-pointer">
                <div class="relative">
                    <span class="absolute top-4 left-4 px-4 py-1 text-xs font-black uppercase bg-red-600 text-white rounded">NOVINKA</span>
                    <img src="${n.img}" class="w-full md:w-64 h-48 md:h-36 object-cover rounded-2xl shrink-0">
                </div>
                <div class="flex-1">
                    <h3 class="condensed text-4xl font-black italic uppercase">${n.title}</h3>
                    <p class="text-zinc-500 mt-4">${n.content}</p>
                </div>
            </div>`).join('');
        renderNewsPagination();
    }

    function renderReviewsPage() {
        const start = (state.reviewsPage - 1) * state.itemsPerPage;
        const pageItems = state.reviews.slice(start, start + state.itemsPerPage);
        document.getElementById('reviews-full-list').innerHTML = pageItems.map(r => `
            <div onclick="openModal(${r.id})" class="feed-card flex flex-col md:flex-row gap-8 p-8 cursor-pointer">
                <div class="relative">
                    <span class="absolute top-4 left-4 px-4 py-1 text-xs font-black uppercase bg-red-600 text-white rounded">RECENZE</span>
                    <img src="${r.img}" class="w-full md:w-64 h-48 md:h-36 object-cover rounded-2xl shrink-0">
                </div>
                <div class="flex-1">
                    <div class="text-5xl font-black italic text-red-600">${r.score}%</div>
                    <h3 class="condensed text-4xl font-black italic uppercase">${r.game}</h3>
                </div>
            </div>`).join('');
        renderReviewsPagination();
    }

    function renderNewsPagination() {
        const totalPages = Math.ceil(state.news.length / state.itemsPerPage);
        let html = `<div class="flex gap-3">`;
        if (state.newsPage > 1) html += `<button onclick="state.newsPage--; renderNewsPage()" class="px-5 py-2 bg-zinc-800 hover:bg-red-600 rounded-3xl font-bold">← Předchozí</button>`;
        html += `<span class="px-5 py-2 bg-zinc-900 rounded-3xl font-bold">${state.newsPage} / ${totalPages}</span>`;
        if (state.newsPage < totalPages) html += `<button onclick="state.newsPage++; renderNewsPage()" class="px-5 py-2 bg-zinc-800 hover:bg-red-600 rounded-3xl font-bold">Další →</button>`;
        html += `</div>`;
        document.getElementById('news-pagination').innerHTML = html;
    }

    function renderReviewsPagination() {
        const totalPages = Math.ceil(state.reviews.length / state.itemsPerPage);
        let html = `<div class="flex gap-3">`;
        if (state.reviewsPage > 1) html += `<button onclick="state.reviewsPage--; renderReviewsPage()" class="px-5 py-2 bg-zinc-800 hover:bg-red-600 rounded-3xl font-bold">← Předchozí</button>`;
        html += `<span class="px-5 py-2 bg-zinc-900 rounded-3xl font-bold">${state.reviewsPage} / ${totalPages}</span>`;
        if (state.reviewsPage < totalPages) html += `<button onclick="state.reviewsPage++; renderReviewsPage()" class="px-5 py-2 bg-zinc-800 hover:bg-red-600 rounded-3xl font-bold">Další →</button>`;
        html += `</div>`;
        document.getElementById('reviews-pagination').innerHTML = html;
    }

    function renderCalendar() {
        const minYear = 2000;
        const maxYear = 2030;
        const current = state.selectedYear;

        let yearHTML = `<div class="flex items-center justify-center gap-6">
            <button onclick="changeYear(-1)" class="w-9 h-9 flex items-center justify-center text-3xl text-zinc-400 hover:text-white transition-colors"><i class="fas fa-chevron-left"></i></button>
            <button onclick="state.selectedYear = ${current-1}; renderCalendar()" class="filter-btn px-6 ${current-1 < minYear ? 'opacity-30 pointer-events-none' : ''}">${current-1}</button>
            <button onclick="state.selectedYear = ${current}; renderCalendar()" class="filter-btn px-6 bg-red-600 border-red-600 text-white">${current}</button>
            <button onclick="state.selectedYear = ${current+1}; renderCalendar()" class="filter-btn px-6 ${current+1 > maxYear ? 'opacity-30 pointer-events-none' : ''}">${current+1}</button>
            <button onclick="changeYear(1)" class="w-9 h-9 flex items-center justify-center text-3xl text-zinc-400 hover:text-white transition-colors"><i class="fas fa-chevron-right"></i></button>
        </div>`;
        document.getElementById('year-nav').innerHTML = yearHTML;

        document.getElementById('month-nav').innerHTML = monthsShort.map((m, idx) => 
            `<button onclick="state.selectedMonth=${idx}; renderCalendar()" class="filter-btn ${state.selectedMonth === idx ? 'active' : ''}">${m}</button>`
        ).join('');

        const filtered = state.calendar.filter(c => {
            const d = new Date(c.rDate);
            return d.getFullYear() === state.selectedYear && d.getMonth() === state.selectedMonth;
        }).sort((a, b) => new Date(a.rDate) - new Date(b.rDate));

        sameDayData = {};
        filtered.forEach(c => {
            const key = new Date(c.rDate).toISOString().split('T')[0];
            if (!sameDayData[key]) sameDayData[key] = [];
            sameDayData[key].push(c);
        });

        let html = '';
        Object.keys(sameDayData).sort().forEach(key => {
            const group = sameDayData[key];
            const first = group[0];
            const d = new Date(first.rDate);
            const day = d.getDate();
            const monthShort = monthsShort[d.getMonth()];
            const hasMultiple = group.length > 1;

            html += `
            <div class="same-day-card bg-[#080808] border border-zinc-900 rounded-3xl overflow-hidden group cursor-default" data-date-key="${key}" data-current-index="0">
                <div class="relative">
                    <img src="${first.img}" class="w-full aspect-video object-cover same-day-image transition-all duration-300">
                    <div class="absolute top-3 left-3 bg-black/90 text-white px-3 py-1 rounded-3xl flex flex-col items-center justify-center min-w-[54px] shadow-inner">
                        <span class="text-3xl leading-none font-black">${day}</span>
                        <span class="text-[10px] font-black tracking-widest -mt-px">${monthShort}</span>
                    </div>
                    ${hasMultiple ? `
                    <button onclick="switchSameDay('${key}', -1); event.stopImmediatePropagation()" class="absolute left-3 top-1/2 -translate-y-1/2 bg-black/70 hover:bg-black text-white w-8 h-8 rounded-2xl flex items-center justify-center text-lg shadow-lg z-10"><i class="fas fa-chevron-left"></i></button>
                    <button onclick="switchSameDay('${key}', 1); event.stopImmediatePropagation()" class="absolute right-3 top-1/2 -translate-y-1/2 bg-black/70 hover:bg-black text-white w-8 h-8 rounded-2xl flex items-center justify-center text-lg shadow-lg z-10"><i class="fas fa-chevron-right"></i></button>` : ''}
                </div>
                <div class="p-4">
                    <h4 class="condensed text-lg font-black uppercase leading-tight same-day-name">${first.game}</h4>
                    <div class="flex gap-2 mt-3 flex-wrap">
                        ${getBadgesHTML(first)}
                        ${getPlatformLinksHTML(first)}
                    </div>
                </div>
            </div>`;
        });

        document.getElementById('calendar-grid').innerHTML = html || `<div class="col-span-full text-center py-20 text-zinc-700 font-bold uppercase">V tomto měsíci nic nevychází</div>`;
    }

    window.changeYear = function(delta) {
        let newYear = state.selectedYear + delta;
        if (newYear < 2000) newYear = 2000;
        if (newYear > 2030) newYear = 2030;
        state.selectedYear = newYear;
        renderCalendar();
    };

    window.switchSameDay = function(dateKey, direction) {
        const card = document.querySelector(`[data-date-key="${dateKey}"]`);
        if (!card) return;
        const group = sameDayData[dateKey];
        if (!group || group.length <= 1) return;

        let currentIndex = parseInt(card.dataset.currentIndex || 0);
        currentIndex = (currentIndex + direction + group.length) % group.length;
        card.dataset.currentIndex = currentIndex;

        const game = group[currentIndex];
        const image = card.querySelector('.same-day-image');
        const nameEl = card.querySelector('.same-day-name');
        const badgesEl = card.querySelector('.flex.gap-2.mt-3.flex-wrap');

        image.style.opacity = '0';
        setTimeout(() => {
            image.src = game.img;
            image.style.opacity = '1';
            nameEl.textContent = game.game;
            badgesEl.innerHTML = `${getBadgesHTML(game)}${getPlatformLinksHTML(game)}`;
        }, 180);
    };

    function renderSideCalendar() {
        const today = new Date();
        today.setHours(0,0,0,0);

        const futureReleases = state.calendar
            .filter(c => new Date(c.rDate) > today)
            .sort((a, b) => new Date(a.rDate) - new Date(b.rDate))
            .slice(0, 5);

        let html = futureReleases.map(c => {
            const d = new Date(c.rDate);
            const day = d.getDate();
            const monthShort = monthsShort[d.getMonth()];
            return `
            <div class="feed-card p-5 flex flex-col gap-3 cursor-default">
                <div class="flex items-center gap-5">
                    <div class="w-[72px] h-[72px] bg-[#ff0000] rounded-3xl flex flex-col items-center justify-center text-white condensed flex-shrink-0 text-center leading-none shadow-md">
                        <span class="text-[13px] font-black tracking-[1.5px]">${monthShort}</span>
                        <span class="text-5xl font-black -mt-1">${day}</span>
                    </div>
                    <div class="flex-1 condensed text-2xl font-black uppercase leading-tight">${c.game}</div>
                </div>
                <div class="flex gap-2 flex-wrap pl-[88px]">
                    ${getBadgesHTML(c)}
                    ${getPlatformLinksHTML(c)}
                </div>
            </div>`;
        }).join('');

        document.getElementById('side-calendar').innerHTML = html || `<div class="text-zinc-700 font-bold uppercase text-center py-12">Žádné blízké releasy</div>`;
    }

    window.openModal = (id) => {
        const item = [...state.news, ...state.reviews, ...state.calendar].find(x => x.id === id);
        if (!item) return;

        let extraHTML = '';
        if (item.score !== undefined) {
            extraHTML = `
            <div class="flex justify-between items-baseline mb-6">
                <div></div>
                <div class="text-red-600 text-[92px] leading-none font-black">${item.score}<span class="text-5xl align-bottom">%</span></div>
            </div>`;
        }

        let buyHTML = '';
        if (item.storeLinks) {
            buyHTML = `<div class="mt-8 border-t border-zinc-800 pt-8"><h3 class="uppercase font-black text-zinc-400 mb-4 text-lg">Koupit hru</h3><div class="flex flex-wrap gap-3">${Object.keys(item.storeLinks).map(key => `<a href="${item.storeLinks[key]}" target="_blank" class="flex-1 min-w-[140px] text-center px-6 py-4 bg-zinc-800 hover:bg-red-600 rounded-3xl font-bold text-sm transition-colors">${key === 'steam' ? 'Steam' : key === 'playstation' ? 'PlayStation Store' : key === 'xbox' ? 'Xbox Store' : key}</a>`).join('')}</div></div>`;
        }

        const modalContent = `
            <img src="${item.img}" class="w-full rounded-3xl mb-8 shadow-2xl">
            ${extraHTML}
            <h2 class="condensed text-5xl md:text-6xl font-black italic uppercase">${item.title || item.game}</h2>
            <div class="flex gap-2 mt-6 flex-wrap">${getBadgesHTML(item)}</div>
            ${buyHTML}
            ${item.content ? `<div class="mt-12 text-zinc-300 leading-relaxed prose prose-invert max-w-none">${item.content}</div>` : ''}
            
            <div class="mt-16 pt-8 border-t border-zinc-800">
                <div class="flex items-center gap-3 mb-6">
                    <span class="text-red-500 text-3xl">●</span>
                    <h3 class="condensed text-2xl font-black">SDÍLET PŘÍSPĚVEK</h3>
                </div>
                <div class="flex flex-col gap-4">
                    <button onclick="shareToFacebook(${id});" class="w-full flex items-center justify-center gap-4 bg-[#1877F2] hover:bg-[#1666d4] text-white font-bold py-6 px-8 rounded-3xl text-2xl transition-all shadow-lg">
                        <i class="fab fa-facebook-f text-4xl"></i>
                        <span>Sdílet na Facebooku</span>
                    </button>
                    <button onclick="copyLink(${id});" class="w-full flex items-center justify-center gap-4 bg-zinc-700 hover:bg-zinc-600 text-white font-bold py-6 px-8 rounded-3xl text-2xl transition-all">
                        <i class="fas fa-link text-4xl"></i>
                        <span>Kopírovat odkaz</span>
                    </button>
                </div>
            </div>

            <div class="mt-20 pt-12 border-t border-zinc-800">
                <h3 class="condensed text-3xl font-black mb-8">Mohlo by se vám líbit</h3>
                <div id="suggested-items" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
            </div>
        `;

        document.getElementById('modal-content').innerHTML = modalContent;

        const suggestions = [...state.news, ...state.reviews].filter(i => i.id !== id).sort(() => 0.5 - Math.random()).slice(0, 3);
        document.getElementById('suggested-items').innerHTML = suggestions.map(s => `
            <div onclick="closeModal(); setTimeout(() => openModal(${s.id}), 300)" class="feed-card cursor-pointer overflow-hidden">
                <img src="${s.img}" class="w-full h-40 object-cover">
                <div class="p-5"><h4 class="condensed text-xl font-black line-clamp-2">${s.title || s.game}</h4>${s.score ? `<div class="text-red-600 font-black text-2xl mt-2">${s.score}%</div>` : ''}</div>
            </div>`).join('');

        updateOGTags(item);
        document.getElementById('modal-overlay').style.display = 'block';
    };

    window.closeModal = () => { document.getElementById('modal-overlay').style.display = 'none'; };

    document.querySelectorAll('.nav-link').forEach(link => {
        link.onclick = () => {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active-nav'));
            link.classList.add('active-nav');
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + link.dataset.tab).classList.remove('hidden');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    });

    document.addEventListener('mousemove', e => {
        const s = document.getElementById('spotlight');
        s.style.setProperty('--x', e.clientX + 'px');
        s.style.setProperty('--y', e.clientY + 'px');
    });

    setInterval(() => { renderAll(); }, 60000);

    window.onload = function() {
        renderAll();
        handleDeepLink();
    };
    </script>
</body>
</html>
