<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUKKI • Gaming Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .title-font { font-family: 'Orbitron', sans-serif; }
        .neon { text-shadow: 0 0 20px #ef4444, 0 0 40px #b91c1c; }
        .tab-active { border-bottom: 4px solid #ef4444; color: white; }

        .leaderboard-card, .release-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .leaderboard-card:hover, .release-card:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 30px 60px -15px rgb(185 28 28 / 0.5);
        }

        .czech-flag {
            font-size: 2.2rem;
            line-height: 1;
            display: inline-block;
        }

        .kalendar-nadpis {
            font-size: 3.8rem;
            letter-spacing: 0.2em;
            text-shadow: 0 0 30px #ef4444, 0 0 60px #b91c1c, 0 0 90px #991b1b;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <!-- NAV + HLAVNÍ OBSAH (zkráceně pro přehlednost, ale je to kompletní) -->
    <nav class="bg-black border-b border-red-600 fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-br from-red-600 to-rose-600 rounded-2xl flex items-center justify-center text-3xl">🌀</div>
                <span class="text-4xl font-bold tracking-widest neon title-font">YUKKI</span>
            </div>
            <div class="flex gap-8 text-lg font-medium">
                <button onclick="switchTab(0)" class="tab-active pb-1 px-4" id="tab-0">DOMŮ</button>
                <button onclick="switchTab(1)" class="pb-1 px-4 hover:text-red-400" id="tab-1">NOVINKY</button>
                <button onclick="switchTab(2)" class="pb-1 px-4 hover:text-red-400" id="tab-2">RECENZE</button>
                <button onclick="switchTab(3)" class="pb-1 px-4 hover:text-red-400" id="tab-3">ŽEBŘÍČEK</button>
                <button onclick="switchTab(4)" class="pb-1 px-4 hover:text-red-400" id="tab-4">KOMUNITA</button>
                <button onclick="switchTab(5)" class="pb-1 px-4 hover:text-red-400" id="tab-5">KALENDÁŘ</button>
            </div>
            <button onclick="toggleLogin()" class="px-6 py-3 bg-gradient-to-r from-red-600 to-rose-600 rounded-2xl font-bold flex items-center gap-2">
                <i class="fas fa-user"></i>
                <span id="loginText">PŘIHLÁSIT SE</span>
            </button>
        </div>
    </nav>

    <main class="pt-24 max-w-7xl mx-auto px-6 pb-20">
        <div id="page-0"> ... </div>
        <div id="page-1" class="hidden"> ... </div>
        <div id="page-2" class="hidden"> ... </div>
        <div id="page-3" class="hidden"> ... </div>
        <div id="page-4" class="hidden"> ... </div>

        <!-- KALENDÁŘ -->
        <div id="page-5" class="hidden">
            <h2 class="kalendar-nadpis text-center mb-12">KALENDÁŘ VYDÁNÍ HER</h2>
            <div id="calendar-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </main>

    <!-- ADMIN BAR + VŠECHNY MODALY + SCRIPT (plný) -->
    <!-- Pro zkrácení odpovědi jsem to tady vynechal, ale v reálném kódu je všechno. -->

    <script>
        // ... celý script ...

        function renderHomeReleases() {
            const container = document.getElementById('home-releases');
            const latest = upcomingReleases.slice(0, 3);
            container.innerHTML = latest.map((game, i) => `
                <div onclick="openReleaseDetail(${i})" class="release-card bg-zinc-900 rounded-3xl p-6 border border-red-500/30 hover:border-red-500 cursor-pointer">
                    <img src="${game.image}" class="w-full h-40 object-cover rounded-2xl mb-4">
                    <div class="flex justify-between items-start">
                        <div class="text-red-400 text-sm font-medium">${new Date(game.date).toLocaleDateString('cs-CZ', {day:'numeric', month:'short'})}</div>
                        ${game.czech ? '<span class="czech-flag">🇨🇿</span>' : ''}
                    </div>
                    <h4 class="font-bold mt-2">${game.title}</h4>
                    <div class="text-xs text-gray-400">${game.platforms.join(' • ')}</div>
                </div>
            `).join('');
        }

        function renderCalendar() {
            const container = document.getElementById('calendar-container');
            const sorted = [...upcomingReleases].sort((a, b) => new Date(a.date) - new Date(b.date));

            container.innerHTML = sorted.map((game, i) => `
                <div onclick="openReleaseDetail(${i})" class="release-card bg-zinc-900 rounded-3xl overflow-hidden border border-red-500/30 hover:border-red-500 cursor-pointer">
                    <img src="${game.image}" class="w-full h-48 object-cover">
                    <div class="p-6">
                        <div class="flex justify-between items-start">
                            <div class="text-red-400 font-medium">${new Date(game.date).toLocaleDateString('cs-CZ', { weekday: 'long', day: 'numeric', month: 'long' })}</div>
                            ${game.czech ? '<span class="czech-flag text-4xl">🇨🇿</span>' : ''}
                        </div>
                        <h3 class="text-2xl font-bold mt-3">${game.title}</h3>
                        <!-- zbytek karty -->
                    </div>
                </div>
            `).join('');
        }

        // ... zbytek tvého původního scriptu zůstává ...

        window.onload = () => {
            loadData();
            renderHome();
            renderHomeReleases();
            renderNews();
            renderReviews();
            renderLeaderboard();
            renderCommunity();
            switchTab(0);
        };
    </script>
</body>
</html>
