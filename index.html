<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUKKI • Ultimate Edition 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Barlow+Condensed:ital,wght@0,700;0,900;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { --red: #ff0000; --bg: #050505; --border: #1a1a1a; }
        body { font-family: 'Inter', sans-serif; background: #050505; color: #fff; margin: 0; overflow-x: hidden; }
        #spotlight { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: -1; background: radial-gradient(circle 450px at var(--x, 50%) var(--y, 50%), rgba(220, 38, 38, 0.12), transparent 100%); }
        .condensed { font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; }
        
        nav { background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); position: fixed; width: 100%; top: 0; z-index: 1000; height: 70px; }
        
        .nav-link { font-weight: 800; font-size: 13px; text-transform: uppercase; padding: 0 16px; cursor: pointer; opacity: 0.6; transition: 0.3s; line-height: 70px; display: inline-block; letter-spacing: 1px; position: relative; }
        .nav-link:hover, .active-nav { opacity: 1; color: var(--red); }
        .nav-link.active-nav::after { content: ''; position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%); width: 24px; height: 3px; background: var(--red); }

        .feed-card { transition: all 0.4s; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; overflow: hidden; }
        .feed-card:hover { background: rgba(255, 255, 255, 0.05); border-color: rgba(220, 38, 38, 0.4); transform: translateY(-4px); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; overflow-y: auto; }
        .close-modal { position: fixed; top: 25px; right: 25px; font-size: 42px; cursor: pointer; color: #fff; background: rgba(255,255,255,0.1); width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2010; }

        .main-grid { display: grid; grid-template-columns: 1fr 320px; gap: 28px; }
        @media (max-width: 1024px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="spotlight"></div>

    <nav>
        <div class="max-w-[1600px] mx-auto px-4 md:px-8 flex items-center justify-between h-[70px]">
            <div class="flex items-center gap-8">
                <div class="text-3xl font-black italic tracking-tighter cursor-pointer" onclick="location.reload()">YUKKI<span class="text-red-600">.</span></div>
                
                <div class="hidden lg:flex items-center gap-8 desktop-nav">
                    <div class="nav-link active-nav" data-tab="domu">ÚVOD</div>
                    <div class="nav-link" data-tab="novinky">NOVINKY</div>
                    <div class="nav-link" data-tab="recenze">RECENZE</div>
                    <div class="nav-link" data-tab="kalendar">KALENDÁŘ</div>
                    <div class="nav-link" data-tab="elite">PRESTIGE HALL</div>
                </div>
            </div>

            <button onclick="toggleMobileMenu()" class="lg:hidden text-4xl text-red-500 p-1"><i class="fas fa-bars"></i></button>
        </div>

        <div id="mobileMenu" class="hidden lg:hidden bg-[#0a0a0a] border-t border-zinc-800 px-6 py-8 text-xl font-bold">
            <div onclick="navigateToTab('domu')" class="py-4 border-b border-zinc-800">Úvod</div>
            <div onclick="navigateToTab('novinky')" class="py-4 border-b border-zinc-800">Novinky</div>
            <div onclick="navigateToTab('recenze')" class="py-4 border-b border-zinc-800">Recenze</div>
            <div onclick="navigateToTab('kalendar')" class="py-4 border-b border-zinc-800">Kalendář</div>
            <div onclick="navigateToTab('elite')" class="py-4">Prestige Hall</div>
        </div>
    </nav>

    <div class="max-w-[1600px] mx-auto px-4 md:px-8 pt-20 pb-20">
        <div id="tab-domu" class="tab-content">
            <div id="hero-area" class="mb-12"></div>
            <div class="main-grid">
                <div id="home-feed" class="space-y-8"></div>
                <div class="sidebar-wrapper space-y-12">
                    <div class="prestige-box bg-[#080808] p-6 rounded-3xl border border-zinc-900">
                        <h3 class="condensed text-xl font-black mb-6 italic">PRESTIGE HALL <span class="text-zinc-700">#TOP5</span></h3>
                        <div id="side-hall" class="space-y-3"></div>
                    </div>
                    <div class="releasy-box bg-[#080808] p-6 rounded-3xl border border-zinc-900">
                        <h3 class="condensed text-xl font-black mb-6 italic uppercase">BLÍZKÉ RELEASY</h3>
                        <div id="side-calendar" class="space-y-5"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-novinky" class="tab-content hidden">
            <h2 class="condensed text-5xl font-black italic mb-10 text-center">NOVINKY</h2>
            <div id="news-full-list" class="space-y-6"></div>
        </div>

        <div id="tab-recenze" class="tab-content hidden">
            <h2 class="condensed text-5xl font-black italic mb-10 text-center">RECENZE</h2>
            <div id="reviews-full-list" class="space-y-6"></div>
        </div>

        <div id="tab-kalendar" class="tab-content hidden">
            <h2 class="condensed text-5xl md:text-6xl font-black italic mb-10 text-center">KALENDÁŘ HER</h2>
            <div id="calendar-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </div>

        <div id="tab-elite" class="tab-content hidden">
            <div class="text-center mb-16"><h2 class="condensed text-7xl font-black italic gold-text">PRESTIGE HALL</h2></div>
            <div id="hall-full-list" class="space-y-8"></div>
        </div>
    </div>

    <div id="modal-overlay" class="modal">
        <div class="close-modal" onclick="closeModal()">×</div>
        <div class="modal-body max-w-4xl mx-auto py-12 px-4 md:py-20" id="modal-content"></div>
    </div>

    <script>
    const state = {
        selectedYear: 2026,
        selectedMonth: 4,
        newsPage: 1,
        reviewsPage: 1,
        itemsPerPage: 6,
        news: [
            { id: 1006, title: "Microsoft poodhaluje novou generaci Xboxu", img: "https://indian-tv.cz/uploads/ls/97793d98d413346574f269a886cff999/1755725042.jpg", rDate: "2026-05-08", content: "Microsoft konečně prolomil mlčení..." },
            { id: 1005, title: "Risk se vyplatil, Pragmata hlásí úžasné výsledky", img: "https://indian-tv.cz/uploads/ls/09a7b79bb04446a886cff999e3185127/1755725042.jpg", rDate: "2026-05-08T11:00:00", content: "Capcom může slavit..." },
            { id: 1003, title: "Konec velkých slev na PlayStation Store? Sony zavádí zvláštní změny", img: "https://indian-tv.cz/uploads/ls/69842f4c33956699321f69a886cff999/1755725042.jpg", rDate: "2026-05-08T06:05:00", content: "Majitelé konzolí PlayStation..." },
            { id: 1002, title: "Kingdom Come: Deliverance 2 už má i vlastní parfém", img: "https://indian-tv.cz/uploads/ls/9ea82f5c2293446585f169a886cff999/1755725042.jpg", rDate: "2026-05-08T08:30:00", content: "Marketingová kampaň..." },
            { id: 1001, title: "RISK S PRAGMATOU SE CAPCOMU VYPLÁCÍ", img: "https://picsum.photos/id/1015/1200/630", rDate: "2026-05-07", content: "Dlouho odkládaný sci-fi projekt..." },
            { id: 1004, title: "Nové detaily o 007: First Light", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/3768760/77725bbd5a29b4bd0e7b563983a17591dd942233/ss_77725bbd5a29b4bd0e7b563983a17591dd942233.1920x1080.jpg?t=1777992128", rDate: "2026-05-07T09:55:00", content: "Studio IO Interactive..." }
        ],
        reviews: [
            { id: 2010, game: "Black Myth: Wukong", score: 88, rDate: "2024-08-20T12:00:00", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2358720/ss_415397426d4c939ebb8a93ac66831f28ee7199be.1920x1080.jpg?t=1760601605", content: "Cesta na západ..." },
            { id: 2008, game: "Mafia: The Old Country", score: 80, rDate: "2025-09-29T10:30:00", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1941540/ss_44047e62744c4a7201a0238994d23f3ca72649cb.1920x1080.jpg?t=1764177372", content: "Mafia: The Old Country..." },
            { id: 2002, game: "DOOM Eternal", score: 95, rDate: "2020-03-24T15:45:00", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/782330/header.jpg?t=1755109910", content: "DOOM Eternal..." }
        ],
        calendar: [
            { id: 3001, game: "007 FIRST LIGHT", rDate: "2026-05-27", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/3768760/header.jpg", platforms: ["PC", "PS5", "Xbox"], czech: true, storeLinks: { steam: "#" } },
            { id: 3009, game: "Forza Horizon 6", rDate: "2026-05-19", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1551360/header.jpg", platforms: ["Steam", "Xbox", "PS5"], czech: true, storeLinks: { steam: "#" } }
        ]
    };

    const monthsShort = ["LED", "ÚNO", "BŘE", "DUB", "KVĚ", "ČER", "ČVC", "SRP", "ZÁŘ", "ŘÍJ", "LIS", "PRO"];

    function getBadgesHTML(item) {
        let html = '';
        if (item.cz || item.czech) html += `<span class="cz-flag">ČESKY</span>`;
        return html;
    }

    function getPlatformLinksHTML(item) {
        if (!item.platforms) return '';
        return item.platforms.map(p => `<span class="inline-flex items-center px-4 py-1 text-xs font-bold bg-zinc-700 rounded-3xl">${p}</span>`).join('');
    }

    function toggleMobileMenu() {
        document.getElementById('mobileMenu').classList.toggle('show');
    }

    window.navigateToTab = function(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.getElementById('tab-' + tab).classList.remove('hidden');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active-nav'));
        const active = document.querySelector(`.nav-link[data-tab="${tab}"]`);
        if (active) active.classList.add('active-nav');
    };

    function renderAll() {
        const combined = [...state.news, ...state.reviews].sort((a,b) => new Date(b.rDate) - new Date(a.rDate));

        const hero = combined[0];
        document.getElementById('hero-area').innerHTML = `
            <div class="relative h-[420px] md:h-[500px] rounded-[40px] overflow-hidden cursor-pointer" onclick="openModal(${hero.id})">
                <img src="${hero.img}" class="w-full h-full object-cover opacity-40">
                <div class="absolute inset-0 bg-gradient-to-t from-black"></div>
                <div class="absolute top-8 left-8">
                    <span class="px-5 py-2 text-xs font-black uppercase bg-red-600 text-white rounded">${hero.score ? 'RECENZE' : 'NOVINKA'}</span>
                </div>
                <div class="absolute bottom-12 left-8 md:left-12">
                    <span class="text-red-400 text-sm font-black uppercase tracking-widest">${hero.score ? 'Právě vyšlo' : 'Nejnovější novinka'}</span>
                    <h1 class="condensed text-5xl md:text-7xl font-black italic uppercase">${hero.title || hero.game}</h1>
                </div>
            </div>`;

        // Delší feed - novinky + recenze
        let feedHTML = '';
        combined.slice(0, 8).forEach(i => {
            feedHTML += `
            <div class="feed-card flex flex-col md:flex-row gap-6 p-6 cursor-pointer" onclick="openModal(${i.id})">
                <div class="relative md:w-80 flex-shrink-0">
                    <span class="absolute top-4 left-4 px-4 py-1 text-xs font-black uppercase bg-red-600 text-white rounded">${i.score ? 'RECENZE' : 'NOVINKA'}</span>
                    <img src="${i.img}" class="w-full h-52 object-cover rounded-2xl">
                </div>
                <div class="flex-1">
                    <h3 class="condensed text-3xl font-black italic uppercase">${i.title || i.game}</h3>
                    <p class="text-zinc-400 mt-3 line-clamp-4">${i.content || ''}</p>
                    ${i.score ? `<div class="mt-4 text-5xl font-black text-red-600">${i.score}%</div>` : ''}
                </div>
            </div>`;
        });
        document.getElementById('home-feed').innerHTML = feedHTML;

        // Side hall
        const topReviews = [...state.reviews].sort((a,b) => b.score - a.score).slice(0,5);
        document.getElementById('side-hall').innerHTML = topReviews.map((r,i) => `
            <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl">
                <span class="condensed text-2xl font-black italic ${i===0 ? 'gold-text' : 'text-zinc-800'}">#${i+1}</span>
                <span class="flex-1 px-4 truncate">${r.game}</span>
                <span class="font-black text-red-600">${r.score}%</span>
            </div>`).join('');
    }

    function openModal(id) {
        const item = [...state.news, ...state.reviews, ...state.calendar].find(x => x.id === id);
        if (!item) return;

        const content = `
            <img src="${item.img}" class="w-full rounded-3xl mb-8">
            <h2 class="condensed text-5xl font-black italic uppercase">${item.title || item.game}</h2>
            ${item.score ? `<div class="text-red-600 text-8xl font-black mt-4">${item.score}%</div>` : ''}
            ${item.content ? `<div class="mt-8 text-zinc-300">${item.content}</div>` : ''}
        `;

        document.getElementById('modal-content').innerHTML = content;
        document.getElementById('modal-overlay').style.display = 'block';
    }

    window.closeModal = () => document.getElementById('modal-overlay').style.display = 'none';

    document.addEventListener('mousemove', e => {
        document.getElementById('spotlight').style.setProperty('--x', e.clientX + 'px');
        document.getElementById('spotlight').style.setProperty('--y', e.clientY + 'px');
    });

    window.onload = renderAll;
    </script>
</body>
</html>
