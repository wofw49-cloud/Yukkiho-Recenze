<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yukkiho Recenze</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root { --accent: #ff1a1a; }
    body { font-family: 'Inter', sans-serif; background: #050505; color: #e0e0e0; }
    .logo { font-family: 'Press Start 2P', cursive; font-size: 2.8rem; line-height: 1; background: linear-gradient(90deg, #ff1a1a, #ff6666); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-link { position: relative; transition: all 0.3s; }
    .nav-link:after { content: ''; position: absolute; width: 0; height: 3px; bottom: -6px; left: 0; background: var(--accent); transition: width 0.3s; }
    .nav-link.active:after, .nav-link:hover:after { width: 100%; }
    .card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .card:hover { transform: translateY(-12px); }
    .rating { background: linear-gradient(135deg, #ff1a1a, #c8102e); }
  </style>
</head>
<body class="min-h-screen pb-20">

  <header class="sticky top-0 z-50 bg-black/95 border-b border-red-900/50 backdrop-blur-xl">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
      <div onclick="showTab(0)" class="flex items-center gap-3 cursor-pointer">
        <div class="logo">YUKKIHO RECENZE</div>
      </div>
      <nav class="flex gap-10 text-lg font-medium">
        <a onclick="showTab(0)" class="nav-link cursor-pointer active">Domů</a>
        <a onclick="showTab(1)" class="nav-link cursor-pointer">Novinky</a>
        <a onclick="showTab(2)" class="nav-link cursor-pointer">Recenze</a>
      </nav>
      <button onclick="adminLogin()" class="bg-zinc-900 hover:bg-red-600 px-6 py-3 rounded-2xl flex items-center gap-2 transition-all">
        <i class="fas fa-user-shield"></i> Admin
      </button>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-6 pt-12">

    <!-- DOMŮ -->
    <div id="tab0" class="tab active">
      <div class="h-[580px] rounded-3xl bg-cover bg-center relative mb-16" style="background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('https://picsum.photos/id/1015/2000/1200')">
        <div class="absolute bottom-0 left-0 p-12">
          <h1 class="text-6xl font-bold">Vítejte u Yukkiho</h1>
          <p class="text-2xl text-red-400 mt-4">Poctivé recenze a novinky ze světa her</p>
        </div>
      </div>
      <h2 class="text-4xl font-bold mb-8">Nejnovější obsah</h2>
      <div id="latestContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

    <!-- NOVINKY -->
    <div id="tab1" class="tab hidden">
      <h2 class="text-4xl font-bold mb-10">Novinky</h2>
      <div id="newsList" class="space-y-12"></div>
    </div>

    <!-- RECENZE -->
    <div id="tab2" class="tab hidden">
      <div class="flex justify-between mb-10">
        <h2 class="text-4xl font-bold">Recenze</h2>
        <button onclick="showReviewForm()" id="adminPanel" style="display:none" class="bg-red-600 hover:bg-red-700 px-8 py-4 rounded-2xl font-semibold flex items-center gap-3">
          <i class="fas fa-plus"></i> Nová recenze
        </button>
      </div>
      <div id="reviewsList" class="space-y-12"></div>
    </div>
  </div>

  <!-- REVIEW FORM -->
  <div id="reviewFormModal" class="hidden fixed inset-0 bg-black/95 z-[110] flex items-center justify-center p-6">
    <div class="bg-zinc-900 p-10 rounded-3xl w-full max-w-2xl">
      <h2 class="text-3xl font-bold mb-8">Nová recenze</h2>
      <input id="rTitle" placeholder="Název hry" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 mb-4">
      <textarea id="rText" rows="12" placeholder="Napiš recenzi..." class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4"></textarea>
      <div class="flex gap-4 mt-8">
        <button onclick="saveReview()" class="flex-1 bg-red-600 hover:bg-red-700 py-4 rounded-2xl font-bold">Uložit recenzi</button>
        <button onclick="closeReviewForm()" class="flex-1 bg-zinc-700 hover:bg-zinc-600 py-4 rounded-2xl font-bold">Zrušit</button>
      </div>
    </div>
  </div>

  <!-- ADMIN LOGIN -->
  <div id="loginModal" class="hidden fixed inset-0 bg-black/95 z-[200] flex items-center justify-center">
    <div class="bg-zinc-900 p-10 rounded-3xl w-full max-w-md">
      <h2 class="text-3xl font-bold mb-8">Admin přihlášení</h2>
      <input id="adminPass" type="password" placeholder="Heslo" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 mb-6">
      <button onclick="checkAdminLogin()" class="w-full bg-red-600 py-4 rounded-2xl font-bold">Přihlásit se</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://eyxgzormlrfwsnvlotio.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_fBCkptR7dfkY51JdA-EnEw_oQZTxBFX';

    let isAdmin = false;
    const ADMIN_PASSWORD = "yukki77";

    async function api(method, body = null) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/reviews`, {
        method: method,
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json'
        },
        body: body ? JSON.stringify(body) : undefined
      });
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    async function saveReview() {
      try {
        await api('POST', {
          title: document.getElementById('rTitle').value,
          text: document.getElementById('rText').value
        });
        alert('✅ Recenze uložena!');
        closeReviewForm();
        loadReviews();
      } catch (e) {
        alert('Chyba: ' + e.message);
      }
    }

    async function loadReviews() {
      try {
        const reviews = await api('GET', '?order=created_at.desc');
        const html = reviews.map(r => `
          <div class="card bg-zinc-900 rounded-3xl p-8">
            <h3 class="text-3xl font-bold">${r.title}</h3>
            <p class="mt-6 text-zinc-300">${(r.text || '').substring(0, 300)}...</p>
          </div>
        `).join('');
        document.getElementById('reviewsList').innerHTML = html;
        document.getElementById('latestContainer').innerHTML = html;
      } catch (e) {}
    }

    function showReviewForm() { if(isAdmin) document.getElementById('reviewFormModal').classList.remove('hidden'); }
    function closeReviewForm() { document.getElementById('reviewFormModal').classList.add('hidden'); }

    function adminLogin() { document.getElementById('loginModal').classList.remove('hidden'); }
    function checkAdminLogin() {
      if (document.getElementById('adminPass').value === ADMIN_PASSWORD) {
        isAdmin = true;
        document.getElementById('adminPanel').style.display = 'flex';
        document.getElementById('loginModal').classList.add('hidden');
        alert('✅ Admin mód aktivován!');
      } else alert('Špatné heslo!');
    }

    function showTab(n) {
      document.querySelectorAll('.tab').forEach(t => t.classList.add('hidden'));
      document.getElementById('tab' + n).classList.remove('hidden');
    }

    loadReviews();
  </script>
</body>
</html>
