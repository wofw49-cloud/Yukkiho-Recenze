<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yukkiho Recenze | LEVEL UP</title>
    <!-- Supabase Knihovna -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff0000; --dark: #050505; --card: #121212; --text: #e0e0e0; --gold: #ffd700; }
        body { background: var(--dark); color: var(--text); font-family: 'Rajdhani', sans-serif; margin: 0; background-image: radial-gradient(circle at 50% 50%, #1a0505 0%, #050505 100%); }
        
        /* --- NAVIGACE --- */
        nav { background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--red); padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.8rem; font-weight: 800; color: var(--red); text-shadow: 0 0 10px var(--red); cursor: pointer; }
        .user-stats { background: #111; padding: 5px 15px; border: 1px solid var(--red); border-radius: 4px; display: flex; align-items: center; gap: 10px; }

        /* --- LAYOUT --- */
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        /* --- KARTY --- */
        .card { background: var(--card); border: 1px solid #333; position: relative; clip-path: polygon(0 0, 100% 0, 100% 90%, 90% 100%, 0 100%); transition: 0.3s; padding: 20px; text-align: left; }
        .card:hover { border-color: var(--red); transform: translateY(-5px); }
        .rating-tag { position: absolute; top: 10px; right: 10px; background: var(--red); color: white; padding: 5px 10px; font-weight: bold; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); }
        
        /* --- FORMULÁŘE --- */
        .admin-box { background: #111; border: 1px solid var(--red); padding: 25px; margin-top: 50px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #444; color: white; box-sizing: border-box; }
        button { background: linear-gradient(45deg, #8b0000, #ff0000); color: white; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.2s; }
        button:hover { letter-spacing: 1px; box-shadow: 0 0 15px var(--red); }
        
        .xp-bar { height: 5px; background: #333; width: 100px; margin-top: 5px; }
        .xp-fill { height: 100%; background: var(--red); }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="location.reload()">YUKKIHO RECENZE</div>
    <div id="auth-section">
        <button onclick="userLogin()" style="padding: 5px 15px; width: auto; font-size: 0.8rem;">REGISTRACE / LOGIN</button>
    </div>
</nav>

<div class="container">
    <h2 id="view-title">🔥 POSLEDNÍ AKTIVITA</h2>
    <div id="feed" class="grid">Načítám cloudová data...</div>

    <!-- ADMIN PANEL -->
    <div class="admin-box" id="admin-panel">
        <h3 style="color: var(--red); margin-top: 0;">🛠 PŘIDAT NOVÝ PŘÍSPĚVEK</h3>
        <input type="text" id="p-title" placeholder="Název hry / Novinky">
        <select id="p-type">
            <option value="review">Recenze</option>
            <option value="news">Novinka</option>
        </select>
        <input type="number" id="p-rating" placeholder="Hodnocení % (jen u recenzí)">
        <input type="text" id="p-img" placeholder="URL obrázku (nepovinné)">
        <textarea id="p-content" rows="5" placeholder="Tvůj text..."></textarea>
        <button onclick="saveToCloud()">PUBLIKOVAT NA WEB</button>
    </div>
</div>

<script>
    // --- KONFIGURACE (Tvoje údaje ze Supabase) ---
    const SB_URL = 'https://eyxgzormlrfwsnvlotio.supabase.co'; 
    const SB_KEY = 'sb_publishable_fBCkptr7dfkY51JdA-EnEw_oQZTxZIn5Ais4V8eOBy1fSByX1z71Zf3P9S4z7R1'; 
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let currentUser = JSON.parse(localStorage.getItem('yukki_user')) || null;

    // --- START ---
    async function init() {
        renderUser();
        await loadPosts();
    }

    // --- LOGIKA DATABÁZE ---
    async function loadPosts() {
        const { data, error } = await supabaseClient
            .from('posts')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            document.getElementById('feed').innerHTML = "Chyba načítání: " + error.message;
            return;
        }

        let html = "";
        data.forEach(post => {
            const isReview = post.type === 'review';
            html += `
                <div class="card">
                    ${isReview ? `<div class="rating-tag">${post.rating}%</div>` : ''}
                    <small style="color: var(--red)">#${post.type.toUpperCase()}</small>
                    <h3 style="margin: 10px 0;">${post.title}</h3>
                    <p style="font-size: 0.9rem; color: #bbb;">${post.content.substring(0, 150)}...</p>
                </div>
            `;
        });
        document.getElementById('feed').innerHTML = html || "Web je prázdný. Přidej něco!";
    }

    async function saveToCloud() {
        const title = document.getElementById('p-title').value;
        const type = document.getElementById('p-type').value;
        const rating = document.getElementById('p-rating').value;
        const content = document.getElementById('p-content').value;
        const img = document.getElementById('p-img').value;

        if (!title || !content) return alert("Nadpis a obsah jsou povinné!");

        const { error } = await supabaseClient.from('posts').insert([
            { title, type, rating: rating || 0, content, img }
        ]);

        if (error) alert("Chyba: " + error.message);
        else location.reload();
    }

    // --- UŽIVATELSKÝ SYSTÉM (SIMULACE S XP) ---
    function userLogin() {
        const name = prompt("Zadej svou herní přezdívku:");
        if (name) {
            currentUser = { name: name, xp: 0, level: 1 };
            localStorage.setItem('yukki_user', JSON.stringify(currentUser));
            renderUser();
        }
    }

    function renderUser() {
        if (currentUser) {
            const xpNeeded = currentUser.level * 100;
            const progress = (currentUser.xp / xpNeeded) * 100;
            document.getElementById('auth-section').innerHTML = `
                <div class="user-stats">
                    <div>
                        <strong>${currentUser.name}</strong> <br>
                        <small style="color: var(--gold)">LVL ${currentUser.level}</small>
                    </div>
                    <div>
                        <div class="xp-bar"><div class="xp-fill" style="width: ${progress}%"></div></div>
                        <small style="font-size: 0.6rem;">${currentUser.xp}/${xpNeeded} XP</small>
                    </div>
                </div>
            `;
        }
    }

    init();
</script>
</body>
</html>
