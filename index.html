<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUKKI • Ultimate Edition 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Barlow+Condensed:ital,wght@0,700;0,900;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --red: #ff0000; --bg: #050505; --border: #1a1a1a; }
        body { font-family: 'Inter', sans-serif; background: #050505; color: #fff; margin: 0; overflow-x: hidden; }
        #spotlight { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: -1; background: radial-gradient(circle 450px at var(--x, 50%) var(--y, 50%), rgba(220, 38, 38, 0.12), transparent 100%); }
        .condensed { font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; }
        
        nav { background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); position: fixed; width: 100%; top: 0; z-index: 1000; height: 70px; }
        .nav-link { font-weight: 800; font-size: 12px; text-transform: uppercase; padding: 0 15px; cursor: pointer; opacity: 0.5; transition: 0.3s; line-height: 70px; display: inline-block; letter-spacing: 1px; position: relative; }
        .nav-link:hover, .active-nav { opacity: 1; color: var(--red); }
        .nav-link.active-nav::after { content: ''; position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); width: 20px; height: 2px; background: var(--red); box-shadow: 0 0 10px var(--red); }

        .search-container { display: flex; align-items: center; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; padding: 0 12px; height: 38px; }
        .search-input { background: transparent; border: none; color: white; font-size: 12px; outline: none; width: 120px; transition: 0.3s; }
        .search-input:focus { width: 180px; }

        .filter-btn { padding: 8px 14px; border-radius: 10px; background: #111; border: 1px solid #222; font-weight: 800; font-size: 11px; text-transform: uppercase; color: #555; transition: 0.3s; white-space: nowrap; }
        .filter-btn.active { background: var(--red); border-color: var(--red); color: #fff; }

        .feed-card { transition: all 0.4s; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; overflow: hidden; }
        .feed-card:hover { background: rgba(255, 255, 255, 0.05); border-color: rgba(220, 38, 38, 0.4); transform: translateY(-4px); }
        
        .gold-text { background: linear-gradient(90deg, #bf953f 0%, #fcf6ba 50%, #b38728 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hall-item { background: #080808; border: 1px solid #1a1a1a; border-radius: 60px; padding: 15px 40px; display: flex; align-items: center; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; overflow-y: auto; }
        .close-modal { position: fixed; top: 20px; right: 20px; font-size: 30px; cursor: pointer; color: #fff; background: rgba(255,255,255,0.1); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .prose { color: #d1d5db; line-height: 1.75; }
        .prose b { color: #fff; }
    </style>
</head>
<body>

    <div id="spotlight"></div>

    <nav>
        <div class="max-w-[1600px] mx-auto flex items-center justify-between px-4 md:px-8 h-full">
            <div class="flex items-center">
                <div class="text-2xl md:text-3xl font-black italic tracking-tighter cursor-pointer mr-12" onclick="location.reload()">YUKKI<span class="text-red-600">.</span></div>
                <div class="hidden lg:flex">
                    <div class="nav-link active-nav" data-tab="domu">Úvod</div>
                    <div class="nav-link" data-tab="novinky">Novinky</div>
                    <div class="nav-link" data-tab="recenze">Recenze</div>
                    <div class="nav-link" data-tab="kalendar">Kalendář</div>
                    <div class="nav-link" data-tab="elite">Prestige Hall</div>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="search-container">
                    <i class="fas fa-search text-zinc-600 text-[10px] mr-2"></i>
                    <input type="text" id="globalSearch" class="search-input" placeholder="Hledat...">
                </div>
                <a href="https://www.youtube.com/@YukkiCZE" target="_blank" class="opacity-50 hover:opacity-100 transition"><i class="fab fa-youtube text-xl"></i></a>
                <a href="https://www.instagram.com/_yukki77_/" target="_blank" class="opacity-50 hover:opacity-100 transition"><i class="fab fa-instagram text-xl"></i></a>
            </div>
        </div>
    </nav>

    <div class="max-w-[1600px] mx-auto px-4 md:px-8 pt-24 md:pt-32 pb-20">
        <div id="tab-domu" class="tab-content">
            <div id="hero-area" class="mb-16"></div>
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
                <div id="home-feed" class="lg:col-span-8 space-y-8"></div>
                <div class="lg:col-span-4 space-y-12">
                    <div class="bg-[#080808] p-6 rounded-3xl border border-zinc-900">
                        <h3 class="condensed text-xl font-black mb-6 italic">Prestige Hall <span class="text-zinc-700">#Top5</span></h3>
                        <div id="side-hall" class="space-y-3"></div>
                    </div>
                    <div class="bg-[#080808] p-6 rounded-3xl border border-zinc-900">
                        <h3 class="condensed text-xl font-black mb-6 italic uppercase">Blízké Releasy</h3>
                        <div id="side-calendar" class="space-y-5"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-novinky" class="tab-content hidden"><h2 class="condensed text-5xl font-black italic mb-10 text-center">Novinky</h2><div id="news-full-list" class="space-y-6"></div></div>
        <div id="tab-recenze" class="tab-content hidden"><h2 class="condensed text-5xl font-black italic mb-10 text-center">Recenze</h2><div id="reviews-full-list" class="space-y-6"></div></div>
        
        <div id="tab-elite" class="tab-content hidden">
            <div class="text-center mb-16"><h2 class="condensed text-7xl font-black italic gold-text">PRESTIGE HALL</h2></div>
            <div id="hall-full-list" class="max-w-5xl mx-auto space-y-6"></div>
        </div>

        <div id="tab-kalendar" class="tab-content hidden">
            <h2 class="condensed text-6xl font-black italic mb-8 uppercase text-center">Kalendář Her</h2>
            <div class="flex items-center justify-center gap-6 mb-4" id="year-nav"></div>
            <div class="no-scrollbar flex justify-center gap-2 mb-12 overflow-x-auto" id="month-nav"></div>
            <div id="calendar-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        </div>
    </div>

    <div id="modal-overlay" class="modal"><div class="close-modal" onclick="closeModal()">&times;</div><div class="modal-body max-w-4xl mx-auto py-20 px-4" id="modal-content"></div></div>

    <script>
    const state = {
        selectedYear: 2026,
        selectedMonth: 5,
        news: [
            { id: 1001, title: "Risk s Pragmatou se Capcomu vyplácí", img: "https://indian-tv.cz/uploads/ls/09a7b79bb04446a886cff999e3185127/1755725042.jpg?", rDate: "2026-05-07", content: "Dlouho odkládaný sci-fi projekt od Capcomu konečně ukazuje své kvality." },
            { id: 1002, title: "Novinky o 007 First Light", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/3768760/header.jpg", rDate: "2026-05-08", content: "Agent 007 se vrací v nové vizuální podobě, která bere dech." }
        ],
        reviews: [
            { 
                id: 2001, 
                game: "DOOM Eternal: New Chaos", 
                score: 95, 
                rDate: "2026-04-20", 
                img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/782330/ss_4f93a7c5003d49cb32f6c0c6e547452b284580a0.1920x1080.jpg?t=1755109910", 
                content: "Čistý adrenalin a nejlepší střílečka posledních let." 
            },
            { 
                id: 2008,
                game: "Mafia: The Old Country",
                score: 80,
                rDate: "2025-09-29T10:30:00",
                img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1941540/ss_44047e62744c4a7201a0238994d23f3ca72649cb.1920x1080.jpg?t=1764177372",
                gallery: [
                    "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1941540/ss_b0790cd935e11df0aca08f947c6e90ddce39e683.1920x1080.jpg?t=1764177372",
                    "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1941540/ss_19e3bf0b15bd64f10a8d2702758d82d5291220af.1920x1080.jpg?t=1764177372",
                    "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1941540/ss_ecfbf9a220417bb61285a981a8a6630d98d56d27.1920x1080.jpg?t=1764177372"
                ],
                pros: [
                    "Nádherná a autentická atmosféra Sicílie 20. let",
                    "Vynikající český dabing, který prohlubuje zážitek",
                    "Povedený jízdní model a pocit ze střelby",
                    "Silný příběh věrný kořenům série"
                ],
                cons: [
                    "Umělá inteligence nepřátel občas pokulhává",
                    "Pár repetitivních misí v otevřeném světě",
                    "Absence volné jízdy po dokončení příběhu"
                ],
                cz: true,
                content: `Mafia: The Old Country je přesně ten typ hry, který vám připomene, proč jsme se kdysi do této série vůbec zamilovali. Stylová atmosféra staré Itálie, poctivý mafiánský příběh a soundtrack, který si budete pouštět i mimo hru. Hráno samozřejmě s <b>českým dabingem</b>, protože bez něj by to ani nešlo.<br><br>
<b>Rodina nade vše:</b> Příběhově se hra drží klasických pilířů – rodina, loajalita a zrada. Postavy jsou napsané s citem a dialogy mají tu správnou šťávu, zejména v momentech, kdy se na scéně objeví šéf rodiny. Je to lineární, filmové a nesmírně atmosférické. Nádherná stylizace venkova i měst vás okamžitě vtáhne do éry, kdy slovo "respekt" znamenalo všechno.<br><br>
<b>Hratelnost a technika:</b> Střelba má konečně slušnou váhu a auta se neovládají jako tanky na ledu, což byl problém některých předchozích dílů. Na druhou stranu zamrzí AI, která občas stojí jako solný sloup a jen čeká na kulku. Některé mise typu „jeď sem a vyřiď to“ působí trochu jako výplň, ale díky skvělému vizuálu jim to pravděpodobně odpustíte.<br><br>
<div class="mt-6 p-6 bg-zinc-900/50 rounded-2xl border border-zinc-800">
    <span class="text-white font-black text-2xl uppercase block mb-1">VERDIKT:</span>
    <span class="text-white font-black text-lg leading-tight">
        Není to revoluce, ale poctivý návrat ke kořenům, který série potřebovala. Pokud chcete zažít vzestup mladého psance v Itálii 20. let, berte bez váhání. Don by byl hrdý.
    </span>
</div>`
            }
        ],
        calendar: [
            { id: 3004, game: "BUS BOUND", rDate: "2026-05-02", img: "https://picsum.photos/id/1015/800/450", platforms: ["PC"], czech: true, earlyAccess: false, isDLC: false, storeLinks: { steam: "https://store.steampowered.com/app/example-busbound" } },
            { id: 3005, game: "MIXTAPE", rDate: "2026-05-07", img: "https://picsum.photos/id/133/800/450", platforms: ["PC", "PS5"], czech: false, earlyAccess: true, isDLC: false, storeLinks: { steam: "https://store.steampowered.com/app/example-mixtape", playstation: "https://store.playstation.com/cs-cz/product/example-mixtape" } },
            { id: 3006, game: "DIRECTIVE 8020", rDate: "2026-05-12", img: "https://picsum.photos/id/201/800/450", platforms: ["PC"], czech: true, earlyAccess: false, isDLC: false, storeLinks: { steam: "https://store.steampowered.com/app/example-directive" } },
            { id: 3001, game: "007 FIRST LIGHT", rDate: "2026-05-27", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/3768760/header.jpg", platforms: ["PC", "PS5", "Xbox"], czech: true, earlyAccess: false, isDLC: false, storeLinks: { steam: "https://store.steampowered.com/app/3768760", playstation: "https://store.playstation.com/cs-cz/product/007-first-light", xbox: "https://www.xbox.com/cs-CZ/games/store/007-first-light/..." } },
            { id: 3002, game: "GTA VI", rDate: "2025-11-20", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/271590/header.jpg", platforms: ["PC", "PS5", "Xbox"], czech: false, earlyAccess: false, isDLC: false, storeLinks: { steam: "https://store.steampowered.com/app/271590", playstation: "https://store.playstation.com/cs-cz/product/gta-vi", xbox: "https://www.xbox.com/cs-CZ/games/store/gta-vi/..." } },
            { id: 3003, game: "AC BLACK FLAG: RESYNCED", rDate: "2026-07-09", img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/3751950/header.jpg", platforms: ["PC"], czech: true, earlyAccess: false, isDLC: true, storeLinks: { steam: "https://store.steampowered.com/app/3751950" } },
            { 
                id: 3007, 
                game: "Kingdom Come: Deliverance II", 
                rDate: "2025-02-11", 
                img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1771300/header.jpg?t=1777975568", 
                platforms: ["PC", "PS5", "XBOX"], 
                czech: true, 
                earlyAccess: false, 
                isDLC: false, 
                storeLinks: { 
                    steam: "https://store.steampowered.com/app/1771300/Kingdom_Come_Deliverance_II/", 
                    playstation: "https://www.playstation.com/en-cz/games/kingdom-come-deliverance-ii/", 
                    xbox: "https://www.xbox.com/cs-CZ/games/store/kingdom-come-deliverance-ii/9n4w31hsmvvd" 
                } 
            },
            { 
                id: 3008, 
                game: "Sid Meier’s Civilization VII", 
                rDate: "2025-02-11", 
                img: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1295660/header.jpg?t=1777919052", 
                platforms: ["PC", "PS5", "XBOX", "SWITCH"], 
                czech: false, 
                earlyAccess: false, 
                isDLC: false, 
                storeLinks: { 
                    steam: "https://store.steampowered.com/app/1295660/Sid_Meiers_Civilization_VII/", 
                    playstation: "https://www.playstation.com/en-cz/games/sid-meier-s-civilization-vii/", 
                    xbox: "https://www.xbox.com/cs-CZ/games/store/sid-meiers-civilization-vii/9NG6VZHN5GQL/0010" 
                } 
            }
        ]
    };

    const months = ["Leden", "Únor", "Březen", "Duben", "Květen", "Červen", "Červenec", "Srpen", "Září", "Říjen", "Listopad", "Prosinec"];
    const monthsShort = ["LED", "ÚNO", "BŘE", "DUB", "KVĚ", "ČER", "ČVC", "SRP", "ZÁŘ", "ŘÍJ", "LIS", "PRO"];
    const years = [2024, 2025, 2026];

    let sameDayData = {};

    function getBadgesHTML(item) {
        let html = '';
        if (item.cz || item.czech) {
            html += `<span class="inline-flex items-center px-3 py-1 bg-emerald-600 rounded-3xl text-xs font-bold gap-1.5">
                <img src="https://flagcdn.com/w20/cz.png" alt="Česky" class="h-3.5 w-[22px] rounded-sm">
                ČESKY
            </span>`;
        }
        if (item.earlyAccess) html += `<span class="px-4 py-1 text-xs font-bold bg-orange-500 rounded-3xl">EARLY ACCESS</span>`;
        if (item.isDLC) html += `<span class="px-4 py-1 text-xs font-bold bg-violet-600 rounded-3xl">DLC</span>`;
        if (item.platforms && item.platforms.length > 0) {
            item.platforms.forEach(p => {
                let icon = p === 'PC' ? `<i class="fas fa-laptop mr-1"></i>` : 
                           p === 'PS5' ? `<i class="fab fa-playstation mr-1"></i>` : 
                           `<i class="fab fa-xbox mr-1"></i>`;
                html += `<span class="inline-flex items-center px-3 py-1 text-xs font-bold bg-zinc-700 rounded-3xl">${icon}${p}</span>`;
            });
        }
        return html;
    }

    document.getElementById('globalSearch').oninput = (e) => {
        const q = e.target.value.toLowerCase();
        if(q.length < 2) { renderAll(); return; }
        const res = [...state.news, ...state.reviews, ...state.calendar].filter(i => (i.title || i.game).toLowerCase().includes(q));
        document.getElementById('home-feed').innerHTML = `<h2 class="condensed text-2xl font-black mb-6 italic">Výsledky hledání:</h2>` + 
            res.map(i => `<div class="p-6 feed-card cursor-pointer mb-4" onclick="openModal(${i.id})"><h3 class="condensed text-xl font-black italic">${i.title || i.game}</h3></div>`).join('');
    };

    function renderCalendar() {
        const minYear = 2000;
        const maxYear = 2030;
        const current = state.selectedYear;

        let yearHTML = `
        <div class="flex items-center gap-8">
            <button onclick="changeYear(-1)" class="w-10 h-10 flex items-center justify-center text-3xl text-zinc-400 hover:text-white transition-colors">
                <i class="fas fa-chevron-left"></i>
            </button>

            <button onclick="state.selectedYear = ${current-1}; renderCalendar()" class="filter-btn px-8 ${current-1 < minYear ? 'opacity-30 pointer-events-none' : ''}">${current-1}</button>

            <button onclick="state.selectedYear = ${current}; renderCalendar()" class="filter-btn px-8 bg-red-600 border-red-600 text-white">${current}</button>

            <button onclick="state.selectedYear = ${current+1}; renderCalendar()" class="filter-btn px-8 ${current+1 > maxYear ? 'opacity-30 pointer-events-none' : ''}">${current+1}</button>

            <button onclick="changeYear(1)" class="w-10 h-10 flex items-center justify-center text-3xl text-zinc-400 hover:text-white transition-colors">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>`;

        document.getElementById('year-nav').innerHTML = yearHTML;

        document.getElementById('month-nav').innerHTML = months.map((m, idx) => 
            `<button class="filter-btn ${state.selectedMonth === idx ? 'active' : ''}" onclick="state.selectedMonth=${idx}; renderCalendar()">${m}</button>`
        ).join('');

        const filtered = state.calendar
            .filter(c => {
                const d = new Date(c.rDate);
                return d.getFullYear() === state.selectedYear && d.getMonth() === state.selectedMonth;
            })
            .sort((a, b) => new Date(a.rDate) - new Date(b.rDate));

        sameDayData = {};
        filtered.forEach(c => {
            const key = new Date(c.rDate).toISOString().split('T')[0];
            if (!sameDayData[key]) sameDayData[key] = [];
            sameDayData[key].push(c);
        });

        let html = '';
        Object.keys(sameDayData).sort().forEach(key => {
            const group = sameDayData[key];
            const first = group[0];
            const d = new Date(first.rDate);
            const day = d.getDate();
            const monthShort = monthsShort[d.getMonth()];
            const hasMultiple = group.length > 1;

            html += `
            <div onclick="openModalForCurrent('${key}')" class="same-day-card bg-[#080808] border border-zinc-900 rounded-3xl overflow-hidden group cursor-pointer" data-date-key="${key}" data-current-index="0">
                <div class="relative">
                    <img src="${first.img}" class="w-full aspect-video object-cover same-day-image transition-all duration-300">
                    <div class="absolute bottom-4 left-4 bg-black/90 text-white px-4 py-2 rounded-3xl flex flex-col items-center justify-center min-w-[62px] shadow-inner">
                        <span class="text-4xl leading-none font-black">${day}</span>
                        <span class="text-[11px] font-black tracking-widest -mt-px">${monthShort}</span>
                    </div>
                    ${hasMultiple ? `
                    <button onclick="switchSameDay('${key}', -1); event.stopImmediatePropagation()" class="absolute left-4 top-1/2 -translate-y-1/2 bg-black/70 hover:bg-black text-white w-9 h-9 rounded-2xl flex items-center justify-center text-xl shadow-lg z-10">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <button onclick="switchSameDay('${key}', 1); event.stopImmediatePropagation()" class="absolute right-4 top-1/2 -translate-y-1/2 bg-black/70 hover:bg-black text-white w-9 h-9 rounded-2xl flex items-center justify-center text-xl shadow-lg z-10">
                        <i class="fas fa-chevron-right"></i>
                    </button>` : ''}
                </div>
                <div class="p-6">
                    <h4 class="condensed text-2xl font-black uppercase leading-tight same-day-name">${first.game}</h4>
                    <div class="flex gap-2 mt-4 flex-wrap same-day-badges">
                        ${getBadgesHTML(first)}
                    </div>
                </div>
            </div>`;
        });

        document.getElementById('calendar-grid').innerHTML = html || `<div class="col-span-full text-center py-20 text-zinc-700 font-bold uppercase">V tomto měsíci nic nevychází</div>`;
    }

    window.changeYear = function(delta) {
        let newYear = state.selectedYear + delta;
        if (newYear < 2000) newYear = 2000;
        if (newYear > 2030) newYear = 2030;
        state.selectedYear = newYear;
        renderCalendar();
    };

    window.openModalForCurrent = function(dateKey) {
        const card = document.querySelector(`[data-date-key="${dateKey}"]`);
        if (!card) return;
        const index = parseInt(card.dataset.currentIndex || 0);
        const group = sameDayData[dateKey];
        if (group && group[index]) openModal(group[index].id);
    };

    window.switchSameDay = function(dateKey, direction) {
        const card = document.querySelector(`[data-date-key="${dateKey}"]`);
        if (!card) return;
        const group = sameDayData[dateKey];
        if (!group || group.length <= 1) return;

        let currentIndex = parseInt(card.dataset.currentIndex || 0);
        currentIndex = (currentIndex + direction + group.length) % group.length;
        card.dataset.currentIndex = currentIndex;

        const game = group[currentIndex];
        const image = card.querySelector('.same-day-image');
        const nameEl = card.querySelector('.same-day-name');
        const badgesEl = card.querySelector('.same-day-badges');

        image.style.opacity = '0';
        setTimeout(() => {
            image.src = game.img;
            image.style.opacity = '1';
            nameEl.textContent = game.game;
            badgesEl.innerHTML = getBadgesHTML(game);
        }, 180);
    };

    function renderSideCalendar() {
        const sortedCalendar = [...state.calendar].sort((a, b) => new Date(a.rDate) - new Date(b.rDate));
        const top5 = sortedCalendar.slice(0, 5);

        let html = top5.length ? top5.map(c => {
            const d = new Date(c.rDate);
            const day = d.getDate();
            const monthShort = monthsShort[d.getMonth()];
            return `
            <div onclick="openModal(${c.id})" class="feed-card p-5 cursor-pointer flex flex-col gap-3">
                <div class="flex items-center gap-5">
                    <div class="w-[72px] h-[72px] bg-[#ff0000] rounded-3xl flex flex-col items-center justify-center text-white condensed flex-shrink-0 text-center leading-none shadow-md">
                        <span class="text-[13px] font-black tracking-[1.5px]">${monthShort}</span>
                        <span class="text-5xl font-black -mt-1">${day}</span>
                    </div>
                    <div class="flex-1 condensed text-2xl font-black uppercase leading-tight">${c.game}</div>
                </div>
                <div class="flex gap-2 flex-wrap pl-[88px]">${getBadgesHTML(c)}</div>
            </div>`;
        }).join('') : `<div class="text-zinc-700 font-bold uppercase text-center py-12">Žádné blízké releasy v kalendáři</div>`;

        document.getElementById('side-calendar').innerHTML = html;
    }

    function renderAll() {
        const combined = [...state.news, ...state.reviews].sort((a,b) => new Date(b.rDate) - new Date(a.rDate));

        document.getElementById('hero-area').innerHTML = `
            <div class="relative h-[500px] rounded-[40px] overflow-hidden cursor-pointer" onclick="openModal(${combined[0].id})">
                <img src="${combined[0].img}" class="w-full h-full object-cover opacity-40">
                <div class="absolute inset-0 bg-gradient-to-t from-black"></div>
                <div class="absolute bottom-12 left-12">
                    <h1 class="condensed text-7xl font-black italic uppercase">${combined[0].title || combined[0].game}</h1>
                    <div class="flex gap-2 mt-6 flex-wrap">${getBadgesHTML(combined[0])}</div>
                </div>
            </div>`;

        document.getElementById('home-feed').innerHTML = combined.slice(1, 5).map(i => `
            <div class="flex items-center gap-8 p-6 feed-card cursor-pointer" onclick="openModal(${i.id})">
                <img src="${i.img}" class="w-48 h-28 object-cover rounded-2xl shrink-0">
                <div class="flex-1">
                    <div class="text-red-600 font-black condensed text-[11px] mb-2 uppercase">${i.score ? 'Recenze' : 'Novinka'}</div>
                    <h3 class="condensed text-3xl font-black italic uppercase">${i.title || i.game}</h3>
                    <div class="flex gap-2 mt-4 flex-wrap">${getBadgesHTML(i)}</div>
                </div>
            </div>`).join('');

        document.getElementById('news-full-list').innerHTML = state.news.map(n => `
            <div onclick="openModal(${n.id})" class="feed-card flex gap-8 p-8 cursor-pointer">
                <div class="relative flex-shrink-0 w-80 rounded-3xl overflow-hidden">
                    <img src="${n.img}" class="w-full h-64 object-cover">
                    <div class="absolute top-4 left-4 bg-red-600 text-white text-xs font-black px-5 py-2 rounded-3xl">NOVINKA</div>
                </div>
                <div class="flex-1">
                    <h3 class="condensed text-5xl font-black uppercase leading-none">${n.title}</h3>
                    <p class="text-zinc-400 mt-6">${n.content}</p>
                </div>
            </div>`).join('');

        document.getElementById('reviews-full-list').innerHTML = state.reviews.map(r => `
            <div onclick="openModal(${r.id})" class="feed-card flex gap-8 p-8 cursor-pointer">
                <div class="relative flex-shrink-0 w-80 rounded-3xl overflow-hidden">
                    <img src="${r.img}" class="w-full h-64 object-cover">
                    <div class="absolute top-4 left-4 bg-red-600 text-white text-4xl font-black px-5 py-3 rounded-3xl leading-none">${r.score}%</div>
                </div>
                <div class="flex-1">
                    <h3 class="text-red-500 condensed text-5xl font-black uppercase">${r.game}</h3>
                    <p class="text-zinc-400 mt-6">${r.content ? r.content.substring(0, 280) + '...' : ''}</p>
                </div>
            </div>`).join('');

        const top5 = [...state.reviews].sort((a,b) => b.score - a.score).slice(0, 5);
        document.getElementById('side-hall').innerHTML = top5.map((r, idx) => `<div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-zinc-900"><span class="condensed text-2xl font-black italic ${idx===0?'gold-text':'text-zinc-800'}">#${idx+1}</span><span class="text-[11px] font-bold uppercase flex-1 px-4 truncate">${r.game}</span><span class="font-black text-red-600">${r.score}%</span></div>`).join('');
        
        document.getElementById('hall-full-list').innerHTML = [...state.reviews].sort((a,b) => b.score - a.score).map((r, idx) => `
            <div class="hall-item mb-4">
                <div class="condensed text-7xl font-black italic w-32 ${idx===0?'gold-text':'text-zinc-900'}">#${idx+1}</div>
                <img src="${r.img}" class="w-56 h-32 rounded-3xl object-cover mx-8 flex-shrink-0">
                <div class="flex-1"><h3 class="condensed text-4xl font-black italic uppercase">${r.game}</h3></div>
                <div class="text-7xl font-black italic text-red-600">${r.score}%</div>
            </div>`).join('');

        renderCalendar();
        renderSideCalendar();
    }

    window.openModal = (id) => {
        const item = [...state.news, ...state.reviews, ...state.calendar].find(x => x.id === id);
        if (!item) return;

        let extraHTML = '';

        if (item.score !== undefined) {
            extraHTML = `
            <div class="flex justify-between items-baseline mb-8">
                <div></div>
                <div class="text-red-600 text-[110px] leading-none font-black">${item.score}<span class="text-6xl align-bottom">%</span></div>
            </div>

            ${item.pros && item.pros.length ? `
            <div class="grid grid-cols-1 md:grid-cols-2 gap-12 mb-16">
                <div>
                    <h3 class="flex items-center gap-3 text-emerald-400 uppercase font-black text-2xl mb-6"><i class="fas fa-check-circle text-3xl"></i> KLADY</h3>
                    <ul class="space-y-6">${item.pros.map(p => `<li class="flex gap-4 text-zinc-200 text-lg"><span class="text-emerald-400 text-3xl">✓</span>${p}</li>`).join('')}</ul>
                </div>
                <div>
                    <h3 class="flex items-center gap-3 text-red-400 uppercase font-black text-2xl mb-6"><i class="fas fa-times-circle text-3xl"></i> ZÁPORY</h3>
                    <ul class="space-y-6">${item.cons.map(c => `<li class="flex gap-4 text-zinc-200 text-lg"><span class="text-red-400 text-3xl">✕</span>${c}</li>`).join('')}</ul>
                </div>
            </div>` : ''}

            ${item.gallery && item.gallery.length ? `
            <div class="mb-12">
                <h3 class="uppercase text-zinc-400 font-black mb-6">Galerie</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    ${item.gallery.map(url => `<img src="${url}" class="rounded-3xl cursor-zoom-in" onclick="this.classList.toggle('scale-110')">`).join('')}
                </div>
            </div>` : ''}`;
        } else {
            extraHTML = `<div class="text-zinc-500 mb-4">${new Date(item.rDate).toLocaleDateString('cs-CZ', { day: 'numeric', month: 'long', year: 'numeric' })}</div>`;
        }

        let buyHTML = '';
        if (item.storeLinks) {
            buyHTML = `
            <div class="mt-10 pt-8 border-t border-zinc-800">
                <h3 class="uppercase font-black text-zinc-400 mb-5 text-lg">Koupit hru</h3>
                <div class="flex flex-wrap gap-4">
                    ${Object.keys(item.storeLinks).map(key => {
                        let label = key === 'steam' ? 'Steam' : key === 'playstation' ? 'PlayStation Store' : 'Xbox Store';
                        return `<a href="${item.storeLinks[key]}" target="_blank" class="px-8 py-4 bg-zinc-800 hover:bg-red-600 rounded-3xl font-bold transition-colors">${label}</a>`;
                    }).join('')}
                </div>
            </div>`;
        }

        const modalContent = `
            <img src="${item.img}" class="w-full rounded-3xl mb-10 shadow-2xl">
            ${extraHTML}
            <h2 class="condensed text-6xl font-black italic uppercase leading-tight">${item.title || item.game}</h2>
            <div class="flex gap-3 mt-6 flex-wrap">${getBadgesHTML(item)}</div>
            ${buyHTML}
            ${item.content ? `<div class="prose prose-invert mt-12 text-lg">${item.content}</div>` : ''}
        `;

        document.getElementById('modal-content').innerHTML = modalContent;
        document.getElementById('modal-overlay').style.display = 'block';
    };

    window.closeModal = () => document.getElementById('modal-overlay').style.display = 'none';

    document.querySelectorAll('.nav-link').forEach(link => {
        link.onclick = () => {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active-nav'));
            link.classList.add('active-nav');
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + link.dataset.tab).classList.remove('hidden');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    });

    document.addEventListener('mousemove', e => {
        const s = document.getElementById('spotlight');
        s.style.setProperty('--x', e.clientX + 'px');
        s.style.setProperty('--y', e.clientY + 'px');
    });

    window.onload = renderAll;
    </script>
</body>
</html>
