<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUKKI • Gaming Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .title-font { font-family: 'Orbitron', sans-serif; }
        .neon { text-shadow: 0 0 20px #c026d3, 0 0 40px #a855f7; }
        .tab-active { border-bottom: 4px solid #c026d3; color: white; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <nav class="bg-black border-b border-purple-600 fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-br from-purple-600 to-pink-600 rounded-2xl flex items-center justify-center text-3xl">🌀</div>
                <span class="text-4xl font-bold tracking-widest neon title-font">YUKKI</span>
            </div>

            <div class="flex gap-8 text-lg font-medium">
                <button onclick="switchTab(0)" class="tab-active pb-1 px-4" id="tab-0">DOMŮ</button>
                <button onclick="switchTab(1)" class="pb-1 px-4 hover:text-purple-400" id="tab-1">NOVINKY</button>
                <button onclick="switchTab(2)" class="pb-1 px-4 hover:text-purple-400" id="tab-2">RECENZE</button>
                <button onclick="switchTab(3)" class="pb-1 px-4 hover:text-purple-400" id="tab-3">ŽEBŘÍČKY</button>
            </div>

            <button onclick="toggleLogin()" class="px-6 py-3 bg-gradient-to-r from-purple-600 to-pink-600 rounded-2xl font-bold flex items-center gap-2">
                <i class="fas fa-user"></i>
                <span id="loginText">PŘIHLÁSIT SE</span>
            </button>
        </div>
    </nav>

    <main class="pt-24 max-w-7xl mx-auto px-6 pb-20">

        <!-- DOMŮ -->
        <div id="page-0">
            <h1 class="text-6xl font-bold text-center mt-10 mb-2 neon title-font">Vítej zpátky, Yukki</h1>
            <div id="hero-news" onclick="openDetail('news', 0)" class="cursor-pointer relative h-[65vh] rounded-3xl overflow-hidden mb-12 border border-purple-500/30"></div>

            <h2 class="text-3xl font-bold mb-6 title-font">Poslední recenze</h2>
            <div id="home-reviews" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </div>

        <!-- NOVINKY -->
        <div id="page-1" class="hidden">
            <h2 class="text-4xl font-bold title-font mb-8">NOVINKY</h2>
            <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </div>

        <!-- RECENZE -->
        <div id="page-2" class="hidden">
            <h2 class="text-4xl font-bold title-font mb-8">RECENZE</h2>
            <div id="reviews-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>

        <!-- ŽEBŘÍČKY -->
        <div id="page-3" class="hidden">
            <h2 class="text-4xl font-bold title-font mb-8">YUKKI ŽEBŘÍČEK</h2>
            <div id="leaderboard" class="space-y-4"></div>
        </div>
    </main>

    <!-- ADMIN BAR -->
    <div id="adminBar" class="hidden fixed bottom-6 right-6 bg-zinc-900 border border-purple-500 rounded-2xl p-4 flex gap-3 z-50">
        <button onclick="showCreateModal('news')" class="px-6 py-3 bg-purple-600 rounded-xl">+ Novinka</button>
        <button onclick="showCreateModal('review')" class="px-6 py-3 bg-purple-600 rounded-xl">+ Recenze</button>
        <button onclick="exportData()" class="px-6 py-3 bg-emerald-600 rounded-xl">📤 Export</button>
    </div>

    <!-- LOGIN MODAL -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center">
        <div class="bg-zinc-900 p-10 rounded-3xl w-full max-w-md border border-purple-500">
            <h2 class="text-3xl font-bold mb-6 text-center title-font">YUKKI ADMIN</h2>
            <input id="loginUser" value="yukki" class="w-full mb-4 bg-zinc-800 border border-purple-500 rounded-2xl px-6 py-4">
            <input id="loginPass" type="password" value="yukki123" class="w-full mb-6 bg-zinc-800 border border-purple-500 rounded-2xl px-6 py-4">
            <button onclick="adminLogin()" class="w-full py-4 bg-gradient-to-r from-purple-600 to-pink-600 rounded-2xl font-bold">Přihlásit se</button>
        </div>
    </div>

    <!-- CREATE/EDIT MODAL -->
    <div id="createModal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center">
        <div class="bg-zinc-900 p-10 rounded-3xl w-full max-w-2xl border border-purple-500">
            <h2 class="text-3xl font-bold mb-6" id="modalTitle">Nová novinka</h2>
            <input id="postTitle" placeholder="Název" class="w-full mb-4 bg-zinc-800 border border-purple-500 rounded-2xl px-6 py-4">
            <input id="postImage" placeholder="URL fotky" class="w-full mb-4 bg-zinc-800 border border-purple-500 rounded-2xl px-6 py-4">
            <input id="postScore" type="number" placeholder="Hodnocení % (jen recenze)" class="w-full mb-4 bg-zinc-800 border border-purple-500 rounded-2xl px-6 py-4">
            <input id="postDate" type="date" class="w-full mb-6 bg-zinc-800 border border-purple-500 rounded-2xl px-6 py-4">
            <textarea id="postContent" rows="10" placeholder="Obsah..." class="w-full bg-zinc-800 border border-purple-500 rounded-2xl px-6 py-4"></textarea>
            
            <div class="flex gap-4 mt-6">
                <button onclick="savePost()" class="flex-1 py-4 bg-purple-600 rounded-2xl font-bold">Uložit</button>
                <button onclick="hideCreateModal()" class="flex-1 py-4 bg-zinc-800 rounded-2xl font-bold">Zrušit</button>
            </div>
        </div>
    </div>

    <!-- DETAIL MODAL - HEZKÝ PODÉLNÝ -->
    <div id="detailModal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center">
        <div class="bg-zinc-900 rounded-3xl w-full max-w-4xl border border-purple-500 overflow-hidden">
            <div id="modal-image" class="w-full aspect-video bg-black"></div>
            <div class="p-8">
                <h2 id="modal-title" class="text-4xl font-bold title-font"></h2>
                
                <div class="flex items-center gap-6 mt-3">
                    <p id="modal-date" class="text-purple-400 text-lg"></p>
                    <div id="modal-score" class="text-5xl font-bold text-purple-400"></div>
                </div>

                <div id="modal-content" class="mt-8 text-gray-300 leading-relaxed text-[17px] whitespace-pre-wrap"></div>
                
                <button onclick="closeModal()" class="mt-10 px-10 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl font-medium">
                    Zavřít
                </button>
            </div>
        </div>
    </div>

    <script>
        let isAdmin = false;
        let news = [];
        let reviews = [];
        let editingType = null;
        let editingIndex = null;

        function loadData() {
            news = [
                {
                    "id": 1778031631685,
                    "title": "Proč si PC hráči musejí počkat na Grand Theft Auto VI? Marketingovou exkluzivitu má PlayStation",
                    "image": "https://indian-tv.cz/uploads/ls/3b893ce7590d4371b06532dcac210d72/1777975974.jpg?",
                    "date": "2026-05-06",
                    "content": "Hry od Rockstar Games vycházejí nejprve na konzole a až později na počítače. Stejné to bude i u GTA 6..."
                }
            ];

            reviews = [
                {
                    "id": 1778031727108,
                    "title": "Crimson Desert",
                    "image": "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/3321460/669119c3747653f41a46c59f213168448d094e04/ss_669119c3747653f41a46c59f213168448d094e04.1920x1080.jpg?t=1777016399",
                    "score": 68,
                    "date": "2026-03-22",
                    "content": "Crimson Desert je jeden z největších a nejambicióznějších open-world titulů posledních let od tvůrců Black Desert Online..."
                },
                {
                    "id": 1778031574329,
                    "title": "MOUSE: P.I. For Hire",
                    "image": "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2416450/298ff2fc3f6a700d022b8d3ec58047f2b426be03/header.jpg?t=1777393988",
                    "score": 82,
                    "date": "2026-05-06",
                    "content": "MOUSE: P.I. For Hire je přesně ten druh hry, který ti zůstane v hlavě ještě dlouho poté, co ji dokončíš..."
                }
            ];

            sortAll();
        }

        function sortAll() {
            news.sort((a, b) => new Date(b.date) - new Date(a.date));
            reviews.sort((a, b) => new Date(b.date) - new Date(a.date));
        }

        function saveToLocalStorage() {
            localStorage.setItem('yukki_news', JSON.stringify(news));
            localStorage.setItem('yukki_reviews', JSON.stringify(reviews));
        }

        function exportData() {
            sortAll();
            const data = {news, reviews};
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "yukki_data.json";
            a.click();
            alert("Data stažena!");
        }

        function renderHome() {
            if (news.length > 0) {
                const n = news[0];
                document.getElementById('hero-news').innerHTML = `
                    <img src="${n.image}" class="absolute inset-0 w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-black/70"></div>
                    <div class="absolute bottom-12 left-12 right-12">
                        <h2 class="text-5xl font-bold title-font">${n.title}</h2>
                        <p class="text-xl text-gray-300 mt-4">${n.content.substring(0, 180)}...</p>
                    </div>
                `;
            }

            document.getElementById('home-reviews').innerHTML = reviews.slice(0, 3).map((r, i) => `
                <div onclick="openDetail('review', ${i})" class="bg-zinc-900 rounded-3xl p-6 cursor-pointer">
                    <img src="${r.image}" class="w-full h-40 object-cover rounded-2xl mb-4">
                    <h4 class="font-bold">${r.title}</h4>
                    <div class="text-4xl font-bold text-purple-400">${r.score}</div>
                </div>
            `).join('');
        }

        function renderNews() {
            document.getElementById('news-container').innerHTML = news.map((n, i) => `
                <div class="bg-zinc-900 rounded-3xl overflow-hidden">
                    <img src="${n.image}" class="w-full h-56 object-cover cursor-pointer" onclick="openDetail('news', ${i})">
                    <div class="p-6">
                        <h3 class="text-2xl font-bold">${n.title}</h3>
                        <p class="text-purple-400 text-sm">${n.date}</p>
                        <p class="mt-4 line-clamp-4">${n.content}</p>
                        ${isAdmin ? `
                        <div class="flex gap-3 mt-6">
                            <button onclick="event.stopImmediatePropagation(); editItem('news', ${i});" class="flex-1 py-3 bg-blue-600 rounded-xl">UPRAVIT</button>
                            <button onclick="event.stopImmediatePropagation(); deleteItem('news', ${i});" class="flex-1 py-3 bg-red-600 rounded-xl">SMAZAT</button>
                        </div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function renderReviews() {
            document.getElementById('reviews-container').innerHTML = reviews.map((r, i) => `
                <div class="bg-zinc-900 rounded-3xl overflow-hidden">
                    <img src="${r.image}" class="w-full h-56 object-cover cursor-pointer" onclick="openDetail('review', ${i})">
                    <div class="p-6">
                        <div class="flex justify-between">
                            <h3 class="text-2xl font-bold">${r.title}</h3>
                            <div class="text-5xl font-bold text-purple-400">${r.score}</div>
                        </div>
                        <p class="text-purple-400 text-sm">${r.date}</p>
                        <p class="mt-4 line-clamp-4">${r.content}</p>
                        ${isAdmin ? `
                        <div class="flex gap-3 mt-6">
                            <button onclick="event.stopImmediatePropagation(); editItem('review', ${i});" class="flex-1 py-3 bg-blue-600 rounded-xl">UPRAVIT</button>
                            <button onclick="event.stopImmediatePropagation(); deleteItem('review', ${i});" class="flex-1 py-3 bg-red-600 rounded-xl">SMAZAT</button>
                        </div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function renderLeaderboard() {
            const sorted = [...reviews].sort((a,b) => b.score - a.score);
            document.getElementById('leaderboard').innerHTML = sorted.map(r => `
                <div class="bg-zinc-900 rounded-3xl p-6 flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <img src="${r.image}" class="w-16 h-16 object-cover rounded-xl">
                        <h3 class="text-xl font-bold">${r.title}</h3>
                    </div>
                    <div class="text-5xl font-bold text-purple-400">${r.score}</div>
                </div>
            `).join('');
        }

        function openDetail(type, i) {
            const item = type === 'news' ? news[i] : reviews[i];
            document.getElementById('modal-image').innerHTML = `<img src="${item.image}" class="w-full h-full object-cover">`;
            document.getElementById('modal-title').textContent = item.title;
            document.getElementById('modal-date').textContent = item.date;
            
            const scoreEl = document.getElementById('modal-score');
            if (type === 'review' && item.score) {
                scoreEl.textContent = item.score + "%";
                scoreEl.style.display = 'block';
            } else {
                scoreEl.style.display = 'none';
            }
            
            document.getElementById('modal-content').innerHTML = item.content.replace(/\n/g, '<br><br>');
            document.getElementById('detailModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.add('hidden');
        }

        function switchTab(n) {
            document.querySelectorAll('[id^="page-"]').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${n}`).classList.remove('hidden');
            if (n === 2) renderReviews();
            if (n === 3) renderLeaderboard();
        }

        function toggleLogin() {
            document.getElementById('loginModal').classList.toggle('hidden');
        }

        function adminLogin() {
            if (document.getElementById('loginUser').value === "yukki" && document.getElementById('loginPass').value === "yukki123") {
                isAdmin = true;
                document.getElementById('loginText').innerHTML = '👑 YUKKI';
                document.getElementById('adminBar').classList.remove('hidden');
                toggleLogin();
            } else {
                alert("Špatné heslo! (yukki123)");
            }
        }

        function showCreateModal(type) {
            if (!isAdmin) return alert("Nejsi přihlášen jako admin!");
            editingIndex = null;
            editingType = type;
            document.getElementById('modalTitle').textContent = type === 'news' ? "Nová novinka" : "Nová recenze";
            document.getElementById('postTitle').value = '';
            document.getElementById('postImage').value = '';
            document.getElementById('postScore').value = type === 'review' ? '80' : '';
            document.getElementById('postDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('postContent').value = '';
            document.getElementById('createModal').classList.remove('hidden');
        }

        function hideCreateModal() {
            document.getElementById('createModal').classList.add('hidden');
        }

        function savePost() {
            const title = document.getElementById('postTitle').value.trim();
            const image = document.getElementById('postImage').value || "https://picsum.photos/id/237/1200/700";
            const score = parseInt(document.getElementById('postScore').value) || 0;
            const date = document.getElementById('postDate').value;
            const content = document.getElementById('postContent').value.trim();

            if (!title || !content) return alert("Název a obsah jsou povinné!");

            if (editingType === 'news') {
                if (editingIndex !== null) news[editingIndex] = {id: news[editingIndex].id, title, image, date, content};
                else news.unshift({id: Date.now(), title, image, date, content});
            } else {
                if (editingIndex !== null) reviews[editingIndex] = {id: reviews[editingIndex].id, title, image, score, date, content};
                else reviews.unshift({id: Date.now(), title, image, score, date, content});
            }

            sortAll();
            saveToLocalStorage();
            hideCreateModal();
            renderHome();
            renderNews();
            renderReviews();
            renderLeaderboard();
            alert("Přidáno!");
        }

        function editItem(type, i) {
            editingType = type;
            editingIndex = i;
            const item = type === 'news' ? news[i] : reviews[i];
            document.getElementById('modalTitle').textContent = type === 'news' ? "Upravit novinku" : "Upravit recenzi";
            document.getElementById('postTitle').value = item.title;
            document.getElementById('postImage').value = item.image;
            document.getElementById('postScore').value = item.score || '';
            document.getElementById('postDate').value = item.date;
            document.getElementById('postContent').value = item.content;
            document.getElementById('createModal').classList.remove('hidden');
        }

        function deleteItem(type, i) {
            if (confirm("Opravdu smazat?")) {
                if (type === 'news') news.splice(i, 1);
                else reviews.splice(i, 1);
                sortAll();
                saveToLocalStorage();
                renderHome();
                renderNews();
                renderReviews();
                renderLeaderboard();
            }
        }

        window.onload = () => {
            loadData();
            renderHome();
            renderNews();
            renderReviews();
            renderLeaderboard();
            switchTab(0);
        };
    </script>
</body>
</html>
