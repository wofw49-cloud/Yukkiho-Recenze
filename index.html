<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yukkiho Recenze</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e0e0e0; }
    .logo { font-family: 'Press Start 2P', cursive; font-size: 2.6rem; background: linear-gradient(90deg, #ff1a1a, #ff6666); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  </style>
</head>
<body class="min-h-screen pb-20">

  <header class="sticky top-0 bg-black/95 border-b border-red-900 p-6">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <div class="logo">YUKKIHO RECENZE</div>
      <button onclick="adminLogin()" class="bg-zinc-900 hover:bg-red-600 px-6 py-3 rounded-xl">Admin</button>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-6 py-10">
    <button onclick="showReviewForm()" id="newBtn" style="display:none" class="bg-red-600 hover:bg-red-700 px-8 py-4 rounded-2xl text-lg font-semibold mb-10">
      + Nová recenze
    </button>
    <div id="reviewsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
  </div>

  <script>
    const URL = 'https://eyxgzormlrfwsnvlotio.supabase.co';
    const KEY = 'sb_publishable_fBCkptR7dfkY51JdA-EnEw_oQZTxBFX';
    let isAdmin = false;

    async function api(method, body = null) {
      const res = await fetch(`${URL}/rest/v1/reviews`, {
        method,
        headers: {
          'apikey': KEY,
          'Authorization': `Bearer ${KEY}`,
          'Content-Type': 'application/json'
        },
        body: body ? JSON.stringify(body) : null
      });
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    async function saveReview() {
      const title = document.getElementById('rTitle').value;
      const text = document.getElementById('rText').value;
      if (!title) return alert("Napiš název hry");

      await api('POST', { title, text });
      alert('Uloženo!');
      closeForm();
      loadReviews();
    }

    async function loadReviews() {
      try {
        const data = await api('GET');
        document.getElementById('reviewsContainer').innerHTML = data.map(r => `
          <div class="bg-zinc-900 p-8 rounded-3xl">
            <h3 class="text-2xl font-bold">${r.title}</h3>
            <p class="mt-6 text-zinc-300">${r.text ? r.text.substring(0,250) + '...' : ''}</p>
          </div>
        `).join('');
      } catch(e) {}
    }

    function showReviewForm() {
      if (!isAdmin) return alert("Nejsi admin");
      document.getElementById('reviewFormModal').classList.remove('hidden');
    }

    function closeForm() {
      document.getElementById('reviewFormModal').classList.add('hidden');
    }

    function adminLogin() {
      const pass = prompt("Admin heslo:");
      if (pass === "yukki77") {
        isAdmin = true;
        document.getElementById('newBtn').style.display = 'block';
        alert("Admin zapnutý");
      }
    }

    // Formulář (přidáno)
    document.body.insertAdjacentHTML('beforeend', `
      <div id="reviewFormModal" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center">
        <div class="bg-zinc-900 p-10 rounded-3xl w-full max-w-lg">
          <h2 class="text-3xl font-bold mb-6">Nová recenze</h2>
          <input id="rTitle" placeholder="Název hry" class="w-full p-4 bg-zinc-800 border border-zinc-700 rounded-2xl mb-4">
          <textarea id="rText" rows="10" placeholder="Text recenze..." class="w-full p-4 bg-zinc-800 border border-zinc-700 rounded-2xl"></textarea>
          <div class="flex gap-4 mt-8">
            <button onclick="saveReview()" class="flex-1 bg-red-600 py-4 rounded-2xl font-bold">Uložit</button>
            <button onclick="closeForm()" class="flex-1 bg-zinc-700 py-4 rounded-2xl font-bold">Zrušit</button>
          </div>
        </div>
      </div>
    `);

    loadReviews();
  </script>
</body>
</html>
