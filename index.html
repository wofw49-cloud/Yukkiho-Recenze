<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yukkiho Recenze | Admin Control</title>
    <style>
        :root { --red: #e50914; --dark: #0f0f0f; --card: #1a1a1a; --text: #f0f0f0; }
        body { background: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; line-height: 1.6; }
        
        nav { background: #000; border-bottom: 2px solid var(--red); padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--red); text-decoration: none; cursor: pointer; }
        .nav-links span { margin-left: 20px; cursor: pointer; font-weight: 500; transition: 0.3s; }
        .nav-links span:hover { color: var(--red); }

        .container { max-width: 1100px; margin: 20px auto; padding: 0 20px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; cursor: pointer; border: 1px solid #222; transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-5px); border-color: var(--red); }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 15px; }
        .badge { position: absolute; top: 10px; right: 10px; background: var(--red); padding: 5px 10px; border-radius: 5px; font-weight: bold; }

        /* Tlačítko smazat */
        .delete-btn { 
            background: #ff4444; color: white; border: none; padding: 5px 10px; 
            border-radius: 4px; cursor: pointer; font-size: 0.8rem; margin-top: 10px;
            font-weight: bold; width: auto;
        }
        .delete-btn:hover { background: #cc0000; }

        .detail-view { background: var(--card); padding: 30px; border-radius: 12px; }
        .detail-header { border-bottom: 2px solid var(--red); margin-bottom: 20px; }
        .back-btn { color: var(--red); cursor: pointer; display: inline-block; margin-bottom: 10px; }

        .comment-section { margin-top: 40px; background: #111; padding: 20px; border-radius: 8px; }
        .comment { border-bottom: 1px solid #333; padding: 10px 0; }
        
        input, textarea, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 5px; border: none; box-sizing: border-box; }
        input, textarea { background: #222; color: #fff; border: 1px solid #444; }
        button { background: var(--red); color: white; font-weight: bold; cursor: pointer; }
        
        .hidden { display: none !important; }
        .admin-login-btn { background: #333; width: auto; padding: 5px 15px; font-size: 0.8rem; }
        .admin-tag { color: #ffeb3b; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="renderHome()">YUKKIHO RECENZE</div>
    <div class="nav-links">
        <span onclick="renderHome()">Domů</span>
        <span onclick="renderCategory('news')">Novinky</span>
        <span onclick="renderCategory('review')">Recenze</span>
        <span onclick="renderHall()">Síň slávy</span>
        <span onclick="showAdmin()" id="admin-link" class="hidden">Admin Panel</span>
    </div>
    <button class="admin-login-btn" id="login-btn" onclick="adminLogin()">Admin Login</button>
</nav>

<div class="container" id="app"></div>

<script>
    // Inicializace dat
    let posts = JSON.parse(localStorage.getItem('yukki_posts')) || [
        { id: 1, type: 'review', title: 'The Witcher 3', content: 'Zaklínač je legenda...', img: 'https://images.unsplash.com/photo-1550745165-9bc0b252726f', rating: 98, comments: [], userRatings: [95] },
        { id: 2, type: 'news', title: 'GTA VI uniklé info', content: 'Nové zprávy o Rockstaru...', img: 'https://images.unsplash.com/photo-1542751371-adc38448a05e', rating: null, comments: [] }
    ];

    let isAdmin = false;

    // --- RENDER JÁDRO ---

    function renderHome() {
        let html = `<h2>🔥 Nejnovější pecky</h2><div class="grid">`;
        posts.slice().reverse().forEach(post => html += createCard(post));
        html += `</div>`;
        document.getElementById('app').innerHTML = html;
    }

    function renderCategory(type) {
        let html = `<h2>${type === 'news' ? '📰 Novinky' : '🎮 Recenze'}</h2><div class="grid">`;
        posts.filter(p => p.type === type).reverse().forEach(post => html += createCard(post));
        html += `</div>`;
        document.getElementById('app').innerHTML = html;
    }

    function createCard(post) {
        return `
            <div class="card">
                ${post.rating ? `<div class="badge">${post.rating}%</div>` : ''}
                <div onclick="renderDetail(${post.id})">
                    <img src="${post.img}" alt="">
                    <div class="card-body">
                        <small style="color:var(--red)">${post.type.toUpperCase()}</small>
                        <h3>${post.title}</h3>
                        <p>${post.content.substring(0, 80)}...</p>
                    </div>
                </div>
                ${isAdmin ? `<div style="padding: 0 15px 15px;"><button class="delete-btn" onclick="deletePost(${post.id})">SMAZAT</button></div>` : ''}
            </div>
        `;
    }

    function renderDetail(id) {
        const post = posts.find(p => p.id === id);
        if(!post) return renderHome();

        let userAvg = post.userRatings && post.userRatings.length ? 
            (post.userRatings.reduce((a,b) => a+b, 0) / post.userRatings.length).toFixed(0) : "---";

        let html = `
            <div class="detail-view">
                <span class="back-btn" onclick="renderHome()">← Zpět</span>
                <div class="detail-header">
                    <h1>${post.title} ${isAdmin ? `<button class="delete-btn" onclick="deletePost(${post.id})">Smazat tento článek</button>` : ''}</h1>
                    ${post.rating ? `<p>Redakce: <strong>${post.rating}%</strong> | Komunita: <strong>${userAvg}%</strong></p>` : ''}
                </div>
                <img src="${post.img}" style="width:100%; border-radius:8px; margin-bottom:20px; max-height: 400px; object-fit: cover;">
                <p style="white-space: pre-wrap;">${post.content}</p>

                ${post.type === 'review' ? `
                    <div style="background: #222; padding: 15px; border-radius: 8px; margin: 20px 0;">
                        <span>Vaše hodnocení (0-100%):</span>
                        <input type="number" id="u-rating" style="width:80px; margin: 0 10px;" min="0" max="100">
                        <button onclick="addRating(${post.id})" style="width:auto">Poslat %</button>
                    </div>
                ` : ''}

                <div class="comment-section">
                    <h3>Komentáře (${post.comments.length})</h3>
                    <div id="comments-list">${post.comments.map(c => `<div class="comment"><strong>${c.name}</strong>: ${c.text}</div>`).join('')}</div>
                    <input type="text" id="c-name" placeholder="Jméno">
                    <textarea id="c-text" placeholder="Tvůj názor..."></textarea>
                    <button onclick="addComment(${post.id})">Publikovat komentář</button>
                </div>
            </div>
        `;
        document.getElementById('app').innerHTML = html;
        window.scrollTo(0,0);
    }

    function renderHall() {
        let sorted = posts.filter(p => p.type === 'review').sort((a,b) => b.rating - a.rating);
        let html = `<h2>🏆 Síň slávy</h2><div class="grid">`;
        sorted.forEach((post, i) => {
            html += `
                <div class="card">
                    <div class="badge">TOP ${i+1}</div>
                    <div class="card-body" onclick="renderDetail(${post.id})" style="cursor:pointer">
                        <h3>${post.rating}% - ${post.title}</h3>
                    </div>
                    ${isAdmin ? `<div style="padding: 0 15px 15px;"><button class="delete-btn" onclick="deletePost(${post.id})">SMAZAT</button></div>` : ''}
                </div>`;
        });
        html += `</div>`;
        document.getElementById('app').innerHTML = html;
    }

    // --- ADMIN FUNKCE ---

    function adminLogin() {
        const pass = prompt("Zadej admin heslo:");
        if(pass === "yukki") {
            isAdmin = true;
            document.getElementById('admin-link').classList.remove('hidden');
            document.getElementById('login-btn').classList.add('hidden');
            alert("Vítej zpět, Yukki!");
            renderHome();
        } else {
            alert("Špatné heslo!");
        }
    }

    function showAdmin() {
        document.getElementById('app').innerHTML = `
            <div class="detail-view">
                <h2>🛠️ Nový příspěvek</h2>
                <label>Typ obsahu:</label>
                <select id="a-type"><option value="review">Recenze</option><option value="news">Novinka</option></select>
                <input type="text" id="a-title" placeholder="Název hry / titulka novinky">
                <input type="text" id="a-img" placeholder="URL obrázku (např. z Google Images)">
                <input type="number" id="a-rating" placeholder="Hodnocení v % (jen pro recenze)">
                <textarea id="a-content" rows="10" placeholder="Sem napiš svůj text..."></textarea>
                <button onclick="createPost()">PUBLIKOVAT</button>
            </div>
        `;
    }

    function createPost() {
        const title = document.getElementById('a-title').value;
        const content = document.getElementById('a-content').value;
        if(!title || !content) return alert("Název a obsah jsou povinné!");

        const newPost = {
            id: Date.now(),
            type: document.getElementById('a-type').value,
            title: title,
            content: content,
            img: document.getElementById('a-img').value || 'https://images.unsplash.com/photo-1550745165-9bc0b252726f',
            rating: parseInt(document.getElementById('a-rating').value) || null,
            comments: [],
            userRatings: []
        };
        posts.push(newPost);
        saveData();
        renderHome();
    }

    function deletePost(id) {
        if(confirm("Opravdu chceš tuhle recenzi/novinku smazat?")) {
            posts = posts.filter(p => p.id !== id);
            saveData();
            renderHome();
        }
    }

    // --- DATA ---

    function addComment(id) {
        const name = document.getElementById('c-name').value;
        const text = document.getElementById('c-text').value;
        if(!name || !text) return alert("Napiš jméno a zprávu!");
        posts.find(p => p.id === id).comments.push({name, text});
        saveData();
        renderDetail(id);
    }

    function addRating(id) {
        const score = parseInt(document.getElementById('u-rating').value);
        if(isNaN(score) || score < 0 || score > 100) return alert("Zadej číslo 0-100");
        posts.find(p => p.id === id).userRatings.push(score);
        saveData();
        renderDetail(id);
    }

    function saveData() {
        localStorage.setItem('yukki_posts', JSON.stringify(posts));
    }

    // Start
    renderHome();
</script>

</body>
</html>
