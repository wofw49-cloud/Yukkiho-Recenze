<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yukkiho Recenze</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e0e0e0; }
    .logo { font-family: 'Press Start 2P', cursive; font-size: 2.6rem; background: linear-gradient(90deg, #ff1a1a, #ff6666); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  </style>
</head>
<body class="min-h-screen pb-20">

  <header class="sticky top-0 z-50 bg-black/95 border-b border-red-900">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <div onclick="showTab(0)" class="logo cursor-pointer">YUKKIHO RECENZE</div>
      <button onclick="adminLogin()" class="bg-zinc-900 hover:bg-red-600 px-6 py-3 rounded-xl">Admin</button>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-6 pt-10">
    <button onclick="showReviewForm()" class="bg-red-600 px-6 py-3 rounded-xl mb-8">+ Nová recenze</button>
    <div id="reviewsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
  </div>

  <!-- FORM -->
  <div id="reviewFormModal" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center">
    <div class="bg-zinc-900 p-10 rounded-3xl w-full max-w-lg">
      <h2 class="text-3xl font-bold mb-6">Nová recenze</h2>
      <input id="rTitle" placeholder="Název hry" class="w-full mb-4 bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4">
      <input id="rPlatform" placeholder="Platforma" class="w-full mb-4 bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4">
      <input id="rRating" type="number" min="0" max="100" placeholder="Hodnocení (%)" class="w-full mb-4 bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4">
      <textarea id="rText" rows="8" placeholder="Text recenze..." class="w-full mb-6 bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4"></textarea>
      
      <button onclick="saveReview()" class="w-full bg-red-600 hover:bg-red-700 py-4 rounded-2xl font-bold">Uložit recenzi</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://eyxgzormlrfwsnvlotio.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_fBCkptR7dfkY51JdA-EnEw_oQZTxBFX';

    let isAdmin = false;
    const ADMIN_PASSWORD = "yukki77";

    async function api(table, method, path = '', body = null) {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${path}`, {
          method,
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json'
          },
          body: body ? JSON.stringify(body) : undefined
        });
        if (!res.ok) {
          const err = await res.text();
          throw new Error(err);
        }
        return res.json();
      } catch (e) {
        alert('Chyba: ' + e.message);
        throw e;
      }
    }

    async function saveReview() {
      try {
        await api('reviews', 'POST', '', {
          title: document.getElementById('rTitle').value,
          platform: document.getElementById('rPlatform').value,
          rating: parseInt(document.getElementById('rRating').value) || 0,
          text: document.getElementById('rText').value
        });
        alert('✅ Uloženo!');
        document.getElementById('reviewFormModal').classList.add('hidden');
        location.reload();
      } catch (e) {}
    }

    function showReviewForm() {
      if (!isAdmin) return alert("Nejsi admin");
      document.getElementById('reviewFormModal').classList.remove('hidden');
    }

    function adminLogin() {
      const pass = prompt("Zadej heslo:");
      if (pass === ADMIN_PASSWORD) {
        isAdmin = true;
        alert("Admin mód zapnutý");
      } else {
        alert("Špatné heslo");
      }
    }

    // Start
    console.log("Stránka načtena - klikni na Admin");
  </script>
</body>
</html>
