        function sortByDate(arr) {
            return [...arr].sort((a, b) => new Date(b.date) - new Date(a.date));
        }

                const idx = reviews.findIndex(item => item.id === r.id);
                return `
                    <div class="bg-zinc-900 rounded-3xl overflow-hidden">
                        <img src="${r.image}" class="w-full h-56 object-cover cursor-pointer" onclick="openDetail('review', ${idx})">
                        <div class="p-6">
                            <div class="flex justify-between">
                                <h3 class="text-2xl font-bold">${r.title}</h3>
                                <div class="text-5xl font-bold text-red-400">${r.score}</div>
                            </div>
                            <p class="mt-4 line-clamp-4">${r.content}</p>
                            ${isAdmin ? `<div class="flex gap-3 mt-6">
                                <button onclick="event.stopImmediatePropagation(); editItem('review', ${idx});" class="flex-1 py-3 bg-blue-600 rounded-xl">UPRAVIT</button>
                                <button onclick="event.stopImmediatePropagation(); deleteItem('review', ${idx});" class="flex-1 py-3 bg-red-600 rounded-xl">SMAZAT</button>
                            </div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderLeaderboard() {
            const sorted = [...reviews].sort((a, b) => b.score - a.score);
            document.getElementById('leaderboard').innerHTML = sorted.map((r, index) => {
                const rankClass = index === 0 ? 'from-yellow-400 to-amber-500' : 
                                 index === 1 ? 'from-gray-300 to-gray-400' : 
                                 index === 2 ? 'from-orange-600 to-amber-700' : 'from-red-600 to-rose-600';
                const idx = reviews.findIndex(review => review.id === r.id);
                return `
                    <div onclick="openDetail('review', ${idx})" class="leaderboard-card bg-gradient-to-r from-zinc-900 to-zinc-950 border border-red-500/30 hover:border-red-500 rounded-3xl p-8 flex items-center gap-8 cursor-pointer">
                        <div class="text-7xl font-black text-transparent bg-clip-text bg-gradient-to-br ${rankClass} w-20">${index + 1}</div>
                        <img src="${r.image}" class="w-28 h-28 object-cover rounded-2xl border border-red-500/50">
                        <div class="flex-1">
                            <h3 class="text-3xl font-bold">${r.title}</h3>
                        </div>
                        <div class="text-right">
                            <div class="text-7xl font-bold text-red-400">${r.score}<span class="text-2xl">%</span></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderCommunity() {
            document.getElementById('community-container').innerHTML = communityLinks.map((link, i) => `
                <a href="${link.url}" target="_blank" class="block bg-zinc-900 hover:bg-zinc-800 border border-red-500/30 hover:border-red-500 rounded-3xl p-8 transition-all group">
                    <i class="fas ${link.icon} text-5xl text-red-500 mb-6"></i>
                    <h3 class="text-2xl font-bold group-hover:text-red-400">${link.title}</h3>
                    ${isAdmin ? `
                    <div class="flex gap-3 mt-8">
                        <button onclick="event.preventDefault(); editLink(${i});" class="flex-1 py-3 bg-blue-600 rounded-xl">UPRAVIT</button>
                        <button onclick="event.preventDefault(); deleteLink(${i});" class="flex-1 py-3 bg-red-600 rounded-xl">SMAZAT</button>
                    </div>` : ''}
                </a>
            `).join('');
        }

        function renderHome() {
            if (news.length > 0) {
                const latest = sortByDate(news)[0];
                document.getElementById('hero-news').innerHTML = `
                    <img src="${latest.image}" class="absolute inset-0 w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-black/70"></div>
                    <div class="absolute bottom-12 left-12 right-12">
                        <h2 class="text-5xl font-bold title-font">${latest.title}</h2>
                    </div>
                `;
            }
            const latestReviews = sortByDate(reviews).slice(0, 3);
            document.getElementById('home-reviews').innerHTML = latestReviews.map(r => {
                const idx = reviews.findIndex(review => review.id === r.id);
                return `
                    <div onclick="openDetail('review', ${idx})" class="bg-zinc-900 rounded-3xl p-6 cursor-pointer">
                        <img src="${r.image}" class="w-full h-40 object-cover rounded-2xl mb-4">
                        <h4 class="font-bold">${r.title}</h4>
                        <div class="text-4xl font-bold text-red-400">${r.score}</div>
                    </div>
                `;
            }).join('');
        }

        function openDetail(type, i) {
            const item = type === 'news' ? news[i] : reviews[i];
            let mediaHTML = '';

            if (item.images && item.images.length > 0) {
                mediaHTML += `<div class="grid grid-cols-1 md:grid-cols-2 gap-2 p-4">`;
                item.images.forEach(src => {
                    mediaHTML += `<img src="${src}" class="rounded-2xl w-full">`;
                });
                mediaHTML += `</div>`;
            }
            if (item.video) {
                if (item.video.includes('youtube.com') || item.video.includes('youtu.be')) {
                    const vid = item.video.split('v=')[1] || item.video.split('/').pop().split('?')[0];
                    mediaHTML += `<iframe width="100%" height="520" src="https://www.youtube.com/embed/${vid}" frameborder="0" allowfullscreen class="rounded-3xl"></iframe>`;
                } else {
                    mediaHTML += `<video controls class="w-full rounded-3xl"><source src="${item.video}" type="video/mp4"></video>`;
                }
            }
            if (!mediaHTML) mediaHTML = `<img src="${item.image}" class="w-full">`;

            document.getElementById('modal-media').innerHTML = mediaHTML;
            document.getElementById('modal-title').textContent = item.title;

            const scoreEl = document.getElementById('modal-score');
            if (type === 'review' && item.score) {
                scoreEl.innerHTML = `${item.score}<span class="text-3xl">%</span>`;
                scoreEl.style.display = 'block';
            } else {
                scoreEl.style.display = 'none';
            }

            document.getElementById('modal-content').innerHTML = item.content.replace(/\n/g, '<br><br>');
            document.getElementById('detailModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
        function switchTab(n) {
            document.querySelectorAll('[id^="page-"]').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${n}`).classList.remove('hidden');
            if (n === 1) renderNews();
            if (n === 2) renderReviews();
            if (n === 3) renderLeaderboard();
            if (n === 4) renderCommunity();
        }
        function toggleLogin() { document.getElementById('loginModal').classList.toggle('hidden'); }

        // Zbytek funkcí (savePost, editItem, atd.) zůstává stejný
        function showCreateModal(type) { /* tvůj původní kód */ 
            if (!isAdmin) return alert("Nejsi přihlášen jako admin!");
            editingIndex = null;
            editingType = type;
            document.getElementById('modalTitle').textContent = type === 'news' ? "Nová novinka" : "Nová recenze";
            document.getElementById('postTitle').value = '';
            document.getElementById('postImages').value = '';
            document.getElementById('postVideo').value = '';
            document.getElementById('postScore').value = type === 'review' ? '80' : '';
            document.getElementById('postDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('postContent').value = '';
            document.getElementById('createModal').classList.remove('hidden');
        }

        function hideCreateModal() { document.getElementById('createModal').classList.add('hidden'); }
        function savePost() { /* tvůj původní kód */ 
            const title = document.getElementById('postTitle').value.trim();
            const imagesStr = document.getElementById('postImages').value.trim();
            const video = document.getElementById('postVideo').value.trim();
            const score = parseInt(document.getElementById('postScore').value) || 0;
            const date = document.getElementById('postDate').value;
            const content = document.getElementById('postContent').value.trim();
            const images = imagesStr ? imagesStr.split(',').map(u => u.trim()).filter(Boolean) : [];

            if (!title || !content) return alert("Název a obsah jsou povinné!");

            const newItem = { id: Date.now(), title, image: images[0] || "https://picsum.photos/id/237/1200/700", images, video, date, content };
            if (editingType === 'review') newItem.score = score;

            if (editingIndex !== null) {
                if (editingType === 'news') news[editingIndex] = newItem;
                else reviews[editingIndex] = newItem;
            } else {
                if (editingType === 'news') news.unshift(newItem);
                else reviews.unshift(newItem);
            }

            hideCreateModal();
            renderNews();
            renderReviews();
            renderLeaderboard();
            renderHome();
            alert("Uloženo!");
        }

        function editItem(type, i) { /* tvůj kód */ 
            editingType = type;
            editingIndex = i;
            const item = type === 'news' ? news[i] : reviews[i];
            document.getElementById('modalTitle').textContent = type === 'news' ? "Upravit novinku" : "Upravit recenzi";
            document.getElementById('postTitle').value = item.title;
            document.getElementById('postImages').value = item.images ? item.images.join(', ') : '';
            document.getElementById('postVideo').value = item.video || '';
            document.getElementById('postScore').value = item.score || '';
            document.getElementById('postDate').value = item.date;
            document.getElementById('postContent').value = item.content;
            document.getElementById('createModal').classList.remove('hidden');
        }

        function deleteItem(type, i) {
            if (confirm("Opravdu smazat?")) {
                if (type === 'news') news.splice(i, 1);
                else reviews.splice(i, 1);
                renderNews();
                renderReviews();
                renderLeaderboard();
                renderHome();
            }
        }

        function showCreateLinkModal() {
            if (!isAdmin) return alert("Nejsi admin!");
            editingLinkIndex = null;
            document.getElementById('linkModalTitle').textContent = "Nový odkaz";
            document.getElementById('linkTitle').value = '';
            document.getElementById('linkUrl').value = '';
            document.getElementById('linkIcon').value = 'fa-youtube';
            document.getElementById('linkModal').classList.remove('hidden');
        }

        function hideLinkModal() { document.getElementById('linkModal').classList.add('hidden'); }

        function saveLink() {
            const title = document.getElementById('linkTitle').value.trim();
            const url = document.getElementById('linkUrl').value.trim();
            const icon = document.getElementById('linkIcon').value || 'fa-link';
            if (!title || !url) return alert("Název a URL jsou povinné!");

            if (editingLinkIndex !== null) communityLinks[editingLinkIndex] = {title, url, icon};
            else communityLinks.unshift({title, url, icon});

            hideLinkModal();
            renderCommunity();
            alert("Odkaz uložen!");
        }

        function editLink(i) {
            editingLinkIndex = i;
            const link = communityLinks[i];
            document.getElementById('linkModalTitle').textContent = "Upravit odkaz";
            document.getElementById('linkTitle').value = link.title;
            document.getElementById('linkUrl').value = link.url;
            document.getElementById('linkIcon').value = link.icon;
            document.getElementById('linkModal').classList.remove('hidden');
        }

        function deleteLink(i) {
            if (confirm("Smazat odkaz?")) {
                communityLinks.splice(i, 1);
                renderCommunity();
            }
        }

        function exportData() {
            const data = {news, reviews, communityLinks};
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "yukki_data.json";
            a.click();
        }
        function renderCalendar() {
    const container = document.getElementById('calendar-container');
    const sorted = [...upcomingReleases].sort((a, b) => new Date(a.date) - new Date(b.date));

    container.innerHTML = sorted.map((game, i) => {
        const date = new Date(game.date);
        const dateStr = date.toLocaleDateString('cs-CZ', { 
            day: 'numeric', 
            month: 'long', 
            year: 'numeric' 
        });

        const platforms = game.platforms.map(p => 
            `<span class="inline-block bg-zinc-800 text-xs px-3 py-1 rounded-full">${p}</span>`
        ).join(' ');

        return `
            <div class="bg-zinc-900 rounded-3xl overflow-hidden border border-red-500/30 hover:border-red-500 transition-all">
                <img src="${game.image}" class="w-full h-48 object-cover">
                <div class="p-6">
                    <div class="text-red-400 text-sm font-medium">${dateStr}</div>
                    <h3 class="text-2xl font-bold mt-2">${game.title}</h3>
                    <div class="flex flex-wrap gap-2 mt-4">
                        ${platforms}
                    </div>
                    ${game.description ? `<p class="text-gray-400 text-sm mt-4 line-clamp-3">${game.description}</p>` : ''}
                    
                    ${isAdmin ? `
                    <div class="flex gap-3 mt-6">
                        <button onclick="editRelease(${i}); event.stopImmediatePropagation()" 
                                class="flex-1 py-3 bg-blue-600 rounded-xl text-sm">UPRAVIT</button>
                        <button onclick="deleteRelease(${i}); event.stopImmediatePropagation()" 
                                class="flex-1 py-3 bg-red-600 rounded-xl text-sm">SMAZAT</button>
                    </div>` : ''}
                </div>
            </div>
        `;
    }).join('');
}

function showCreateReleaseModal(editIndex = null) {
    if (!isAdmin) return alert("Nejsi admin!");

    const title = editIndex !== null ? "Upravit vydání" : "Nové vydání hry";
    // Můžeš použít existující createModal a upravit ho, nebo vytvořit nový – pro jednoduchost použijeme stávající

    // Prozatím použijeme alert + prompt (rychlé řešení), později vylepšíme
    const titleGame = prompt("Název hry:");
    if (!titleGame) return;

    const date = prompt("Datum vydání (YYYY-MM-DD):", "2026-06-15");
    const platformsStr = prompt("Platformy (oddělené čárkou):", "PC, PS5, Xbox Series");
    const image = prompt("URL obrázku:", "https://picsum.photos/id/237/1200/700");
    const description = prompt("Krátký popis (nepovinné):", "");

    const platforms = platformsStr.split(',').map(p => p.trim());

    const newRelease = { 
        id: Date.now(), 
        title: titleGame, 
        date, 
        platforms, 
        image, 
        description 
    };

    if (editIndex !== null) {
        upcomingReleases[editIndex] = newRelease;
    } else {
        upcomingReleases.push(newRelease);
    }

    renderCalendar();
    alert("Hra přidána do kalendáře!");
}

function editRelease(i) {
    showCreateReleaseModal(i);
}

function deleteRelease(i) {
    if (confirm("Smazat hru z kalendáře?")) {
        upcomingReleases.splice(i, 1);
        renderCalendar();
    }
}

        window.onload = () => {
            loadData();
            renderHome();
            renderNews();
            renderReviews();
            renderLeaderboard();
            renderCommunity();
            renderCalendar();
            switchTab(0);
        };
    </script>
</body>
</html>
