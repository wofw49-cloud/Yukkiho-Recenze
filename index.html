            let prosConsHtml = (i.pros || i.cons) ? `<div class="grid grid-cols-1 md:grid-cols-2 gap-8 my-8 md:my-12 p-6 md:p-8 bg-zinc-950 rounded-[20px] md:rounded-[30px] border border-zinc-900"><div><h4 class="condensed text-xl md:text-2xl font-black text-white mb-4">KLADY</h4><ul class="space-y-2">${(i.pros || []).map(p => `<li class="pro-item font-bold italic text-base md:text-lg">+ ${p}</li>`).join('')}</ul></div><div><h4 class="condensed text-xl md:text-2xl font-black text-white mb-4">ZÁPORY</h4><ul class="space-y-2">${(i.cons || []).map(c => `<li class="con-item font-bold italic text-base md:text-lg">- ${c}</li>`).join('')}</ul></div></div>` : '';
            const related = [...state.news, ...state.reviews].filter(x => x.id !== i.id).sort(() => 0.5 - Math.random()).slice(0, 3);
            const relatedHtml = `<div class="mt-10 md:mt-20 pt-10 border-t border-zinc-900"><h4 class="condensed text-2xl md:text-3xl font-black text-white mb-6 md:mb-8 italic uppercase">Mohlo by tě zajímat</h4><div class="grid grid-cols-1 sm:grid-cols-3 gap-6">${related.map(r => `<div class="cursor-pointer group" onclick="openModal(${r.id})"><div class="relative overflow-hidden rounded-2xl mb-3 h-32"><img src="${r.img}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition duration-500"><div class="absolute top-2 left-2 bg-red-600 text-white font-black condensed px-2 py-0.5 text-[8px] italic rounded uppercase z-10">${r.score ? 'RECENZE' : 'NOVINKA'}</div></div><h5 class="text-sm font-black condensed uppercase text-zinc-400 group-hover:text-white transition leading-tight">${r.title || r.game}</h5></div>`).join('')}</div></div>`;
            document.getElementById('modal-content').innerHTML = `<div id="main-media-container">${i.video ? `<iframe class="w-full aspect-video rounded-3xl mb-6 md:mb-10 shadow-2xl" src="https://www.youtube.com/embed/${i.video}?autoplay=1" frameborder="0" allowfullscreen></iframe>` : `<img src="${i.img}" class="w-full rounded-3xl mb-6 md:mb-10 shadow-2xl">`}</div>${galleryHtml}<div class="flex gap-2 mb-6">${getTags(i)}</div><h2 class="hero-title condensed text-4xl md:text-7xl font-black italic mb-6 md:mb-8 uppercase text-white">${i.title || i.game}${scoreHtml}</h2><div class="text-zinc-400 text-lg md:text-2xl leading-relaxed space-y-6 md:space-y-8 font-medium"><p>${(i.content || '...').replace(/\n/g, '<br>')}</p></div>${prosConsHtml}${relatedHtml}`;
            document.getElementById('modal-overlay').style.display = 'block';
            document.body.style.overflow = 'hidden';
            document.querySelector('.modal').scrollTo({ top: 0 });
        };

        window.closeModal = () => { document.getElementById('modal-overlay').style.display = 'none'; document.body.style.overflow = 'auto'; };

        window.renderCalendar = (monthFilter) => {
            const grid = document.getElementById('calendar-grid');
            let items = [...state.calendar].sort((a, b) => new Date(a.rDate) - new Date(b.rDate));
            if(monthFilter !== 'vše') items = items.filter(x => new Date(x.rDate).toLocaleString('cs-CZ', { month: 'long' }).toLowerCase() === monthFilter.toLowerCase());
            grid.innerHTML = items.map(c => `<div class="bg-zinc-950 border border-zinc-900 rounded-3xl p-6 cursor-pointer hover:border-red-600 transition shadow-xl" onclick="openModal(${c.id})"><div class="text-red-600 font-black condensed mb-3 uppercase text-xs">${new Date(c.rDate).getDate()}. ${new Date(c.rDate).toLocaleString('cs-CZ', { month: 'short' }).toUpperCase()}</div><img src="${c.img}" class="w-full h-36 object-cover rounded-xl mb-4 grayscale hover:grayscale-0 transition duration-500"><h4 class="font-black italic uppercase text-sm mb-4 h-10 overflow-hidden leading-tight text-white">${c.game}</h4><div class="flex flex-wrap gap-2">${getTags(c)}</div></div>`).join('');
            document.getElementById('month-list').classList.remove('show');
        };

        function init() {
            state.news.sort((a, b) => new Date(b.rDate) - new Date(a.rDate));
            state.reviews.sort((a, b) => new Date(b.rDate) - new Date(a.rDate));
            const allSorted = [...state.news, ...state.reviews].sort((a, b) => new Date(b.rDate) - new Date(a.rDate));

            const hero = allSorted[0];
            const heroTag = hero.score ? 'RECENZE' : 'NOVINKA';
            document.getElementById('hero-area').innerHTML = `<div class="relative h-[400px] md:h-[650px] rounded-[30px] md:rounded-[50px] overflow-hidden cursor-pointer group shadow-2xl" onclick="openModal(${hero.id})"><img src="${hero.img}" class="w-full h-full object-cover opacity-60 group-hover:scale-105 transition duration-[10s]"><div class="absolute top-6 right-6 md:top-10 md:right-10 bg-red-600 text-white font-black condensed px-4 py-1 md:px-6 md:py-2 text-sm md:text-xl italic rounded-lg md:rounded-xl z-10">${heroTag}</div><div class="absolute bottom-10 left-10 md:bottom-20 md:left-20 max-w-[90%] md:max-w-5xl"><span class="bg-red-600 px-3 py-0.5 md:px-4 md:py-1 text-[9px] md:text-[11px] font-black condensed mb-4 md:mb-6 inline-block tracking-widest uppercase">PRÁVĚ VYŠLO</span><h1 class="hero-title condensed text-4xl md:text-9xl font-black italic uppercase text-white">${hero.title || hero.game}</h1></div></div>`;

            document.getElementById('home-feed').innerHTML = allSorted.slice(1).map(i => {
                const itemTag = i.score ? 'RECENZE' : 'NOVINKA';
                return `<div class="flex flex-col md:flex-row gap-6 md:gap-10 py-8 md:py-10 border-b border-zinc-900 group cursor-pointer" onclick="openModal(${i.id})"><div class="relative w-full md:w-80 h-48 md:h-44 shrink-0 overflow-hidden rounded-3xl shadow-xl"><img src="${i.img}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition duration-500"><div class="absolute top-4 left-4 bg-red-600 text-white font-black condensed px-3 py-1 text-[10px] italic rounded-lg">${itemTag}</div></div><div class="flex-1"><h3 class="condensed text-3xl md:text-4xl font-black italic group-hover:text-red-600 transition mb-3 uppercase leading-none tracking-tighter text-white">${i.title || i.game}</h3><p class="text-zinc-500 text-base md:text-lg line-clamp-2 mb-4">${i.content.replace(/<[^>]*>/g, '')}</p>${i.score ? `<div class="text-2xl md:text-3xl font-black text-red-600 italic">${i.score}%</div>` : ''}</div></div>`;
            }).join('');

            document.getElementById('news-full-list').innerHTML = state.news.map(n => `<div class="flex flex-col md:flex-row gap-6 md:gap-12 group cursor-pointer" onclick="openModal(${n.id})"><div class="w-full md:w-[450px] h-[250px] md:h-[280px] overflow-hidden rounded-[25px] md:rounded-[40px] shadow-2xl relative"><img src="${n.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700"></div><div class="flex-1 md:py-4"><h3 class="condensed text-3xl md:text-5xl font-black italic group-hover:text-red-600 transition mb-4 md:mb-6 uppercase tracking-tighter leading-none text-white">${n.title}</h3><p class="text-zinc-500 text-base md:text-xl font-medium line-clamp-3">${n.content.replace(/<[^>]*>/g, '')}</p></div></div>`).join('');
            document.getElementById('reviews-full-list').innerHTML = state.reviews.map(r => `<div class="flex flex-col md:flex-row gap-6 md:gap-12 group cursor-pointer" onclick="openModal(${r.id})"><div class="w-full md:w-[450px] h-[250px] md:h-[280px] overflow-hidden rounded-[25px] md:rounded-[40px] shadow-2xl relative"><img src="${r.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700"><div class="absolute top-4 right-4 md:top-6 md:right-6 bg-red-600 text-white font-black italic condensed px-3 py-1 md:px-4 md:py-2 text-xl md:text-3xl shadow-2xl rounded-lg md:rounded-xl">${r.score}%</div></div><div class="flex-1 md:py-4"><h3 class="condensed text-4xl md:text-6xl font-black italic group-hover:text-red-600 transition mb-4 md:mb-6 uppercase tracking-tighter leading-none text-white">${r.game}</h3><div class="mb-4 md:mb-6 flex gap-2">${getTags(r)}</div><p class="text-zinc-500 text-base md:text-xl font-medium line-clamp-3">${r.content.replace(/<[^>]*>/g, '')}</p></div></div>`).join('');
            
            const sortedReviews = [...state.reviews].sort((a,b) => b.score - a.score);
            document.getElementById('hall-full-list').innerHTML = sortedReviews.map((e, idx) => `<div class="bg-[#080808] border border-zinc-900 flex flex-col md:flex-row items-center p-6 md:p-10 rounded-[25px] md:rounded-[40px] hover:border-zinc-700 transition group shadow-2xl gap-6 md:gap-0"><div class="condensed text-5xl md:text-7xl font-black italic w-auto md:w-32 text-center ${idx===0?'gold-text':'text-zinc-800'}">#${idx+1}</div><img src="${e.img}" class="w-full md:w-64 h-44 md:h-36 object-cover rounded-2xl md:mx-12 shadow-2xl grayscale group-hover:grayscale-0 transition duration-500"><div class="flex-1 text-center md:text-left"><h3 class="condensed text-3xl md:text-5xl font-black italic uppercase tracking-tighter text-white ${idx===0?'gold-text':''}">${e.game}</h3><div class="mt-4 flex justify-center md:justify-start gap-2">${getTags(e)}</div></div><div class="text-4xl md:text-7xl font-black italic text-red-600">${e.score}%</div></div>`).join('');
            document.getElementById('side-hall').innerHTML = sortedReviews.slice(0,5).map((e, idx) => `<div class="flex items-center gap-4 bg-black/40 p-4 rounded-xl border border-zinc-900"><span class="condensed text-2xl font-black italic ${idx===0?'gold-text':'text-zinc-700'}">#${idx+1}</span><span class="text-[10px] font-bold uppercase flex-1 truncate text-zinc-400">${e.game}</span><span class="font-black text-red-600">${e.score}%</span></div>`).join('');
            document.getElementById('side-pecky').innerHTML = [...state.calendar].sort((a,b) => new Date(a.rDate) - new Date(b.rDate)).map(c => `<div class="flex items-center gap-5 bg-zinc-950 p-4 rounded-2xl border border-zinc-900 cursor-pointer hover:border-red-600 transition shadow-lg" onclick="openModal(${c.id})"><div class="bg-red-600 w-14 h-14 shrink-0 flex flex-col items-center justify-center rounded-xl font-black condensed leading-none text-white"><span class="text-[9px] opacity-70 uppercase">${new Date(c.rDate).toLocaleString('cs-CZ', { month: 'short' })}</span><span class="text-xl">${new Date(c.rDate).getDate()}</span></div><div class="flex-1 truncate"><span class="text-[11px] font-black uppercase block truncate mb-1 text-white">${c.game}</span><div class="flex gap-1 flex-wrap">${getTags(c)}</div></div></div>`).join('');

            const months = [...new Set(state.calendar.map(x => new Date(x.rDate).toLocaleString('cs-CZ', { month: 'long' })))];
            document.getElementById('month-list').innerHTML = months.map(m => `<div class="p-4 hover:bg-zinc-800 cursor-pointer text-xs font-black uppercase border-b border-zinc-900 transition text-white" onclick="renderCalendar('${m}')">${m} 2026</div>`).join('') + `<div class="p-4 hover:bg-red-600 cursor-pointer text-xs font-black uppercase transition text-white" onclick="renderCalendar('vše')">Zobrazit vše</div>`;
            renderCalendar('vše');
        }

        document.getElementById('month-toggle-btn').onclick = (e) => { e.stopPropagation(); document.getElementById('month-list').classList.toggle('show'); };
        document.querySelectorAll('.nav-link').forEach(link => { link.addEventListener('click', () => { document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden')); document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active-nav')); document.getElementById('tab-' + link.dataset.tab).classList.remove('hidden'); link.classList.add('active-nav'); window.scrollTo(0,0); }); });
        window.onclick = () => { document.getElementById('month-list').classList.remove('show'); };
        window.onload = init;
    </script>
</body>
</html>
