<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YUKKI • Gaming Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Orbitron:wght@500;600;700&amp;display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif; 
        }
        .title-font { 
            font-family: 'Orbitron', sans-serif; 
        }
        .neon { 
            text-shadow: 0 0 20px #c026d3, 0 0 40px #a855f7; 
        }
        .tab-active { 
            border-bottom: 4px solid #c026d3; 
            color: white; 
        }
        .card-hover:hover { 
            transform: translateY(-8px); 
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <!-- NAV -->
    <nav class="bg-black border-b border-purple-600 fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-br from-purple-600 to-pink-600 rounded-2xl flex items-center justify-center text-3xl">🌀</div>
                <span class="text-4xl font-bold tracking-widest neon title-font">YUKKI</span>
            </div>

            <div class="flex gap-8 text-lg font-medium">
                <button onclick="switchTab(0)" class="tab-active pb-1 px-4" id="tab-0">DOMŮ</button>
                <button onclick="switchTab(1)" class="pb-1 px-4 hover:text-purple-400 transition" id="tab-1">NOVINKY</button>
                <button onclick="switchTab(2)" class="pb-1 px-4 hover:text-purple-400 transition" id="tab-2">RECENZE</button>
                <button onclick="switchTab(3)" class="pb-1 px-4 hover:text-purple-400 transition" id="tab-3">ŽEBŘÍČKY</button>
                <button onclick="switchTab(4)" class="pb-1 px-4 hover:text-purple-400 transition" id="tab-4">KOMUNITA</button>
            </div>

            <button onclick="toggleLogin()" 
                    class="px-6 py-3 bg-gradient-to-r from-purple-600 to-pink-600 rounded-2xl font-bold flex items-center gap-2 hover:brightness-110 transition">
                <i class="fas fa-user"></i>
                <span id="loginText">PŘIHLÁSIT SE</span>
            </button>
        </div>
    </nav>

    <main class="pt-24 max-w-7xl mx-auto px-6 pb-20">

        <!-- DOMŮ -->
        <div id="page-0">
            <h1 class="text-6xl font-bold text-center mt-10 mb-2 neon title-font">Vítej zpátky, Yukki</h1>
            <p class="text-center text-purple-300 mb-12 text-xl">Tvůj osobní herní svět</p>

            <div id="hero-news" onclick="openDetail('news', 0)" class="cursor-pointer relative h-[70vh] rounded-3xl overflow-hidden mb-16 border border-purple-500/30 card-hover"></div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                <div class="lg:col-span-7">
                    <h2 class="text-3xl font-bold mb-6 title-font">Další novinky</h2>
                    <div id="home-older-news" class="space-y-6"></div>
                </div>
                <div class="lg:col-span-5">
                    <h2 class="text-3xl font-bold mb-6 title-font">Poslední recenze</h2>
                    <div id="home-reviews" class="space-y-6"></div>
                </div>
            </div>
        </div>

        <!-- NOVINKY -->
        <div id="page-1" class="hidden">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-4xl font-bold title-font">VŠECHNY NOVINKY</h2>
                <button onclick="showCreateModal('news')" id="createNewsBtn" class="hidden px-6 py-3 bg-purple-600 rounded-2xl font-bold">+ NOVÁ NOVINKA</button>
            </div>
            <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </div>

        <!-- RECENZE -->
        <div id="page-2" class="hidden">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-4xl font-bold title-font">RECENZE</h2>
                <button onclick="showCreateModal('review')" id="createReviewBtn" class="hidden px-6 py-3 bg-purple-600 rounded-2xl font-bold">+ NOVÁ RECENZE</button>
            </div>
            <div id="reviews-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>

        <!-- ŽEBŘÍČKY -->
        <div id="page-3" class="hidden">
            <h2 class="text-4xl font-bold title-font mb-10">YUKKI TOP ŽEBŘÍČEK</h2>
            <div id="leaderboard" class="space-y-4"></div>
        </div>

        <!-- KOMUNITA -->
        <div id="page-4" class="hidden">
            <h2 class="text-4xl font-bold title-font mb-10">KOMUNITA</h2>
            <p class="text-center py-20 text-gray-400 text-xl">Brzy přidám fórum a komentáře...</p>
        </div>
    </main>

    <!-- DETAIL MODAL -->
    <div id="detailModal" class="hidden fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-6">
        <div class="bg-zinc-900 border border-purple-500 rounded-3xl w-full max-w-4xl max-h-[90vh] overflow-auto">
            <div class="p-8">
                <button onclick="closeDetailModal()" class="float-right text-4xl text-gray-400 hover:text-white">✕</button>
                <div id="modal-image" class="rounded-2xl overflow-hidden mb-6"></div>
                <h2 id="modal-title" class="text-4xl font-bold title-font mb-4"></h2>
                <div id="modal-meta" class="text-purple-400 mb-8"></div>
                <div id="modal-content" class="prose prose-invert max-w-none text-lg leading-relaxed"></div>
            </div>
        </div>
    </div>

    <!-- CREATE/EDIT MODAL -->
    <div id="createModal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center">
        <div class="bg-zinc-900 border border-purple-500 rounded-3xl w-full max-w-2xl p-10">
            <h2 class="text-3xl font-bold mb-8 title-font" id="modalTitle">Nový příspěvek</h2>
            
            <input id="postTitle" placeholder="Název" class="w-full bg-zinc-800 border border-purple-500 rounded-2xl px-6 py-4 mb-4">
            <input id="postImage" placeholder="URL obrázku" class="w-full bg-zinc-800 border border-purple-500 rounded-2xl px-6 py-4 mb-4">
            <input id="postScore" type="number" min="0" max="100" placeholder="Hodnocení % (jen u recenzí)" class="w-full bg-zinc-800 border border-purple-500 rounded-2xl px-6 py-4 mb-4">
            <input id="postDate" type="date" class="w-full bg-zinc-800 border border-purple-500 rounded-2xl px-6 py-4 mb-6">
            
            <textarea id="postContent" rows="8" placeholder="Obsah..." class="w-full bg-zinc-800 border border-purple-500 rounded-2xl px-6 py-4"></textarea>
            
            <div class="flex gap-4 mt-8">
                <button onclick="savePost()" class="flex-1 py-5 bg-gradient-to-r from-purple-600 to-pink-600 rounded-2xl font-bold">ULOŽIT</button>
                <button onclick="hideCreateModal()" class="flex-1 py-5 bg-zinc-800 rounded-2xl font-bold">ZRUŠIT</button>
            </div>
        </div>
    </div>

    <!-- LOGIN MODAL -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center">
        <div class="bg-zinc-900 border border-purple-500 rounded-3xl w-full max-w-md p-10">
            <h2 class="text-4xl font-bold mb-8 text-center title-font">YUKKI ADMIN</h2>
            <input id="loginUser" value="yukki" class="w-full bg-zinc-800 border border-purple-500 rounded-2xl px-6 py-4 mb-4">
            <input id="loginPass" type="password" value="yukki123" class="w-full bg-zinc-800 border border-purple-500 rounded-2xl px-6 py-4 mb-6">
            <button onclick="adminLogin()" class="w-full py-5 bg-gradient-to-r from-purple-600 to-pink-600 rounded-2xl font-bold text-xl">PŘIHLÁSIT SE</button>
        </div>
    </div>

    <footer class="py-12 text-center text-gray-500 border-t border-zinc-900">
        YUKKI • Gaming Hub © 2026
    </footer>

    <script>
        let isAdmin = false;
        let news = [];
        let reviews = [];
        let editingId = null;
        let editingType = null;

        function loadSampleData() {
            news = [
                {id:1, title:"Black Myth: Wukong 2 oficiálně oznámen", image:"https://picsum.photos/id/1015/1200/700", date:"2026-05-06", content:"Game Science potvrdilo pokračování velkého hitu..."},
                {id:2, title:"GTA VI – druhý trailer dorazí v červnu", image:"https://picsum.photos/id/1016/1200/700", date:"2026-05-04", content:"Rockstar Games potvrdilo..."}
                {id:2, title:"Assassin's Creed Black Flag Resynced – datum vydání oznámeno!", image:"https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/3751950/9b046115b1663a4be2b252712328e4f6c162da68/header.jpg?t=1777900688", date:"2026-05-04", content:"Po letech spekulací a leaků je to konečně oficiální. Ubisoft potvrdil remake milovaného pirátského dílu Assassin's Creed: Black Flag Resynced a rovnou oznámil datum vydání – 9. července 2026.
Hra se staví od základu na novém enginu (vylepšený Anvil), dostane kompletně předělanou grafiku, lepší animace, vylepšené souboje na moři i na souši a odstranění některých frustrujících mechanik z originálu (ano, říká se, že ty otravné tailing mise už tam nebudou). Příběh zůstává stejný – vracíme se jako Edward Kenway do zlatého věku pirátství v Karibiku.
Fanoušci jsou z toho úplně v extázi (včetně mě). Black Flag je pro spoustu lidí dodnes nejlepší díl série a teď to vypadá, že dostane zaslouženou moderní podobu.
Co očekávat:

Výrazně lepší grafika a osvětlení
Vylepšené námořní bitvy
Zachování open-world pirátské svobody
Nový obsah (zatím neupřesněno)


července 2026 už si rezervuju dovolenou. Jestli to dopadne dobře, může to být jeden z nejlepších remaků posledních let."}
            ];
            reviews = [
                {id:101, title:"STALKER 2", image:"https://picsum.photos/id/180/800/450", score:94, date:"2026-05-05", content:"Nejlepší post-apo zážitek za poslední roky."},
                {id:102, title:"Hades II", image:"https://picsum.photos/id/251/800/450", score:96, date:"2026-04-28", content:"Supergiant opět zabodoval."}
            ];
        }

        function sortNewsByDate() {
            news.sort((a,b) => new Date(b.date) - new Date(a.date));
        }

        function renderHome() {
            sortNewsByDate();
            const newest = news[0];
            document.getElementById('hero-news').innerHTML = `
                <img src="${newest.image}" class="absolute inset-0 w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black via-black/70 to-transparent"></div>
                <div class="absolute bottom-12 left-12 right-12">
                    <span class="bg-red-600 px-5 py-2 text-sm">NEJNOVĚJŠÍ</span>
                    <h2 class="text-5xl font-bold title-font mt-6">${newest.title}</h2>
                    <p class="text-xl text-gray-300 mt-4">${newest.content}</p>
                    <p class="text-purple-400 mt-6">${newest.date}</p>
                </div>
            `;

            document.getElementById('home-older-news').innerHTML = news.slice(1).map((n,i) => `
                <div onclick="openDetail('news',${i+1})" class="card-hover bg-zinc-900 rounded-3xl p-6 cursor-pointer flex gap-6">
                    <img src="${n.image}" class="w-48 h-32 object-cover rounded-2xl">
                    <div class="flex-1">
                        <h3 class="text-2xl font-bold title-font">${n.title}</h3>
                        <p class="text-gray-400 mt-3">${n.content}</p>
                        <p class="text-sm text-purple-400 mt-4">${n.date}</p>
                    </div>
                </div>
            `).join('');
        }

        function renderNews() {
            document.getElementById('news-container').innerHTML = news.map((n,i) => `
                <div onclick="openDetail('news',${i})" class="card-hover bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer">
                    <img src="${n.image}" class="w-full h-56 object-cover">
                    <div class="p-6">
                        <h3 class="text-2xl font-bold title-font">${n.title}</h3>
                        <p class="text-purple-400 text-sm">${n.date}</p>
                        <p class="mt-4">${n.content}</p>
                        ${isAdmin ? `
                        <div class="flex gap-3 mt-6">
                            <button onclick="event.stopImmediatePropagation(); editPost('news',${n.id});" class="flex-1 py-3 bg-blue-600 rounded-2xl">UPRAVIT</button>
                            <button onclick="event.stopImmediatePropagation(); deletePost('news',${n.id});" class="flex-1 py-3 bg-red-600 rounded-2xl">SMAZAT</button>
                        </div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function renderReviews() {
            document.getElementById('reviews-container').innerHTML = reviews.map((r,i) => `
                <div onclick="openDetail('review',${i})" class="card-hover bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer">
                    <img src="${r.image}" class="w-full h-56 object-cover">
                    <div class="p-6">
                        <div class="flex justify-between">
                            <h3 class="text-2xl font-bold title-font">${r.title}</h3>
                            <div class="text-5xl font-bold text-purple-400">${r.score}</div>
                        </div>
                        <p class="text-purple-400 text-sm">${r.date}</p>
                        <p class="mt-4">${r.content}</p>
                        ${isAdmin ? `
                        <div class="flex gap-3 mt-6">
                            <button onclick="event.stopImmediatePropagation(); editPost('review',${r.id});" class="flex-1 py-3 bg-blue-600 rounded-2xl">UPRAVIT</button>
                            <button onclick="event.stopImmediatePropagation(); deletePost('review',${r.id});" class="flex-1 py-3 bg-red-600 rounded-2xl">SMAZAT</button>
                        </div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function renderLeaderboard() {
            const sorted = [...reviews].sort((a,b) => b.score - a.score);
            document.getElementById('leaderboard').innerHTML = sorted.map((r,i) => `
                <div onclick="openDetail('review',${reviews.indexOf(r)})" class="bg-zinc-900 rounded-3xl p-6 flex items-center gap-6 cursor-pointer">
                    <div class="text-6xl font-bold text-purple-400">${i+1}.</div>
                    <img src="${r.image}" class="w-28 h-20 object-cover rounded-xl">
                    <div class="flex-1"><h3 class="text-xl font-bold">${r.title}</h3></div>
                    <div class="text-6xl font-bold text-purple-400">${r.score}</div>
                </div>
            `).join('');
        }

        function renderHomeReviews() {
            document.getElementById('home-reviews').innerHTML = reviews.slice(0,3).map((r,i) => `
                <div onclick="openDetail('review',${i})" class="card-hover bg-zinc-900 rounded-3xl p-6 cursor-pointer flex gap-6">
                    <img src="${r.image}" class="w-32 h-24 object-cover rounded-2xl">
                    <div>
                        <h4 class="font-bold">${r.title}</h4>
                        <div class="text-4xl font-bold text-purple-400">${r.score}</div>
                    </div>
                </div>
            `).join('');
        }

        function openDetail(type, index) {
            const item = type === 'news' ? news[index] : reviews[index];
            document.getElementById('modal-image').innerHTML = `<img src="${item.image}" class="w-full">`;
            document.getElementById('modal-title').textContent = item.title;
            document.getElementById('modal-meta').innerHTML = type === 'news' ? item.date : `${item.date} • ${item.score}%`;
            document.getElementById('modal-content').innerHTML = `<p>${item.content}</p>`;
            document.getElementById('detailModal').classList.remove('hidden');
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.add('hidden');
        }

        function savePost() {
            const title = document.getElementById('postTitle').value;
            const image = document.getElementById('postImage').value || "https://picsum.photos/id/237/1200/700";
            const score = parseInt(document.getElementById('postScore').value) || 0;
            const date = document.getElementById('postDate').value;
            const content = document.getElementById('postContent').value;

            if (!title || !date) return alert("Název a datum jsou povinné!");

            if (editingId) {
                if (editingType === 'news') {
                    const n = news.find(x => x.id === editingId);
                    Object.assign(n, {title, image, date, content});
                } else {
                    const r = reviews.find(x => x.id === editingId);
                    Object.assign(r, {title, image, score, date, content});
                }
            } else {
                if (editingType === 'news') {
                    news.unshift({id: Date.now(), title, image, date, content});
                } else {
                    reviews.unshift({id: Date.now(), title, image, score, date, content});
                }
            }

            hideCreateModal();
            renderAll();
        }

        function editPost(type, id) {
            editingType = type;
            editingId = id;
            const item = type === 'news' ? news.find(n => n.id === id) : reviews.find(r => r.id === id);
            document.getElementById('modalTitle').textContent = type === 'news' ? "Upravit novinku" : "Upravit recenzi";
            document.getElementById('postTitle').value = item.title;
            document.getElementById('postImage').value = item.image;
            document.getElementById('postDate').value = item.date;
            document.getElementById('postContent').value = item.content;
            document.getElementById('postScore').value = item.score || '';
            document.getElementById('createModal').classList.remove('hidden');
        }

        function deletePost(type, id) {
            if (!confirm("Opravdu smazat?")) return;
            if (type === 'news') news = news.filter(n => n.id !== id);
            else reviews = reviews.filter(r => r.id !== id);
            renderAll();
        }

        function showCreateModal(type) {
            if (!isAdmin) return alert("Pouze Yukki může přidávat obsah!");
            editingId = null;
            editingType = type;
            document.getElementById('modalTitle').textContent = type === 'news' ? "Nová novinka" : "Nová recenze";
            document.getElementById('postTitle').value = '';
            document.getElementById('postImage').value = '';
            document.getElementById('postScore').value = type === 'review' ? '85' : '';
            document.getElementById('postDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('postContent').value = '';
            document.getElementById('createModal').classList.remove('hidden');
        }

        function hideCreateModal() {
            document.getElementById('createModal').classList.add('hidden');
        }

        function switchTab(n) {
            document.querySelectorAll('[id^="page-"]').forEach(page => page.classList.add('hidden'));
            document.getElementById(`page-${n}`).classList.remove('hidden');
            document.querySelectorAll('#tabs button').forEach((btn, i) => {
                btn.classList.toggle('tab-active', i === n);
            });
        }

        function adminLogin() {
            if (document.getElementById('loginUser').value === "yukki" && 
                document.getElementById('loginPass').value === "yukki123") {
                isAdmin = true;
                document.getElementById('loginText').innerHTML = `👑 YUKKI`;
                document.getElementById('createNewsBtn').classList.remove('hidden');
                document.getElementById('createReviewBtn').classList.remove('hidden');
                toggleLogin();
                renderAll();
                alert("Přihlášen jako YUKKI! Nyní můžeš vše upravovat a mazat.");
            } else {
                alert("Špatné heslo! (yukki123)");
            }
        }

        function toggleLogin() {
            document.getElementById('loginModal').classList.toggle('hidden');
        }

        function renderAll() {
            renderHome();
            renderNews();
            renderReviews();
            renderLeaderboard();
            renderHomeReviews();
        }

        window.onload = () => {
            loadSampleData();
            renderAll();
            switchTab(0);
        };
    </script>
</body>
</html>
